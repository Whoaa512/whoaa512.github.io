<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ANIME PHYSIQUE // RPG</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050510">
<style>
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes xp-float {
    0% { opacity: 1; transform: translate(-50%, 0) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -10px) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(1); }
  }
  @keyframes levelup-flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes levelup-text {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    60% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes stat-fill {
    from { width: 0; }
  }
  @keyframes diamond-pop {
    0% { transform: rotate(45deg) scale(0.8); }
    50% { transform: rotate(45deg) scale(1.15); }
    100% { transform: rotate(45deg) scale(1); }
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes quest-complete {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  @keyframes border-flow {
    0% { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
  }

  :root {
    --bg: #050510;
    --panel: #0a0a20;
    --panel-edge: #151535;
    --cyan: #00f0ff;
    --magenta: #ff00aa;
    --gold: #ffd700;
    --gold-dim: #b8860b;
    --text: #c8d0e0;
    --dim: #4a5070;
    --str: #ff3344;
    --agi: #00bbff;
    --end: #00ff88;
    --success: #00ff88;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.015) 2px, rgba(0,240,255,0.015) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(0,240,255,0.02) 50px, rgba(0,240,255,0.02) 51px),
      repeating-linear-gradient(0deg, transparent, transparent 50px, rgba(0,240,255,0.02) 50px, rgba(0,240,255,0.02) 51px);
    pointer-events: none;
    z-index: 0;
  }

  body::after { display: none; }

  .app {
    max-width: 440px;
    margin: 0 auto;
    padding: 0 12px 60px;
    position: relative;
    z-index: 1;
  }

  /* === CHARACTER HUD === */
  .hud {
    padding: 16px 0 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hud-avatar {
    width: 52px;
    height: 52px;
    border: 2px solid var(--cyan);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: linear-gradient(135deg, #0a1525, #152040);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 0 15px rgba(0,240,255,0.2);
  }

  .hud-avatar::after {
    content: '';
    position: absolute;
    inset: -3px;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: linear-gradient(135deg, var(--cyan), var(--magenta));
    z-index: -1;
    opacity: 0.4;
  }

  .hud-info { flex: 1; min-width: 0; }

  .hud-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--cyan);
    opacity: 0.7;
  }

  .hud-name {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--text), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hud-class {
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 1px;
  }

  .hud-level {
    text-align: center;
    flex-shrink: 0;
  }

  .hud-level-num {
    font-size: 1.8rem;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(180deg, var(--gold), var(--gold-dim));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 8px rgba(255,215,0,0.4));
  }

  .hud-level-label {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold-dim);
  }

  /* === XP BAR === */
  .xp-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .xp-track {
    height: 8px;
    background: #0d0d25;
    border: 1px solid #1a1a40;
    clip-path: polygon(4px 0, calc(100% - 4px) 0, 100% 50%, calc(100% - 4px) 100%, 4px 100%, 0 50%);
    overflow: hidden;
    position: relative;
  }

  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold), #fff8dc);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    box-shadow: 0 0 12px rgba(255,215,0,0.5);
  }

  .xp-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    width: 20px;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6));
  }

  .xp-text {
    font-size: 0.6rem;
    color: var(--gold-dim);
    text-align: right;
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* === STATS PANEL === */
  .stats-panel {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .stat-block {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    padding: 10px 8px 8px;
    position: relative;
    clip-path: polygon(0 6px, 6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%);
  }

  .stat-block::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
  }

  .stat-block.str::before { background: linear-gradient(90deg, var(--str), transparent); }
  .stat-block.agi::before { background: linear-gradient(90deg, var(--agi), transparent); }
  .stat-block.end::before { background: linear-gradient(90deg, var(--end), transparent); }

  .stat-name {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .stat-block.str .stat-name { color: var(--str); }
  .stat-block.agi .stat-name { color: var(--agi); }
  .stat-block.end .stat-name { color: var(--end); }

  .stat-value {
    font-size: 1.4rem;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-block.str .stat-value { color: var(--str); text-shadow: 0 0 10px rgba(255,51,68,0.3); }
  .stat-block.agi .stat-value { color: var(--agi); text-shadow: 0 0 10px rgba(0,187,255,0.3); }
  .stat-block.end .stat-value { color: var(--end); text-shadow: 0 0 10px rgba(0,255,136,0.3); }

  .stat-bar-track {
    height: 3px;
    background: #0d0d25;
    border-radius: 1px;
    overflow: hidden;
  }

  .stat-bar-fill {
    height: 100%;
    border-radius: 1px;
    animation: stat-fill 1s ease-out;
  }

  .stat-block.str .stat-bar-fill { background: var(--str); box-shadow: 0 0 6px var(--str); }
  .stat-block.agi .stat-bar-fill { background: var(--agi); box-shadow: 0 0 6px var(--agi); }
  .stat-block.end .stat-bar-fill { background: var(--end); box-shadow: 0 0 6px var(--end); }

  /* === MISSION BRIEFING === */
  .mission {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .mission::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--cyan), var(--magenta), var(--cyan));
    background-size: 200% 100%;
    animation: border-flow 3s linear infinite;
  }

  .mission-header {
    padding: 14px 16px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .mission-tag {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--cyan);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mission-tag::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--cyan);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    animation: glow-pulse 2s ease infinite;
  }

  .mission-type {
    font-size: 1.3rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 8px 16px 14px;
    background: linear-gradient(90deg, var(--text), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .mission-progress {
    padding: 0 16px 12px;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 1px;
  }

  .mission-progress span {
    color: var(--cyan);
    font-weight: 700;
  }

  /* === SKILL CARDS (exercises) === */
  .skill-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .skill-card {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    padding: 14px 16px;
    position: relative;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    animation: slide-in 0.3s ease backwards;
  }

  .skill-card:nth-child(1) { animation-delay: 0.05s; }
  .skill-card:nth-child(2) { animation-delay: 0.1s; }
  .skill-card:nth-child(3) { animation-delay: 0.15s; }

  .skill-card.all-done {
    border-color: var(--success);
    box-shadow: 0 0 15px rgba(0,255,136,0.1);
  }

  .skill-card.all-done::after {
    content: 'CLEAR';
    position: absolute;
    top: 8px;
    right: 20px;
    font-size: 0.5rem;
    letter-spacing: 2px;
    color: var(--success);
    font-weight: 800;
  }

  .skill-name {
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  .skill-detail {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .skill-sets {
    display: flex;
    gap: 10px;
  }

  /* === DIAMOND SET BUTTONS === */
  .set-btn {
    width: 42px;
    height: 42px;
    transform: rotate(45deg);
    border: 2px solid #2a2a50;
    background: #0a0a1f;
    color: var(--dim);
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .set-btn span {
    transform: rotate(-45deg);
    display: block;
  }

  .set-btn:active {
    transform: rotate(45deg) scale(0.85);
  }

  .set-btn.done {
    background: linear-gradient(135deg, #003322, #004433);
    border-color: var(--success);
    color: var(--success);
    box-shadow: 0 0 12px rgba(0,255,136,0.25), inset 0 0 8px rgba(0,255,136,0.1);
    animation: diamond-pop 0.3s ease;
  }

  .set-btn.done::before {
    content: '';
    position: absolute;
    inset: -4px;
    border: 1px solid var(--success);
    opacity: 0.3;
  }

  /* === COMPLETE BUTTON === */
  .complete-btn {
    width: 100%;
    padding: 16px;
    border: 2px solid #2a2a50;
    background: #0a0a1f;
    color: var(--dim);
    font-size: 0.85rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 3px;
    cursor: default;
    clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px), 0 8px);
    transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .complete-btn.ready {
    border-color: var(--cyan);
    color: var(--cyan);
    cursor: pointer;
    background: linear-gradient(135deg, #001525, #0a1535);
    box-shadow: 0 0 20px rgba(0,240,255,0.15);
    text-shadow: 0 0 10px rgba(0,240,255,0.5);
  }

  .complete-btn.ready::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(0,240,255,0.05), transparent);
    animation: quest-complete 2s linear infinite;
    background-size: 200% 100%;
  }

  .complete-btn.ready:active {
    transform: scale(0.98);
    box-shadow: 0 0 30px rgba(0,240,255,0.3);
  }

  /* === QUEST LOG (Solo Leveling style) === */
  .quest-log {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .quest-log::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--magenta), transparent);
  }

  .quest-header {
    padding: 12px 16px 8px;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--magenta);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .quest-header::before {
    content: '!';
    display: inline-flex;
    width: 16px;
    height: 16px;
    align-items: center;
    justify-content: center;
    background: var(--magenta);
    color: var(--bg);
    font-weight: 900;
    font-size: 0.6rem;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }

  .quest-item {
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
    border-top: 1px solid #0d0d25;
    position: relative;
  }

  .quest-item:last-child {
    padding-bottom: 12px;
  }

  .quest-diamond {
    width: 12px;
    height: 12px;
    border: 2px solid #2a2a50;
    transform: rotate(45deg);
    flex-shrink: 0;
    transition: all 0.3s;
  }

  .quest-diamond.done {
    background: var(--success);
    border-color: var(--success);
    box-shadow: 0 0 8px rgba(0,255,136,0.4);
  }

  .quest-label { color: var(--text); }
  .quest-label.done {
    color: var(--dim);
    text-decoration: line-through;
    text-decoration-color: var(--dim);
  }

  /* === STREAK & TIMELINE === */
  .timeline-section {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .streak-display {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    padding: 12px;
    text-align: center;
    flex-shrink: 0;
    width: 80px;
    clip-path: polygon(0 6px, 6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%);
  }

  .streak-num {
    font-size: 2rem;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(180deg, var(--cyan), var(--agi));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 6px rgba(0,240,255,0.3));
  }

  .streak-label {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dim);
    margin-top: 2px;
  }

  .week-track {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    padding: 8px;
    display: flex;
    gap: 4px;
    align-items: center;
    justify-content: center;
  }

  .week-cell {
    flex: 1;
    max-width: 44px;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    color: var(--dim);
    background: #0a0a1f;
    border: 1px solid #1a1a35;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    transition: all 0.3s;
  }

  .week-cell.done {
    background: linear-gradient(135deg, #002515, #003520);
    border-color: var(--success);
    color: var(--success);
    font-weight: 700;
    box-shadow: 0 0 8px rgba(0,255,136,0.15);
  }

  .week-cell.today {
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 8px rgba(0,240,255,0.2);
  }

  .week-cell.done.today {
    border-color: var(--success);
    color: var(--success);
  }

  /* === DONE BANNER === */
  .done-banner {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    padding: 32px 20px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .done-banner::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--success), var(--cyan), var(--success));
    background-size: 200% 100%;
    animation: border-flow 2s linear infinite;
  }

  .done-status {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--success);
    margin-bottom: 8px;
  }

  .done-title {
    font-size: 1.4rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--success), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .done-xp {
    font-size: 0.85rem;
    color: var(--gold);
    font-weight: 700;
  }

  .done-next {
    font-size: 0.7rem;
    color: var(--dim);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* === XP POPUP === */
  .xp-popup {
    position: fixed;
    top: 40%;
    left: 50%;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.4);
    pointer-events: none;
    animation: xp-float 1.2s ease forwards;
    z-index: 100;
    letter-spacing: 2px;
  }

  /* === LEVEL UP OVERLAY === */
  .levelup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,240,255,0.15);
    z-index: 200;
    animation: levelup-flash 1.5s ease forwards;
    pointer-events: none;
  }

  .levelup-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.4);
    z-index: 201;
    animation: levelup-text 1.5s ease forwards;
    pointer-events: none;
  }

  /* === SYNC BADGE === */
  .sync-badge {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 3px 8px;
    border: 1px solid var(--panel-edge);
    background: var(--panel);
    color: var(--dim);
    display: inline-block;
  }
  .sync-badge.synced { border-color: var(--success); color: var(--success); }
  .sync-badge.syncing { border-color: var(--cyan); color: var(--cyan); animation: glow-pulse 1s ease infinite; }
  .sync-badge.error { border-color: var(--str); color: var(--str); }
  .sync-badge.local { color: var(--dim); }

  /* === CORNER DECORATIONS === */
  .corner-tl, .corner-br {
    position: fixed;
    width: 30px;
    height: 30px;
    border-color: var(--cyan);
    border-style: solid;
    opacity: 0.15;
    pointer-events: none;
    z-index: 2;
  }
  .corner-tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
  .corner-br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>
<div class="corner-tl"></div>
<div class="corner-br"></div>
<div class="app" id="app"></div>
<script>
const SYNC_URL = 'https://anime-bod-sync.YOUR_SUBDOMAIN.workers.dev/api/sync';
const params = new URLSearchParams(window.location.search);
const USER_KEY = params.get('key');
let syncState = USER_KEY ? 'local' : null;
let syncDebounceTimer = null;

const SPLITS = {
  push: { label: 'Push Day', tag: 'STRENGTH', stat: 'str', exercises: [
    { id: 'pike-pushups', name: 'Pike Push-ups', defaultSets: 3, defaultReps: 10 },
    { id: 'decline-deficit-pushups', name: 'Decline Deficit Push-ups', defaultSets: 3, defaultReps: 12 },
    { id: 'dips', name: 'Dips', defaultSets: 3, defaultReps: 10 }
  ]},
  pull: { label: 'Pull Day', tag: 'AGILITY', stat: 'agi', exercises: [
    { id: 'pullups', name: 'Pull-ups', defaultSets: 3, defaultReps: 8 },
    { id: 'inverted-rows', name: 'Inverted Rows', defaultSets: 3, defaultReps: 12 }
  ]},
  legs: { label: 'Legs Day', tag: 'ENDURANCE', stat: 'end', exercises: [
    { id: 'pistol-squats', name: 'Pistol Squats', defaultSets: 3, defaultReps: 6 },
    { id: 'hip-hinges', name: 'Hip Hinges', defaultSets: 3, defaultReps: 12 },
    { id: 'dragonflies', name: 'Dragonflies', defaultSets: 3, defaultReps: 8 }
  ]}
};
const SPLIT_ORDER = ['push', 'pull', 'legs'];
const XP_SET = 5, XP_EXERCISE = 15, XP_WORKOUT = 30;

const store = {
  get() {
    try { return JSON.parse(localStorage.getItem('anime-bod') || 'null') || this.fresh(); }
    catch { return this.fresh(); }
  },
  save(d) { localStorage.setItem('anime-bod', JSON.stringify(d)); },
  fresh() {
    return {
      version: 1,
      player: { name: 'Hero', xp: 0, level: 1, stats: { str: 0, agi: 0, end: 0 }, streak: { current: 0, best: 0, lastDate: null } },
      workouts: {},
      quests: {},
      settings: {}
    };
  },
  async sync() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      await fetch(`${SYNC_URL}?key=${USER_KEY}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: localStorage.getItem('anime-bod')
      });
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  },
  async pull() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      const res = await fetch(`${SYNC_URL}?key=${USER_KEY}`);
      if (res.ok) {
        const remote = await res.json();
        const local = this.get();
        const merged = mergeState(local, remote);
        this.save(merged);
      }
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  }
};

function mergeState(local, remote) {
  if (!remote || !remote.workouts) return local;
  if (!local || !local.workouts) return remote;

  const merged = JSON.parse(JSON.stringify(local));

  Object.keys(remote.workouts).forEach(day => {
    const rw = remote.workouts[day];
    const lw = merged.workouts[day];
    if (!lw) { merged.workouts[day] = rw; return; }
    if (rw.completedAt && !lw.completedAt) { merged.workouts[day] = rw; return; }
  });

  Object.keys(remote.quests || {}).forEach(day => {
    if (!merged.quests[day]) merged.quests[day] = remote.quests[day];
  });

  if (remote.player.xp > merged.player.xp) {
    merged.player.xp = remote.player.xp;
    merged.player.level = remote.player.level;
  }
  if ((remote.player.streak?.best || 0) > (merged.player.streak?.best || 0)) {
    merged.player.streak.best = remote.player.streak.best;
  }

  return merged;
}

function setSyncState(state) {
  syncState = state;
  const el = document.getElementById('sync-badge');
  if (!el) return;
  el.className = 'sync-badge ' + state;
  el.textContent = state === 'syncing' ? 'syncing...' : state === 'synced' ? 'synced' : state === 'error' ? 'offline' : 'local only';
}

function debouncedSync() {
  if (!USER_KEY) return;
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(() => store.sync(), 2000);
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function xpForLevel(n) { return 50 * n + 10 * n * n; }

function getCompletedCount(d) {
  return Object.values(d.workouts).filter(w => w.completedAt).length;
}

function getTodayType(d) {
  return SPLIT_ORDER[getCompletedCount(d) % 3];
}

function ensureTodayWorkout(d) {
  const key = todayStr();
  if (d.workouts[key] && d.workouts[key].completedAt) return d;
  const type = getTodayType(d);
  if (!d.workouts[key] || d.workouts[key].type !== type) {
    d.workouts[key] = {
      type,
      exercises: SPLITS[type].exercises.map(ex => ({
        id: ex.id, sets: Array.from({ length: ex.defaultSets }, () => ({ done: false }))
      })),
      completedAt: null,
      xpEarned: 0
    };
  }
  return d;
}

function ensureTodayQuests(d) {
  const key = todayStr();
  if (d.quests[key]) return d;
  const type = getTodayType(d);
  const split = SPLITS[type];
  const quests = [
    { id: 'complete-workout', label: `Complete ${split.label}`, done: false },
    { id: 'all-sets', label: 'Finish every set', done: false }
  ];
  if (type === 'push') quests.push({ id: 'pike-master', label: 'Complete all Pike Push-ups', done: false });
  if (type === 'pull') quests.push({ id: 'pull-master', label: 'Complete all Pull-ups', done: false });
  if (type === 'legs') quests.push({ id: 'pistol-master', label: 'Complete all Pistol Squats', done: false });
  d.quests[key] = quests;
  return d;
}

function updateQuests(d) {
  const key = todayStr();
  const w = d.workouts[key];
  const q = d.quests[key];
  if (!w || !q) return;
  const allSetsDone = w.exercises.every(ex => ex.sets.every(s => s.done));
  q.forEach(quest => {
    if (quest.id === 'complete-workout') quest.done = !!w.completedAt;
    if (quest.id === 'all-sets') quest.done = allSetsDone;
    if (quest.id === 'pike-master') quest.done = w.exercises.find(e => e.id === 'pike-pushups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pull-master') quest.done = w.exercises.find(e => e.id === 'pullups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pistol-master') quest.done = w.exercises.find(e => e.id === 'pistol-squats')?.sets.every(s => s.done) || false;
  });
}

function calcStreak(d) {
  let streak = 0;
  const t = new Date();
  if (d.workouts[todayStr()]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
  else { t.setDate(t.getDate() - 1); }
  for (let i = 0; i < 365; i++) {
    const key = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const dow = t.getDay();
    if (dow === 0) { t.setDate(t.getDate() - 1); continue; }
    if (d.workouts[key]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
    else break;
  }
  return streak;
}

function calcStats(d) {
  const stats = { str: 0, agi: 0, end: 0 };
  Object.values(d.workouts).forEach(w => {
    if (!w.completedAt) return;
    const split = SPLITS[w.type];
    if (!split) return;
    const vol = w.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => s.done).length, 0);
    stats[split.stat] += vol;
  });
  return stats;
}

function awardXP(d, amount) {
  const oldLevel = d.player.level;
  d.player.xp += amount;
  while (d.player.xp >= xpForLevel(d.player.level)) {
    d.player.level++;
  }
  return d.player.level > oldLevel;
}

let pendingXpPopup = 0;
function showXpPopup(amount) {
  pendingXpPopup += amount;
  const el = document.createElement('div');
  el.className = 'xp-popup';
  el.textContent = `+${pendingXpPopup} XP`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
  setTimeout(() => { pendingXpPopup = 0; }, 100);
}

function showLevelUp() {
  const flash = document.createElement('div');
  flash.className = 'levelup-overlay';
  document.body.appendChild(flash);
  const txt = document.createElement('div');
  txt.className = 'levelup-text';
  txt.textContent = 'LEVEL UP';
  document.body.appendChild(txt);
  setTimeout(() => { flash.remove(); txt.remove(); }, 1500);
}

function render() {
  const d = store.get();
  ensureTodayWorkout(d);
  ensureTodayQuests(d);
  d.player.stats = calcStats(d);
  d.player.streak.current = calcStreak(d);
  if (d.player.streak.current > d.player.streak.best) d.player.streak.best = d.player.streak.current;
  store.save(d);

  const key = todayStr();
  const w = d.workouts[key];
  const type = w.type;
  const split = SPLITS[type];
  const streak = d.player.streak.current;
  const level = d.player.level;
  const prevLevelXp = level > 1 ? xpForLevel(level - 1) : 0;
  const xpCur = d.player.xp - prevLevelXp;
  const xpNeed = xpForLevel(level) - prevLevelXp;
  const xpPct = Math.min(100, (xpCur / xpNeed) * 100);
  const totalCompleted = getCompletedCount(d);
  const maxStat = Math.max(d.player.stats.str, d.player.stats.agi, d.player.stats.end, 1);

  let h = '';

  // HUD
  h += `<div class="hud">`;
  h += `<div class="hud-avatar">${level}</div>`;
  h += `<div class="hud-info">`;
  h += `<div class="hud-title">Player Status</div>`;
  h += `<div class="hud-name">Anime Physique</div>`;
  h += `<div class="hud-class">${split.tag} // ${split.label.toUpperCase()}</div>`;
  h += `</div>`;
  h += `<div class="hud-level"><div class="hud-level-num">${level}</div><div class="hud-level-label">Level</div></div>`;
  h += `</div>`;
  if (USER_KEY) {
    const badgeLabel = syncState === 'syncing' ? 'syncing...' : syncState === 'synced' ? 'synced' : syncState === 'error' ? 'offline' : 'local only';
    h += `<div style="text-align:right;margin-bottom:4px"><span id="sync-badge" class="sync-badge ${syncState || 'local'}">${badgeLabel}</span></div>`;
  }

  // XP Bar
  h += `<div class="xp-wrap">`;
  h += `<div class="xp-track"><div class="xp-fill" style="width:${xpPct}%"></div></div>`;
  h += `<div class="xp-text">${xpCur} / ${xpNeed} XP</div>`;
  h += `</div>`;

  // Stats
  h += `<div class="stats-panel">`;
  ['str', 'agi', 'end'].forEach(s => {
    const label = s.toUpperCase();
    const val = d.player.stats[s];
    const pct = Math.min(100, (val / maxStat) * 100);
    h += `<div class="stat-block ${s}">`;
    h += `<div class="stat-name">${label}</div>`;
    h += `<div class="stat-value">${val}</div>`;
    h += `<div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%"></div></div>`;
    h += `</div>`;
  });
  h += `</div>`;

  if (w.completedAt) {
    // Done state
    const nextType = SPLIT_ORDER[totalCompleted % 3];
    const nextSplit = SPLITS[nextType];
    h += `<div class="done-banner">`;
    h += `<div class="done-status">Mission Complete</div>`;
    h += `<div class="done-title">${split.label}</div>`;
    h += `<div class="done-xp">+${w.xpEarned} XP EARNED</div>`;
    h += `<div class="done-next">NEXT MISSION // ${nextSplit.label.toUpperCase()}</div>`;
    h += `</div>`;
  } else {
    // Mission header
    let totalSets = 0, doneSets = 0;
    w.exercises.forEach(ex => {
      ex.sets.forEach(s => { totalSets++; if (s.done) doneSets++; });
    });

    h += `<div class="mission">`;
    h += `<div class="mission-header"><span class="mission-tag">Today's Mission</span></div>`;
    h += `<div class="mission-type">${split.label}</div>`;
    h += `<div class="mission-progress"><span>${doneSets}</span> / ${totalSets} sets cleared</div>`;
    h += `</div>`;

    // Skill cards
    h += `<div class="skill-list">`;
    w.exercises.forEach((ex, ei) => {
      const cfg = split.exercises[ei];
      const allDone = ex.sets.every(s => s.done);
      h += `<div class="skill-card ${allDone ? 'all-done' : ''}">`;
      h += `<div class="skill-name">${cfg.name}</div>`;
      h += `<div class="skill-detail">${cfg.defaultSets} SETS / ${cfg.defaultReps} REPS</div>`;
      h += `<div class="skill-sets">`;
      ex.sets.forEach((s, si) => {
        h += `<button class="set-btn ${s.done ? 'done' : ''}" onclick="toggleSet(${ei},${si})"><span>${si + 1}</span></button>`;
      });
      h += `</div></div>`;
    });
    h += `</div>`;

    // Complete button
    const canComplete = doneSets === totalSets && totalSets > 0;
    h += `<button class="complete-btn ${canComplete ? 'ready' : ''}" ${canComplete ? 'onclick="completeWorkout()"' : ''}>`;
    h += canComplete ? 'Execute Mission' : `${doneSets} / ${totalSets} Sets`;
    h += `</button>`;
  }

  // Quest log
  updateQuests(d);
  store.save(d);
  const quests = d.quests[key] || [];
  h += `<div class="quest-log">`;
  h += `<div class="quest-header">Quest Log</div>`;
  quests.forEach(q => {
    h += `<div class="quest-item">`;
    h += `<div class="quest-diamond ${q.done ? 'done' : ''}"></div>`;
    h += `<span class="quest-label ${q.done ? 'done' : ''}">${q.label}</span>`;
    h += `</div>`;
  });
  h += `</div>`;

  // Timeline
  h += `<div class="timeline-section">`;
  h += `<div class="streak-display"><div class="streak-num">${streak}</div><div class="streak-label">Streak</div></div>`;
  h += `<div class="week-track">`;
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
  const dayLabels = ['M','T','W','T','F','S','S'];
  for (let i = 0; i < 7; i++) {
    const dt = new Date(mon);
    dt.setDate(dt.getDate() + i);
    const dk = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const isToday = dk === todayStr();
    const wk = d.workouts[dk];
    const done = wk?.completedAt;
    h += `<div class="week-cell ${done ? 'done' : ''} ${isToday ? 'today' : ''}">${dayLabels[i]}</div>`;
  }
  h += `</div></div>`;

  document.getElementById('app').innerHTML = h;
}

function toggleSet(ei, si) {
  const d = store.get();
  ensureTodayWorkout(d);
  const w = d.workouts[todayStr()];
  if (w.completedAt) return;

  const set = w.exercises[ei].sets[si];
  const wasDone = set.done;
  set.done = !set.done;

  if (!wasDone) {
    awardXP(d, XP_SET);
    showXpPopup(XP_SET);
    const allExSets = w.exercises[ei].sets.every(s => s.done);
    if (allExSets) {
      awardXP(d, XP_EXERCISE);
      showXpPopup(XP_EXERCISE);
    }
  } else {
    const wasAllDone = w.exercises[ei].sets.filter((s, idx) => idx !== si).every(s => s.done);
    if (wasAllDone) d.player.xp = Math.max(0, d.player.xp - XP_EXERCISE);
    d.player.xp = Math.max(0, d.player.xp - XP_SET);
    while (d.player.level > 1 && d.player.xp < xpForLevel(d.player.level - 1)) d.player.level--;
  }

  store.save(d);
  render();
  debouncedSync();
}

function completeWorkout() {
  const d = store.get();
  const key = todayStr();
  const w = d.workouts[key];
  if (w.completedAt) return;
  if (!w.exercises.every(ex => ex.sets.every(s => s.done))) return;

  let earned = XP_WORKOUT;
  const streak = calcStreak(d) + 1;
  earned += streak * 2;
  w.xpEarned = (w.xpEarned || 0) + earned;
  w.completedAt = new Date().toISOString();

  const leveled = awardXP(d, earned);
  showXpPopup(earned);

  d.player.streak.current = streak;
  if (streak > d.player.streak.best) d.player.streak.best = streak;
  d.player.streak.lastDate = key;

  store.save(d);
  render();

  if (leveled) {
    setTimeout(showLevelUp, 200);
  }

  store.sync();
}

render();
store.pull().then(() => render());
</script>
</body>
</html>
