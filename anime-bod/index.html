<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ANIME PHYSIQUE // TRAINING CONSOLE</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1b1b3a">
<style>
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes xp-float {
    0% { opacity: 1; transform: translate(-50%, 0) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -10px) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(1); }
  }
  @keyframes levelup-flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes levelup-text {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    60% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes stat-fill {
    from { width: 0; }
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes border-glow {
    0%, 100% { box-shadow: inset 0 0 12px rgba(0,195,255,0.08); }
    50% { box-shadow: inset 0 0 20px rgba(0,195,255,0.15); }
  }
  @keyframes console-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes power-bar {
    from { width: 0; }
  }
  @keyframes gauge-fill {
    from { stroke-dashoffset: 220; }
  }

  :root {
    --bg: #1b1b3a;
    --panel: #232350;
    --panel-edge: #3a3a6e;
    --cyan: #00c3ff;
    --orange: #ff6b00;
    --orange-dim: #cc5500;
    --orange-glow: rgba(255,107,0,0.3);
    --text: #e0e0f0;
    --dim: #7070a0;
    --success: #00e676;
    --str: #ff4455;
    --agi: #00c3ff;
    --end: #00e676;
    --seam: #2a2a55;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(0,195,255,0.06) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,195,255,0.02) 3px, rgba(0,195,255,0.02) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    max-width: 420px;
    margin: 0 auto;
    padding: 0 14px 60px;
    position: relative;
    z-index: 1;
  }

  /* === CONSOLE HEADER === */
  .console-header {
    padding: 20px 0 8px;
    text-align: center;
    position: relative;
  }

  .console-logo {
    font-size: 0.6rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--cyan);
    opacity: 0.7;
    margin-bottom: 2px;
  }

  .console-title {
    font-size: 1.3rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--text);
    text-shadow: 0 0 20px rgba(0,195,255,0.3);
  }

  .console-subtitle {
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--dim);
    margin-top: 2px;
  }

  .console-session {
    font-size: 0.55rem;
    letter-spacing: 2px;
    color: var(--orange);
    margin-top: 4px;
    font-weight: 700;
  }

  /* === XP BAR === */
  .xp-wrap {
    position: relative;
    margin: 14px 0 16px;
  }

  .xp-label {
    font-size: 0.55rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 4px;
  }

  .xp-track {
    height: 14px;
    background: #15152e;
    border: 2px solid var(--seam);
    border-radius: 7px;
    overflow: hidden;
    position: relative;
  }

  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange-dim), var(--orange), #ffaa44);
    border-radius: 5px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    box-shadow: 0 0 12px var(--orange-glow);
  }

  .xp-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    width: 20px;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
    border-radius: 0 5px 5px 0;
  }

  .xp-text {
    font-size: 0.6rem;
    color: var(--orange);
    text-align: right;
    margin-top: 3px;
    letter-spacing: 1px;
    font-weight: 700;
  }

  /* === STAT GAUGES === */
  .stats-panel {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    justify-content: center;
  }

  .stat-gauge {
    flex: 1;
    background: var(--panel);
    border: 3px solid var(--panel-edge);
    border-radius: 12px;
    padding: 12px 8px 10px;
    text-align: center;
    position: relative;
    animation: border-glow 3s ease infinite;
  }

  .stat-gauge-circle {
    width: 60px;
    height: 60px;
    margin: 0 auto 6px;
    position: relative;
  }

  .stat-gauge-circle svg {
    transform: rotate(-90deg);
    width: 60px;
    height: 60px;
  }

  .stat-gauge-circle .track {
    fill: none;
    stroke: #15152e;
    stroke-width: 5;
  }

  .stat-gauge-circle .fill {
    fill: none;
    stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: 157;
    transition: stroke-dashoffset 1s ease-out;
    animation: gauge-fill 1s ease-out;
  }

  .stat-gauge-circle .fill.str { stroke: var(--str); filter: drop-shadow(0 0 4px rgba(255,68,85,0.5)); }
  .stat-gauge-circle .fill.agi { stroke: var(--agi); filter: drop-shadow(0 0 4px rgba(0,195,255,0.5)); }
  .stat-gauge-circle .fill.end { stroke: var(--end); filter: drop-shadow(0 0 4px rgba(0,230,118,0.5)); }

  .stat-gauge-val {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 900;
  }

  .stat-gauge.str .stat-gauge-val { color: var(--str); }
  .stat-gauge.agi .stat-gauge-val { color: var(--agi); }
  .stat-gauge.end .stat-gauge-val { color: var(--end); }

  .stat-gauge-label {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
  }

  .stat-gauge.str .stat-gauge-label { color: var(--str); }
  .stat-gauge.agi .stat-gauge-label { color: var(--agi); }
  .stat-gauge.end .stat-gauge-label { color: var(--end); }

  /* === MISSION PANEL === */
  .mission {
    background: var(--panel);
    border: 3px solid var(--panel-edge);
    border-radius: 12px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    animation: border-glow 3s ease infinite;
  }

  .mission-header {
    padding: 14px 16px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .mission-tag {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--cyan);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mission-tag::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--cyan);
    animation: glow-pulse 2s ease infinite;
  }

  .mission-type {
    font-size: 1.2rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 8px 16px 14px;
    color: var(--text);
  }

  .mission-progress {
    padding: 0 16px 12px;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 1px;
  }

  .mission-progress span {
    color: var(--cyan);
    font-weight: 700;
  }

  /* === EXERCISE CONTROL PANELS === */
  .skill-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .skill-card {
    background: var(--panel);
    border: 3px solid var(--panel-edge);
    border-radius: 12px;
    padding: 14px 16px;
    position: relative;
    animation: slide-in 0.3s ease backwards;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .skill-card:nth-child(1) { animation-delay: 0.05s; }
  .skill-card:nth-child(2) { animation-delay: 0.1s; }
  .skill-card:nth-child(3) { animation-delay: 0.15s; }

  .skill-card.all-done {
    border-color: var(--success);
    box-shadow: inset 0 0 15px rgba(0,230,118,0.1), 0 0 10px rgba(0,230,118,0.1);
  }

  .skill-card.all-done::after {
    content: 'CLEAR';
    position: absolute;
    top: 14px;
    right: 16px;
    font-size: 0.55rem;
    letter-spacing: 2px;
    color: var(--success);
    font-weight: 800;
    background: rgba(0,230,118,0.1);
    padding: 2px 8px;
    border-radius: 8px;
  }

  .skill-name {
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  .skill-video {
    color: var(--cyan);
    text-decoration: none;
    margin-left: 8px;
    transition: all 0.2s;
    display: inline-block;
    vertical-align: middle;
    filter: drop-shadow(0 0 4px rgba(0,195,255,0.4));
    opacity: 0.8;
  }
  .skill-video:active { transform: scale(1.2); opacity: 1; }

  .skill-detail {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .skill-sets {
    display: flex;
    gap: 8px;
  }

  /* === CHUNKY SET BUTTONS === */
  .set-btn {
    width: 52px;
    height: 44px;
    border: 3px solid var(--seam);
    border-radius: 10px;
    background: #15152e;
    color: var(--dim);
    font-size: 0.85rem;
    font-weight: 800;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .set-btn span {
    display: block;
  }

  .set-btn:active {
    transform: scale(0.9);
  }

  .set-btn.done {
    background: linear-gradient(180deg, var(--orange), var(--orange-dim));
    border-color: var(--orange);
    color: #fff;
    box-shadow: 0 0 14px var(--orange-glow), inset 0 1px 0 rgba(255,255,255,0.2);
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  .set-btn.partial {
    background: linear-gradient(180deg, #3a2800, #2a1e00);
    border-color: var(--orange-dim);
    border-style: dashed;
    color: var(--orange-dim);
    box-shadow: 0 0 6px var(--orange-glow);
  }

  /* === COMPLETE BUTTON === */
  .complete-btn {
    width: 100%;
    padding: 18px;
    border: 3px solid var(--seam);
    border-radius: 14px;
    background: #15152e;
    color: var(--dim);
    font-size: 0.9rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 3px;
    cursor: default;
    transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .complete-btn.ready {
    border-color: var(--cyan);
    color: #fff;
    cursor: pointer;
    background: linear-gradient(180deg, #1a4a6a, #0d3050);
    box-shadow: 0 0 16px rgba(0,195,255,0.2);
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  .complete-btn.ready.perfect {
    border-color: var(--orange);
    background: linear-gradient(180deg, var(--orange), var(--orange-dim));
    box-shadow: 0 0 24px var(--orange-glow), inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .complete-btn.ready:active {
    transform: scale(0.98);
    box-shadow: 0 0 32px var(--orange-glow);
  }

  /* === QUEST LOG === */
  .quest-log {
    background: var(--panel);
    border: 3px solid var(--panel-edge);
    border-radius: 12px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .quest-header {
    padding: 12px 16px 8px;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--cyan);
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
  }

  .quest-header::before {
    content: '!';
    display: inline-flex;
    width: 18px;
    height: 18px;
    align-items: center;
    justify-content: center;
    background: var(--cyan);
    color: var(--bg);
    font-weight: 900;
    font-size: 0.6rem;
    border-radius: 50%;
  }

  .quest-item {
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
    border-top: 1px solid var(--seam);
    position: relative;
  }

  .quest-item:last-child {
    padding-bottom: 12px;
  }

  .quest-diamond {
    width: 16px;
    height: 16px;
    border: 2px solid var(--seam);
    border-radius: 50%;
    flex-shrink: 0;
    transition: all 0.3s;
  }

  .quest-diamond.done {
    background: var(--success);
    border-color: var(--success);
    box-shadow: 0 0 8px rgba(0,230,118,0.4);
  }

  .quest-label { color: var(--text); }
  .quest-label.done {
    color: var(--dim);
    text-decoration: line-through;
    text-decoration-color: var(--dim);
  }

  /* === STREAK & TIMELINE === */
  .timeline-section {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .streak-display {
    background: var(--panel);
    border: 3px solid var(--panel-edge);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    flex-shrink: 0;
    width: 80px;
  }

  .streak-num {
    font-size: 2rem;
    font-weight: 900;
    line-height: 1;
    color: var(--cyan);
    text-shadow: 0 0 12px rgba(0,195,255,0.4);
  }

  .streak-label {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dim);
    margin-top: 2px;
  }

  .week-track {
    flex: 1;
    background: var(--panel);
    border: 3px solid var(--panel-edge);
    border-radius: 12px;
    padding: 8px;
    display: flex;
    gap: 5px;
    align-items: center;
    justify-content: center;
  }

  .week-cell {
    flex: 1;
    max-width: 38px;
    height: 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    font-weight: 700;
    color: var(--dim);
    background: #15152e;
    border: 2px solid var(--seam);
    border-radius: 18px;
    transition: all 0.3s;
  }

  .week-cell.done {
    background: linear-gradient(180deg, rgba(0,230,118,0.2), rgba(0,230,118,0.1));
    border-color: var(--success);
    color: var(--success);
    box-shadow: 0 0 8px rgba(0,230,118,0.15);
  }

  .week-cell.today {
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 8px rgba(0,195,255,0.2);
  }

  .week-cell.done.today {
    border-color: var(--success);
    color: var(--success);
  }

  /* === DONE BANNER === */
  .done-banner {
    background: var(--panel);
    border: 3px solid var(--success);
    border-radius: 12px;
    padding: 32px 20px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 20px rgba(0,230,118,0.08);
  }

  .done-status {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--success);
    margin-bottom: 8px;
  }

  .done-title {
    font-size: 1.4rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .done-xp {
    font-size: 0.85rem;
    color: var(--orange);
    font-weight: 700;
  }

  .done-next {
    font-size: 0.7rem;
    color: var(--dim);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* === XP POPUP === */
  .xp-popup {
    position: fixed;
    top: 40%;
    left: 50%;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--orange);
    text-shadow: 0 0 20px var(--orange-glow), 0 0 40px var(--orange-glow);
    pointer-events: none;
    animation: xp-float 1.2s ease forwards;
    z-index: 100;
    letter-spacing: 2px;
  }

  /* === LEVEL UP OVERLAY === */
  .levelup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,107,0,0.15);
    z-index: 200;
    animation: levelup-flash 1.5s ease forwards;
    pointer-events: none;
  }

  .levelup-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2.8rem;
    font-weight: 900;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--orange);
    text-shadow: 0 0 30px var(--orange-glow), 0 0 60px var(--orange-glow);
    z-index: 201;
    animation: levelup-text 1.5s ease forwards;
    pointer-events: none;
  }

  /* === SYNC BADGE === */
  .sync-badge {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 3px 10px;
    border: 2px solid var(--panel-edge);
    border-radius: 10px;
    background: var(--panel);
    color: var(--dim);
    display: inline-block;
  }
  .sync-badge.synced { border-color: var(--success); color: var(--success); }
  .sync-badge.syncing { border-color: var(--cyan); color: var(--cyan); animation: glow-pulse 1s ease infinite; }
  .sync-badge.error { border-color: var(--str); color: var(--str); }
  .sync-badge.local { color: var(--dim); }

  .session-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    margin-bottom: 8px;
    background: var(--panel);
    border: 2px solid var(--panel-edge);
    border-radius: 10px;
    font-size: 0.7rem;
  }
  .session-bar .session-name {
    color: var(--cyan);
    font-weight: 700;
    letter-spacing: 1px;
  }
  .session-bar.no-key span {
    color: var(--dim);
  }
  .link-btn {
    background: var(--panel);
    border: 2px solid var(--cyan);
    border-radius: 8px;
    color: var(--cyan);
    font-size: 0.65rem;
    font-weight: 700;
    padding: 5px 12px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .link-btn:active {
    background: rgba(0,195,255,0.15);
  }

  .help-btn {
    position: absolute;
    top: 14px;
    left: 0;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--seam);
    background: var(--panel);
    color: var(--dim);
    font-size: 0.85rem;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .help-btn:active { background: var(--panel-edge); }
  .settings-btn {
    position: absolute;
    top: 14px;
    left: 40px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--seam);
    background: var(--panel);
    color: var(--dim);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .settings-btn:active { background: var(--panel-edge); }
  .settings-modal { position: fixed; inset: 0; z-index: 300; display: flex; align-items: center; justify-content: center; }
  .settings-content {
    background: var(--panel);
    border: 2px solid var(--seam);
    border-radius: 12px;
    padding: 1.2rem;
    max-width: 340px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    z-index: 2;
  }
  .settings-content h3 { margin: 0 0 0.8rem; color: var(--fg); font-size: 1rem; }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--seam);
  }
  .settings-row label { color: var(--dim); font-size: 0.8rem; }
  .settings-row input[type="number"] {
    width: 50px;
    background: var(--bg);
    border: 1px solid var(--seam);
    border-radius: 4px;
    color: var(--fg);
    padding: 4px 6px;
    font-size: 0.85rem;
    text-align: center;
  }

  .help-modal { position: fixed; inset: 0; z-index: 300; display: flex; align-items: center; justify-content: center; }
  .help-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.7); }
  .help-content {
    position: relative;
    background: var(--panel);
    border: 3px solid var(--panel-edge);
    border-radius: 16px;
    padding: 24px 20px 20px;
    max-width: 360px;
    width: calc(100% - 40px);
    max-height: 80vh;
    overflow-y: auto;
  }
  .help-title {
    font-size: 1.1rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--cyan);
    margin-bottom: 16px;
  }
  .help-body p {
    font-size: 0.8rem;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 12px;
  }
  .help-body b { color: var(--orange); }
  .help-body em { color: var(--cyan); font-style: normal; }
  .help-close {
    width: 100%;
    margin-top: 8px;
    padding: 12px;
    border: 2px solid var(--cyan);
    border-radius: 10px;
    background: transparent;
    color: var(--cyan);
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
  }
  .help-close:active { background: rgba(0,195,255,0.1); }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const SYNC_URL = 'https://anime-bod-sync.winslowcj5.workers.dev/api/sync';
const params = new URLSearchParams(window.location.search);
const USER_KEY = params.get('key');
let syncState = USER_KEY ? 'local' : null;
let syncDebounceTimer = null;

const VID = 'https://www.youtube.com/watch?v=3Zgrh5009_k';
const SPLITS = {
  push: { label: 'Push Day', tag: 'STRENGTH', stat: 'str', exercises: [
    { id: 'pike-pushups', name: 'Pike Push-ups', defaultSets: 3, defaultReps: 10, video: `${VID}&t=188s` },
    { id: 'decline-deficit-pushups', name: 'Decline Deficit Push-ups', defaultSets: 3, defaultReps: 12, video: `${VID}&t=265s` },
    { id: 'dips', name: 'Dips', defaultSets: 3, defaultReps: 10, video: `${VID}&t=308s` }
  ]},
  pull: { label: 'Pull Day', tag: 'AGILITY', stat: 'agi', exercises: [
    { id: 'pullups', name: 'Pull-ups', defaultSets: 3, defaultReps: 8, video: `${VID}&t=55s` },
    { id: 'inverted-rows', name: 'Inverted Rows', defaultSets: 3, defaultReps: 12, video: `${VID}&t=125s` }
  ]},
  legs: { label: 'Legs Day', tag: 'ENDURANCE', stat: 'end', exercises: [
    { id: 'pistol-squats', name: 'Pistol Squats', defaultSets: 3, defaultReps: 6, video: `${VID}&t=373s` },
    { id: 'hip-hinges', name: 'Hip Hinges', defaultSets: 3, defaultReps: 12, video: `${VID}&t=411s` },
    { id: 'dragonflies', name: 'Dragonflies', defaultSets: 3, defaultReps: 8, video: `${VID}&t=479s` }
  ]}
};
const SPLIT_ORDER = ['push', 'pull', 'legs'];
const XP_SET_PARTIAL = 3, XP_SET = 5, XP_EXERCISE = 15, XP_WORKOUT = 30;

const store = {
  get() {
    try { return JSON.parse(localStorage.getItem('anime-bod') || 'null') || this.fresh(); }
    catch { return this.fresh(); }
  },
  save(d) { localStorage.setItem('anime-bod', JSON.stringify(d)); },
  fresh() {
    return {
      version: 1,
      player: { name: 'Hero', xp: 0, level: 1, stats: { str: 0, agi: 0, end: 0 }, streak: { current: 0, best: 0, lastDate: null } },
      workouts: {},
      quests: {},
      settings: {}
    };
  },
  async sync() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      await fetch(`${SYNC_URL}?key=${USER_KEY}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: localStorage.getItem('anime-bod')
      });
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  },
  async pull() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      const res = await fetch(`${SYNC_URL}?key=${USER_KEY}`);
      if (res.ok) {
        const remote = await res.json();
        const local = this.get();
        const merged = mergeState(local, remote);
        this.save(merged);
      }
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  }
};

function mergeState(local, remote) {
  if (!remote || !remote.workouts) return local;
  if (!local || !local.workouts) return remote;

  const merged = JSON.parse(JSON.stringify(local));

  Object.keys(remote.workouts).forEach(day => {
    const rw = remote.workouts[day];
    const lw = merged.workouts[day];
    if (!lw) { merged.workouts[day] = rw; return; }
    if (rw.completedAt && !lw.completedAt) { merged.workouts[day] = rw; return; }
    if (!lw.completedAt && !rw.completedAt) {
      const localDone = lw.exercises?.reduce((s, ex) => s + ex.sets.filter(x => x.done || x.state === 'done' || x.state === 'partial').length, 0) || 0;
      const remoteDone = rw.exercises?.reduce((s, ex) => s + ex.sets.filter(x => x.done || x.state === 'done' || x.state === 'partial').length, 0) || 0;
      if (remoteDone > localDone) { merged.workouts[day] = rw; return; }
    }
  });

  Object.keys(remote.quests || {}).forEach(day => {
    const rq = remote.quests[day];
    const lq = merged.quests[day];
    if (!lq) { merged.quests[day] = rq; return; }
    const remoteDone = rq.filter(q => q.done).length;
    const localDone = lq.filter(q => q.done).length;
    if (remoteDone > localDone) merged.quests[day] = rq;
  });

  if (remote.player.xp > merged.player.xp) {
    merged.player.xp = remote.player.xp;
    merged.player.level = remote.player.level;
  }
  if ((remote.player.streak?.best || 0) > (merged.player.streak?.best || 0)) {
    merged.player.streak.best = remote.player.streak.best;
  }

  return merged;
}

function setSyncState(state) {
  syncState = state;
  const el = document.getElementById('sync-badge');
  if (!el) return;
  el.className = 'sync-badge ' + state;
  el.textContent = state === 'syncing' ? 'syncing...' : state === 'synced' ? 'synced' : state === 'error' ? 'offline' : 'local only';
}

function debouncedSync() {
  if (!USER_KEY) return;
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(() => store.sync(), 2000);
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function xpForLevel(n) { return 50 * n + 10 * n * n; }

function getCompletedCount(d) {
  return Object.values(d.workouts).filter(w => w.completedAt).length;
}

function getTodayType(d) {
  return SPLIT_ORDER[getCompletedCount(d) % 3];
}

function ensureTodayWorkout(d) {
  const key = todayStr();
  if (d.workouts[key]) return d;
  const type = getTodayType(d);
  d.workouts[key] = {
    type,
    exercises: SPLITS[type].exercises.map(ex => ({
      id: ex.id, sets: Array.from({ length: ex.defaultSets }, () => ({ state: 'empty' }))
    })),
    completedAt: null,
    xpEarned: 0
  };
  return d;
}

function ensureTodayQuests(d) {
  const key = todayStr();
  if (d.quests[key]) return d;
  const type = getTodayType(d);
  const split = SPLITS[type];
  const quests = [
    { id: 'complete-workout', label: `Complete ${split.label}`, done: false },
    { id: 'all-sets', label: 'Full-clear every set (no partials)', done: false }
  ];
  if (type === 'push') quests.push({ id: 'pike-master', label: 'Full-clear all Pike Push-ups', done: false });
  if (type === 'pull') quests.push({ id: 'pull-master', label: 'Full-clear all Pull-ups', done: false });
  if (type === 'legs') quests.push({ id: 'pistol-master', label: 'Full-clear all Pistol Squats', done: false });
  d.quests[key] = quests;
  return d;
}

function setIsDone(s) { return s.state === 'done' || s.done === true; }
function setIsPartial(s) { return s.state === 'partial'; }
function setHasWork(s) { return setIsDone(s) || setIsPartial(s); }

function updateQuests(d) {
  const key = todayStr();
  const w = d.workouts[key];
  const q = d.quests[key];
  if (!w || !q) return;
  const allSetsDone = w.exercises.every(ex => ex.sets.every(s => setIsDone(s)));
  q.forEach(quest => {
    if (quest.id === 'complete-workout') quest.done = !!w.completedAt;
    if (quest.id === 'all-sets') quest.done = allSetsDone;
    if (quest.id === 'pike-master') quest.done = w.exercises.find(e => e.id === 'pike-pushups')?.sets.every(s => setIsDone(s)) || false;
    if (quest.id === 'pull-master') quest.done = w.exercises.find(e => e.id === 'pullups')?.sets.every(s => setIsDone(s)) || false;
    if (quest.id === 'pistol-master') quest.done = w.exercises.find(e => e.id === 'pistol-squats')?.sets.every(s => setIsDone(s)) || false;
  });
}

function calcStreak(d) {
  let streak = 0;
  const t = new Date();
  if (d.workouts[todayStr()]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
  else { t.setDate(t.getDate() - 1); }
  let missed = 0;
  for (let i = 0; i < 365; i++) {
    const key = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const dow = t.getDay();
    if (dow === 0) { t.setDate(t.getDate() - 1); continue; }
    if (d.workouts[key]?.completedAt) { streak++; missed = 0; t.setDate(t.getDate() - 1); }
    else { missed++; if (missed > 1) break; t.setDate(t.getDate() - 1); }
  }
  return streak;
}

function calcStats(d) {
  const stats = { str: 0, agi: 0, end: 0 };
  Object.values(d.workouts).forEach(w => {
    if (!w.completedAt) return;
    const split = SPLITS[w.type];
    if (!split) return;
    const vol = w.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => setHasWork(s)).length, 0);
    stats[split.stat] += vol;
  });
  return stats;
}

function awardXP(d, amount) {
  const oldLevel = d.player.level;
  d.player.xp += amount;
  while (d.player.xp >= xpForLevel(d.player.level)) {
    d.player.level++;
  }
  return d.player.level > oldLevel;
}

let pendingXpPopup = 0;
function showXpPopup(amount) {
  pendingXpPopup += amount;
  const el = document.createElement('div');
  el.className = 'xp-popup';
  el.textContent = `+${pendingXpPopup} XP`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
  setTimeout(() => { pendingXpPopup = 0; }, 100);
}

function showLevelUp() {
  const flash = document.createElement('div');
  flash.className = 'levelup-overlay';
  document.body.appendChild(flash);
  const txt = document.createElement('div');
  txt.className = 'levelup-text';
  txt.textContent = 'LEVEL UP';
  document.body.appendChild(txt);
  setTimeout(() => { flash.remove(); txt.remove(); }, 1500);
}

function render() {
  const d = store.get();
  ensureTodayWorkout(d);
  ensureTodayQuests(d);
  d.player.stats = calcStats(d);
  d.player.streak.current = calcStreak(d);
  if (d.player.streak.current > d.player.streak.best) d.player.streak.best = d.player.streak.current;
  store.save(d);

  const key = todayStr();
  const w = d.workouts[key];
  const type = w.type;
  const split = SPLITS[type];
  const streak = d.player.streak.current;
  const level = d.player.level;
  const prevLevelXp = level > 1 ? xpForLevel(level - 1) : 0;
  const xpCur = d.player.xp - prevLevelXp;
  const xpNeed = xpForLevel(level) - prevLevelXp;
  const xpPct = Math.min(100, (xpCur / xpNeed) * 100);
  const totalCompleted = getCompletedCount(d);
  const maxStat = Math.max(d.player.stats.str, d.player.stats.agi, d.player.stats.end, 1);

  const sessionNum = totalCompleted + 1;

  let h = '';

  // Console Header
  h += `<div class="console-header">`;
  h += `<button class="help-btn" onclick="toggleHelp()" aria-label="Help">?</button>`;
  h += `<button class="settings-btn" onclick="toggleSettings()" aria-label="Settings">⚙</button>`;
  h += `<div class="console-logo">Anime Physique</div>`;
  h += `<div class="console-title">Training Console</div>`;
  h += `<div class="console-subtitle">Level ${level} // ${split.tag}</div>`;
  h += `<div class="console-session">Session #${String(sessionNum).padStart(3,'0')} — ${split.label}</div>`;
  h += `</div>`;

  if (USER_KEY) {
    const badgeLabel = syncState === 'syncing' ? 'syncing...' : syncState === 'synced' ? 'synced' : syncState === 'error' ? 'offline' : 'local only';
    h += `<div class="session-bar"><span class="session-name">${USER_KEY}</span><span id="sync-badge" class="sync-badge ${syncState || 'local'}">${badgeLabel}</span></div>`;
  } else {
    h += `<div class="session-bar no-key"><span>Local only — data on this device</span><button class="link-btn" onclick="promptSessionKey()">Link Session</button></div>`;
  }

  // XP Bar
  h += `<div class="xp-wrap">`;
  h += `<div class="xp-label">Power Level</div>`;
  h += `<div class="xp-track"><div class="xp-fill" style="width:${xpPct}%"></div></div>`;
  h += `<div class="xp-text">${xpCur} / ${xpNeed} XP</div>`;
  h += `</div>`;

  // Stats as circular gauges
  h += `<div class="stats-panel">`;
  const statTips = { str: 'Levels up from Push days (Pike Push-ups, Dips, Decline Push-ups)', agi: 'Levels up from Pull days (Pull-ups, Inverted Rows)', end: 'Levels up from Legs days (Pistol Squats, Hip Hinges, Dragonflies)' };
  ['str', 'agi', 'end'].forEach(s => {
    const label = s.toUpperCase();
    const val = d.player.stats[s];
    const pct = Math.min(100, (val / maxStat) * 100);
    const circumference = 157;
    const offset = circumference - (pct / 100) * circumference;
    h += `<div class="stat-gauge ${s}" title="${statTips[s]}">`;
    h += `<div class="stat-gauge-circle">`;
    h += `<svg viewBox="0 0 60 60"><circle class="track" cx="30" cy="30" r="25"/><circle class="fill ${s}" cx="30" cy="30" r="25" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/></svg>`;
    h += `<div class="stat-gauge-val">${val}</div>`;
    h += `</div>`;
    h += `<div class="stat-gauge-label">${label}</div>`;
    h += `</div>`;
  });
  h += `</div>`;

  if (w.completedAt) {
    // Done state
    const nextType = SPLIT_ORDER[totalCompleted % 3];
    const nextSplit = SPLITS[nextType];
    h += `<div class="done-banner">`;
    h += `<div class="done-status">Training Complete</div>`;
    h += `<div class="done-title">${split.label}</div>`;
    h += `<div class="done-xp">+${w.xpEarned} XP EARNED</div>`;
    h += `<div class="done-next">NEXT SESSION // ${nextSplit.label.toUpperCase()}</div>`;
    h += `</div>`;
  } else {
    // Mission header
    let totalSets = 0, doneSets = 0;
    let partialSets = 0;
    w.exercises.forEach(ex => {
      ex.sets.forEach(s => { totalSets++; if (setIsDone(s)) doneSets++; else if (setIsPartial(s)) partialSets++; });
    });
    const attemptedSets = doneSets + partialSets;

    h += `<div class="mission">`;
    h += `<div class="mission-header"><span class="mission-tag">Training Protocol</span></div>`;
    h += `<div class="mission-type">${split.label}</div>`;
    h += `<div class="mission-progress"><span>${doneSets}</span> / ${totalSets} sets cleared${partialSets ? ` (${partialSets} partial)` : ''}</div>`;
    h += `</div>`;

    // Exercise control panels
    h += `<div class="skill-list">`;
    w.exercises.forEach((ex, ei) => {
      const cfg = split.exercises[ei];
      const allDone = ex.sets.every(s => setIsDone(s));
      h += `<div class="skill-card ${allDone ? 'all-done' : ''}">`;
      const vidIcon = `<svg viewBox="0 0 24 20" width="32" height="26" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="22" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><polygon points="9,5.5 9,14.5 17,10" fill="currentColor"/></svg>`;
      h += `<div class="skill-name">${cfg.name} ${cfg.video ? `<a href="${cfg.video}" target="_blank" class="skill-video">${vidIcon}</a>` : ''}</div>`;
      const reps = d.settings.reps?.[cfg.id] || cfg.defaultReps;
      h += `<div class="skill-detail">${cfg.defaultSets} SETS / ${reps} REPS</div>`;
      h += `<div class="skill-sets">`;
      ex.sets.forEach((s, si) => {
        const cls = setIsDone(s) ? 'done' : setIsPartial(s) ? 'partial' : '';
        h += `<button class="set-btn ${cls}" onclick="toggleSet(${ei},${si})"><span>${si + 1}</span></button>`;
      });
      h += `</div></div>`;
    });
    h += `</div>`;

    // Complete button
    const allDone = doneSets === totalSets && totalSets > 0;
    const canComplete = attemptedSets > 0;
    h += `<button class="complete-btn ${allDone ? 'ready perfect' : canComplete ? 'ready' : ''}" ${canComplete ? 'onclick="completeWorkout()"' : ''}>`;
    h += allDone ? 'Training Complete — Perfect' : canComplete ? `End Session (${attemptedSets}/${totalSets})` : `${doneSets} / ${totalSets} Sets`;
    h += `</button>`;
  }

  // Quest log
  updateQuests(d);
  store.save(d);
  const quests = d.quests[key] || [];
  h += `<div class="quest-log">`;
  h += `<div class="quest-header">Quest Log</div>`;
  quests.forEach(q => {
    h += `<div class="quest-item">`;
    h += `<div class="quest-diamond ${q.done ? 'done' : ''}"></div>`;
    h += `<span class="quest-label ${q.done ? 'done' : ''}">${q.label}</span>`;
    h += `</div>`;
  });
  h += `</div>`;

  // Timeline
  h += `<div class="timeline-section">`;
  h += `<div class="streak-display"><div class="streak-num">${streak}</div><div class="streak-label">Streak</div></div>`;
  h += `<div class="week-track">`;
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
  const dayLabels = ['M','T','W','T','F','S','S'];
  for (let i = 0; i < 7; i++) {
    const dt = new Date(mon);
    dt.setDate(dt.getDate() + i);
    const dk = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const isToday = dk === todayStr();
    const wk = d.workouts[dk];
    const done = wk?.completedAt;
    h += `<div class="week-cell ${done ? 'done' : ''} ${isToday ? 'today' : ''}">${dayLabels[i]}</div>`;
  }
  h += `</div></div>`;

  document.getElementById('app').innerHTML = h;
}

function updateSetUI(d) {
  const key = todayStr();
  const w = d.workouts[key];
  if (!w || w.completedAt) return;

  const level = d.player.level;
  const prevLevelXp = level > 1 ? xpForLevel(level - 1) : 0;
  const xpCur = d.player.xp - prevLevelXp;
  const xpNeed = xpForLevel(level) - prevLevelXp;
  const xpPct = Math.min(100, (xpCur / xpNeed) * 100);

  const xpFill = document.querySelector('.xp-fill');
  if (xpFill) xpFill.style.width = xpPct + '%';
  const xpText = document.querySelector('.xp-text');
  if (xpText) xpText.textContent = `${xpCur} / ${xpNeed} XP`;

  let totalSets = 0, doneSets = 0, partialSets = 0;
  w.exercises.forEach((ex, ei) => {
    const allDone = ex.sets.every(s => setIsDone(s));
    const card = document.querySelectorAll('.skill-card')[ei];
    if (card) {
      card.classList.toggle('all-done', allDone);
    }
    ex.sets.forEach((s, si) => {
      totalSets++;
      if (setIsDone(s)) doneSets++;
      else if (setIsPartial(s)) partialSets++;
      const btn = card?.querySelectorAll('.set-btn')[si];
      if (btn) {
        btn.className = `set-btn ${setIsDone(s) ? 'done' : setIsPartial(s) ? 'partial' : ''}`;
      }
    });
  });

  const attemptedSets = doneSets + partialSets;
  const prog = document.querySelector('.mission-progress');
  if (prog) prog.innerHTML = `<span>${doneSets}</span> / ${totalSets} sets cleared${partialSets ? ` (${partialSets} partial)` : ''}`;

  const btn = document.querySelector('.complete-btn');
  if (btn) {
    const allDone = doneSets === totalSets && totalSets > 0;
    const canComplete = attemptedSets > 0;
    btn.className = `complete-btn ${allDone ? 'ready perfect' : canComplete ? 'ready' : ''}`;
    btn.textContent = allDone ? 'Training Complete \u2014 Perfect' : canComplete ? `End Session (${attemptedSets}/${totalSets})` : `${doneSets} / ${totalSets} Sets`;
    btn.onclick = canComplete ? completeWorkout : null;
  }

  updateQuests(d);
  store.save(d);
  const quests = d.quests[key] || [];
  document.querySelectorAll('.quest-item').forEach((el, i) => {
    if (!quests[i]) return;
    el.querySelector('.quest-diamond')?.classList.toggle('done', quests[i].done);
    const label = el.querySelector('.quest-label');
    if (label) label.classList.toggle('done', quests[i].done);
  });
}

function toggleSet(ei, si) {
  const d = store.get();
  ensureTodayWorkout(d);
  const w = d.workouts[todayStr()];
  if (w.completedAt) return;

  const set = w.exercises[ei].sets[si];
  const prev = set.state || (set.done ? 'done' : 'empty');
  const cycle = { empty: 'partial', partial: 'done', done: 'empty' };
  set.state = cycle[prev];
  delete set.done;

  if (prev === 'empty') {
    awardXP(d, XP_SET_PARTIAL);
    showXpPopup(XP_SET_PARTIAL);
  } else if (prev === 'partial') {
    const bonus = XP_SET - XP_SET_PARTIAL;
    awardXP(d, bonus);
    showXpPopup(bonus);
    const allExSets = w.exercises[ei].sets.every(s => setIsDone(s));
    if (allExSets) {
      awardXP(d, XP_EXERCISE);
      showXpPopup(XP_EXERCISE);
    }
  } else {
    const wasAllDone = w.exercises[ei].sets.filter((_, idx) => idx !== si).every(s => setIsDone(s));
    if (wasAllDone) d.player.xp = Math.max(0, d.player.xp - XP_EXERCISE);
    d.player.xp = Math.max(0, d.player.xp - XP_SET);
    while (d.player.level > 1 && d.player.xp < xpForLevel(d.player.level - 1)) d.player.level--;
  }

  store.save(d);
  updateSetUI(d);
  debouncedSync();
}

function completeWorkout() {
  const d = store.get();
  const key = todayStr();
  const w = d.workouts[key];
  if (w.completedAt) return;

  const totalSets = w.exercises.reduce((sum, ex) => sum + ex.sets.length, 0);
  const doneSets = w.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => setIsDone(s)).length, 0);
  const partialSets = w.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => setIsPartial(s)).length, 0);
  const attemptedSets = doneSets + partialSets;
  if (attemptedSets === 0) return;

  const completionPct = attemptedSets / totalSets;
  let earned = Math.round(XP_WORKOUT * completionPct);
  const streak = calcStreak(d) + 1;
  earned += streak * 2;
  if (doneSets === totalSets) earned += 10;
  w.xpEarned = (w.xpEarned || 0) + earned;
  w.completedAt = new Date().toISOString();

  const leveled = awardXP(d, earned);
  showXpPopup(earned);

  d.player.streak.current = streak;
  if (streak > d.player.streak.best) d.player.streak.best = streak;
  d.player.streak.lastDate = key;

  store.save(d);
  render();

  if (leveled) {
    setTimeout(showLevelUp, 200);
  }

  store.sync();
}

function toggleHelp() {
  let modal = document.getElementById('help-modal');
  if (modal) { modal.remove(); return; }
  modal = document.createElement('div');
  modal.id = 'help-modal';
  modal.className = 'help-modal';
  modal.innerHTML = `
    <div class="help-backdrop" onclick="toggleHelp()"></div>
    <div class="help-content">
      <div class="help-title">How It Works</div>
      <div class="help-body">
        <p><b>Daily Training</b><br>Each day you get a workout: Push, Pull, or Legs. They rotate in order.</p>
        <p><b>Tracking Sets</b><br>Tap a set button to cycle through:<br>
        ○ Empty → ◑ Partial → ● Complete → ○ Empty</p>
        <p><b>Finishing Your Day</b><br>Once you've attempted any sets, you can end the session. Complete all sets for a perfect bonus.</p>
        <p><b>XP &amp; Leveling</b><br>Partial set = 3 XP, full set = 5 XP, all sets in an exercise = +15 XP bonus. Completing the day earns bonus XP scaled to how much you did, plus a streak multiplier.</p>
        <p><b>Stats</b><br>STR levels up from Push days, AGI from Pull days, END from Legs days.</p>
        <p><b>Streaks</b><br>Train on consecutive days (Sundays off) to build your streak.</p>
        <p><b>Sync Across Devices</b><br>Tap <em>Link Session</em> and enter a name (6+ chars). Use the same name on any device to share your progress.</p>
      </div>
      <button class="help-close" onclick="toggleHelp()">Got It</button>
    </div>
  `;
  document.body.appendChild(modal);
}

function toggleSettings() {
  let modal = document.getElementById('settings-modal');
  if (modal) { modal.remove(); return; }
  const d = store.get();
  if (!d.settings.reps) d.settings.reps = {};
  modal = document.createElement('div');
  modal.id = 'settings-modal';
  modal.className = 'settings-modal';
  let rows = '';
  SPLIT_ORDER.forEach(splitKey => {
    const split = SPLITS[splitKey];
    rows += `<div style="color:var(--accent);font-size:0.75rem;margin-top:0.6rem;text-transform:uppercase">${split.label}</div>`;
    split.exercises.forEach(ex => {
      const val = d.settings.reps[ex.id] || ex.defaultReps;
      rows += `<div class="settings-row"><label>${ex.name}</label><input type="number" min="1" max="50" value="${val}" data-id="${ex.id}" data-default="${ex.defaultReps}"></div>`;
    });
  });
  modal.innerHTML = `
    <div class="help-backdrop" onclick="toggleSettings()"></div>
    <div class="settings-content">
      <h3>Rep Targets</h3>
      ${rows}
      <button class="help-close" onclick="saveSettings()" style="margin-top:0.8rem">Save</button>
    </div>
  `;
  document.body.appendChild(modal);
}

function saveSettings() {
  const d = store.get();
  if (!d.settings.reps) d.settings.reps = {};
  if (!d.settings.repsHistory) d.settings.repsHistory = {};
  const today = todayStr();
  document.querySelectorAll('#settings-modal input[type="number"]').forEach(inp => {
    const id = inp.dataset.id;
    const def = parseInt(inp.dataset.default);
    const val = parseInt(inp.value) || def;
    const prev = d.settings.reps[id] || def;
    if (val !== prev) {
      if (!d.settings.repsHistory[id]) d.settings.repsHistory[id] = [];
      d.settings.repsHistory[id].push({ reps: val, date: today });
    }
    if (val !== def) d.settings.reps[id] = val;
    else delete d.settings.reps[id];
  });
  store.save(d);
  store.sync();
  document.getElementById('settings-modal')?.remove();
  render();
}

function promptSessionKey() {
  const key = prompt('Enter a session name (6+ characters).\nUse the same name on any device to sync your data.');
  if (!key) return;
  if (key.length < 6) { alert('Session name must be at least 6 characters.'); return; }
  const url = new URL(window.location);
  url.searchParams.set('key', key);
  window.location.href = url.toString();
}

render();
store.pull().then(() => {
  const d = store.get();
  const key = todayStr();
  const w = d.workouts[key];
  if (w && !w.completedAt) {
    const correctType = getTodayType(d);
    const hasProgress = w.exercises?.some(ex => ex.sets.some(s => s.state !== 'empty'));
    if (w.type !== correctType && !hasProgress) {
      delete d.workouts[key];
      delete d.quests[key];
      store.save(d);
    }
  }
  render();
});
</script>
