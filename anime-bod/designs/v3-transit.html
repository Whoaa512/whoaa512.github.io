<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ANIME PHYSIQUE // RPG</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<style>
  @keyframes xp-float {
    0% { opacity: 1; transform: translate(-50%, 0) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -10px) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(1); }
  }
  @keyframes levelup-flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes levelup-text {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    60% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }

  :root {
    --str: #e60012;
    --agi: #009BBF;
    --end: #00BB85;
    --text: #1a1a1a;
    --dim: #999999;
    --bg: #ffffff;
    --card-bg: #ffffff;
    --border: #e0e0e0;
    --track-bg: #f0f0f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', 'Arial', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
  }

  .app {
    max-width: 440px;
    margin: 0 auto;
    padding: 0 20px 60px;
    position: relative;
  }

  /* === HEADER === */
  .hud {
    padding: 24px 0 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }

  .hud-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--text);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: 800;
    flex-shrink: 0;
    letter-spacing: -0.02em;
  }

  .hud-info { flex: 1; min-width: 0; }

  .hud-title {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dim);
    font-weight: 500;
  }

  .hud-name {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .hud-class {
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  .hud-level {
    text-align: center;
    flex-shrink: 0;
    padding: 6px 12px;
    background: var(--text);
    border-radius: 4px;
  }

  .hud-level-num {
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1;
    color: #fff;
    letter-spacing: -0.03em;
  }

  .hud-level-label {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.6);
    font-weight: 500;
  }

  /* === XP BAR === */
  .xp-wrap {
    position: relative;
    margin: 16px 0;
  }

  .xp-track {
    height: 3px;
    background: var(--track-bg);
    overflow: hidden;
  }

  .xp-fill {
    height: 100%;
    background: var(--text);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .xp-text {
    font-size: 0.6rem;
    color: var(--dim);
    text-align: right;
    margin-top: 4px;
    letter-spacing: 0.5px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  /* === STATS PANEL === */
  .stats-panel {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-block {
    flex: 1;
    padding: 14px 12px 12px;
    border-left: 6px solid;
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat-block.str { border-left-color: var(--str); }
  .stat-block.agi { border-left-color: var(--agi); }
  .stat-block.end { border-left-color: var(--end); }

  .stat-name {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dim);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }

  .stat-block.str .stat-value { color: var(--str); }
  .stat-block.agi .stat-value { color: var(--agi); }
  .stat-block.end .stat-value { color: var(--end); }

  .stat-bar-track {
    height: 2px;
    background: var(--track-bg);
    margin-top: 8px;
    overflow: hidden;
  }

  .stat-bar-fill { height: 100%; }
  .stat-block.str .stat-bar-fill { background: var(--str); }
  .stat-block.agi .stat-bar-fill { background: var(--agi); }
  .stat-block.end .stat-bar-fill { background: var(--end); }

  /* === MISSION === */
  .mission {
    margin-bottom: 20px;
  }

  .mission-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
  }

  .mission-tag {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dim);
    font-weight: 600;
  }

  .mission-type-bar {
    padding: 10px 16px;
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .mission-type-bar.push { background: var(--str); }
  .mission-type-bar.pull { background: var(--agi); }
  .mission-type-bar.legs { background: var(--end); }

  .mission-progress {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.5px;
    padding: 6px 0;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  .mission-progress span {
    color: var(--text);
    font-weight: 700;
  }

  /* === EXERCISE CARDS === */
  .skill-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .skill-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-left: 6px solid var(--border);
    padding: 14px 16px;
    position: relative;
  }

  .skill-card.str-line { border-left-color: var(--str); }
  .skill-card.agi-line { border-left-color: var(--agi); }
  .skill-card.end-line { border-left-color: var(--end); }

  .skill-card.all-done {
    opacity: 0.6;
  }

  .skill-card.all-done::after {
    content: '完了';
    position: absolute;
    top: 14px;
    right: 16px;
    font-size: 0.65rem;
    letter-spacing: 1px;
    color: var(--dim);
    font-weight: 600;
  }

  .skill-name {
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 2px;
    color: var(--text);
  }

  .skill-video {
    color: var(--dim);
    text-decoration: none;
    margin-left: 8px;
    transition: all 0.2s;
    display: inline-block;
    vertical-align: middle;
    opacity: 0.5;
  }
  .skill-video:active { opacity: 1; }

  .skill-detail {
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 1px;
    margin-bottom: 12px;
    font-weight: 500;
  }

  .skill-sets {
    display: flex;
    gap: 8px;
    align-items: center;
    position: relative;
  }

  .skill-sets::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 14px;
    right: 14px;
    height: 2px;
    background: var(--track-bg);
    z-index: 0;
  }

  /* === STATION DOT BUTTONS === */
  .set-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid var(--border);
    background: #fff;
    color: var(--dim);
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    z-index: 1;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-variant-numeric: tabular-nums;
  }

  .set-btn span { display: block; }

  .set-btn:active { transform: scale(0.9); }

  .set-btn.done {
    border-color: var(--text);
    background: var(--text);
    color: #fff;
  }

  .set-btn.done.str-dot { border-color: var(--str); background: var(--str); }
  .set-btn.done.agi-dot { border-color: var(--agi); background: var(--agi); }
  .set-btn.done.end-dot { border-color: var(--end); background: var(--end); }

  /* === COMPLETE BUTTON === */
  .complete-btn {
    width: 100%;
    padding: 14px;
    border: 2px solid var(--border);
    background: #fff;
    color: var(--dim);
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: default;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    margin-bottom: 24px;
    font-variant-numeric: tabular-nums;
  }

  .complete-btn.ready {
    border-color: var(--text);
    color: #fff;
    background: var(--text);
    cursor: pointer;
  }

  .complete-btn.ready:active {
    transform: scale(0.98);
  }

  /* === QUEST LOG (route diagram) === */
  .quest-log {
    margin-bottom: 24px;
    padding-left: 0;
  }

  .quest-header {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dim);
    font-weight: 600;
    padding: 0 0 10px;
  }

  .quest-items {
    padding-left: 14px;
    position: relative;
  }

  .quest-items::before {
    content: '';
    position: absolute;
    left: 5px;
    top: 6px;
    bottom: 6px;
    width: 2px;
    background: var(--border);
  }

  .quest-item {
    padding: 6px 0 6px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
    position: relative;
    font-weight: 500;
  }

  .quest-diamond {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: #fff;
    flex-shrink: 0;
    transition: all 0.3s;
    position: absolute;
    left: -8px;
  }

  .quest-diamond.done {
    background: var(--text);
    border-color: var(--text);
  }

  .quest-label { color: var(--text); }
  .quest-label.done {
    color: var(--dim);
    text-decoration: line-through;
  }

  /* === STREAK & WEEK === */
  .timeline-section {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    align-items: stretch;
  }

  .streak-display {
    background: var(--text);
    color: #fff;
    padding: 14px 16px;
    text-align: center;
    flex-shrink: 0;
    width: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .streak-num {
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1;
    color: #fff;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }

  .streak-label {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
    font-weight: 500;
  }

  .week-track {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 8px 4px;
    border: 1px solid var(--border);
    position: relative;
  }

  .week-track::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 24px;
    right: 24px;
    height: 2px;
    background: var(--border);
    transform: translateY(-1px);
  }

  .week-cell {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .week-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    font-weight: 600;
    color: var(--dim);
    letter-spacing: 0;
    transition: all 0.3s;
  }

  .week-cell.done .week-dot {
    background: var(--text);
    border-color: var(--text);
    color: #fff;
  }

  .week-cell.today .week-dot {
    border-color: var(--text);
    border-width: 3px;
  }

  .week-cell.done.today .week-dot {
    background: var(--text);
    border-color: var(--text);
    color: #fff;
  }

  /* === DONE BANNER === */
  .done-banner {
    border: 1px solid var(--border);
    padding: 32px 20px;
    text-align: center;
    margin-bottom: 24px;
    border-top: 4px solid var(--text);
  }

  .done-status {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--dim);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .done-title {
    font-size: 1.3rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .done-xp {
    font-size: 0.85rem;
    color: var(--text);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .done-next {
    font-size: 0.65rem;
    color: var(--dim);
    margin-top: 10px;
    letter-spacing: 1px;
    font-weight: 500;
  }

  /* === XP POPUP === */
  .xp-popup {
    position: fixed;
    top: 40%;
    left: 50%;
    font-size: 2rem;
    font-weight: 800;
    color: var(--text);
    pointer-events: none;
    animation: xp-float 1.2s ease forwards;
    z-index: 100;
    letter-spacing: -0.02em;
  }

  /* === LEVEL UP OVERLAY === */
  .levelup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.08);
    z-index: 200;
    animation: levelup-flash 1.5s ease forwards;
    pointer-events: none;
  }

  .levelup-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text);
    z-index: 201;
    animation: levelup-text 1.5s ease forwards;
    pointer-events: none;
  }

  /* === SYNC BADGE === */
  .sync-badge {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 2px 6px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--dim);
    display: inline-block;
    font-weight: 500;
  }
  .sync-badge.synced { border-color: var(--end); color: var(--end); }
  .sync-badge.syncing { border-color: var(--agi); color: var(--agi); }
  .sync-badge.error { border-color: var(--str); color: var(--str); }
  .sync-badge.local { color: var(--dim); }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const SYNC_URL = 'https://anime-bod-sync.winslowcj5.workers.dev/api/sync';
const params = new URLSearchParams(window.location.search);
const USER_KEY = params.get('key');
let syncState = USER_KEY ? 'local' : null;
let syncDebounceTimer = null;

const VID = 'https://www.youtube.com/watch?v=3Zgrh5009_k';
const SPLITS = {
  push: { label: 'Push Day', tag: 'STRENGTH', stat: 'str', exercises: [
    { id: 'pike-pushups', name: 'Pike Push-ups', defaultSets: 3, defaultReps: 10, video: `${VID}&t=188s` },
    { id: 'decline-deficit-pushups', name: 'Decline Deficit Push-ups', defaultSets: 3, defaultReps: 12, video: `${VID}&t=265s` },
    { id: 'dips', name: 'Dips', defaultSets: 3, defaultReps: 10, video: `${VID}&t=308s` }
  ]},
  pull: { label: 'Pull Day', tag: 'AGILITY', stat: 'agi', exercises: [
    { id: 'pullups', name: 'Pull-ups', defaultSets: 3, defaultReps: 8, video: `${VID}&t=55s` },
    { id: 'inverted-rows', name: 'Inverted Rows', defaultSets: 3, defaultReps: 12, video: `${VID}&t=125s` }
  ]},
  legs: { label: 'Legs Day', tag: 'ENDURANCE', stat: 'end', exercises: [
    { id: 'pistol-squats', name: 'Pistol Squats', defaultSets: 3, defaultReps: 6, video: `${VID}&t=373s` },
    { id: 'hip-hinges', name: 'Hip Hinges', defaultSets: 3, defaultReps: 12, video: `${VID}&t=411s` },
    { id: 'dragonflies', name: 'Dragonflies', defaultSets: 3, defaultReps: 8, video: `${VID}&t=479s` }
  ]}
};
const SPLIT_ORDER = ['push', 'pull', 'legs'];
const XP_SET = 5, XP_EXERCISE = 15, XP_WORKOUT = 30;

const store = {
  get() {
    try { return JSON.parse(localStorage.getItem('anime-bod') || 'null') || this.fresh(); }
    catch { return this.fresh(); }
  },
  save(d) { localStorage.setItem('anime-bod', JSON.stringify(d)); },
  fresh() {
    return {
      version: 1,
      player: { name: 'Hero', xp: 0, level: 1, stats: { str: 0, agi: 0, end: 0 }, streak: { current: 0, best: 0, lastDate: null } },
      workouts: {},
      quests: {},
      settings: {}
    };
  },
  async sync() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      await fetch(`${SYNC_URL}?key=${USER_KEY}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: localStorage.getItem('anime-bod')
      });
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  },
  async pull() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      const res = await fetch(`${SYNC_URL}?key=${USER_KEY}`);
      if (res.ok) {
        const remote = await res.json();
        const local = this.get();
        const merged = mergeState(local, remote);
        this.save(merged);
      }
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  }
};

function mergeState(local, remote) {
  if (!remote || !remote.workouts) return local;
  if (!local || !local.workouts) return remote;

  const merged = JSON.parse(JSON.stringify(local));

  Object.keys(remote.workouts).forEach(day => {
    const rw = remote.workouts[day];
    const lw = merged.workouts[day];
    if (!lw) { merged.workouts[day] = rw; return; }
    if (rw.completedAt && !lw.completedAt) { merged.workouts[day] = rw; return; }
  });

  Object.keys(remote.quests || {}).forEach(day => {
    if (!merged.quests[day]) merged.quests[day] = remote.quests[day];
  });

  if (remote.player.xp > merged.player.xp) {
    merged.player.xp = remote.player.xp;
    merged.player.level = remote.player.level;
  }
  if ((remote.player.streak?.best || 0) > (merged.player.streak?.best || 0)) {
    merged.player.streak.best = remote.player.streak.best;
  }

  return merged;
}

function setSyncState(state) {
  syncState = state;
  const el = document.getElementById('sync-badge');
  if (!el) return;
  el.className = 'sync-badge ' + state;
  el.textContent = state === 'syncing' ? 'syncing...' : state === 'synced' ? 'synced' : state === 'error' ? 'offline' : 'local only';
}

function debouncedSync() {
  if (!USER_KEY) return;
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(() => store.sync(), 2000);
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function xpForLevel(n) { return 50 * n + 10 * n * n; }

function getCompletedCount(d) {
  return Object.values(d.workouts).filter(w => w.completedAt).length;
}

function getTodayType(d) {
  return SPLIT_ORDER[getCompletedCount(d) % 3];
}

function ensureTodayWorkout(d) {
  const key = todayStr();
  if (d.workouts[key] && d.workouts[key].completedAt) return d;
  const type = getTodayType(d);
  if (!d.workouts[key] || d.workouts[key].type !== type) {
    d.workouts[key] = {
      type,
      exercises: SPLITS[type].exercises.map(ex => ({
        id: ex.id, sets: Array.from({ length: ex.defaultSets }, () => ({ done: false }))
      })),
      completedAt: null,
      xpEarned: 0
    };
  }
  return d;
}

function ensureTodayQuests(d) {
  const key = todayStr();
  if (d.quests[key]) return d;
  const type = getTodayType(d);
  const split = SPLITS[type];
  const quests = [
    { id: 'complete-workout', label: `Complete ${split.label}`, done: false },
    { id: 'all-sets', label: 'Finish every set', done: false }
  ];
  if (type === 'push') quests.push({ id: 'pike-master', label: 'Complete all Pike Push-ups', done: false });
  if (type === 'pull') quests.push({ id: 'pull-master', label: 'Complete all Pull-ups', done: false });
  if (type === 'legs') quests.push({ id: 'pistol-master', label: 'Complete all Pistol Squats', done: false });
  d.quests[key] = quests;
  return d;
}

function updateQuests(d) {
  const key = todayStr();
  const w = d.workouts[key];
  const q = d.quests[key];
  if (!w || !q) return;
  const allSetsDone = w.exercises.every(ex => ex.sets.every(s => s.done));
  q.forEach(quest => {
    if (quest.id === 'complete-workout') quest.done = !!w.completedAt;
    if (quest.id === 'all-sets') quest.done = allSetsDone;
    if (quest.id === 'pike-master') quest.done = w.exercises.find(e => e.id === 'pike-pushups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pull-master') quest.done = w.exercises.find(e => e.id === 'pullups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pistol-master') quest.done = w.exercises.find(e => e.id === 'pistol-squats')?.sets.every(s => s.done) || false;
  });
}

function calcStreak(d) {
  let streak = 0;
  const t = new Date();
  if (d.workouts[todayStr()]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
  else { t.setDate(t.getDate() - 1); }
  for (let i = 0; i < 365; i++) {
    const key = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const dow = t.getDay();
    if (dow === 0) { t.setDate(t.getDate() - 1); continue; }
    if (d.workouts[key]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
    else break;
  }
  return streak;
}

function calcStats(d) {
  const stats = { str: 0, agi: 0, end: 0 };
  Object.values(d.workouts).forEach(w => {
    if (!w.completedAt) return;
    const split = SPLITS[w.type];
    if (!split) return;
    const vol = w.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => s.done).length, 0);
    stats[split.stat] += vol;
  });
  return stats;
}

function awardXP(d, amount) {
  const oldLevel = d.player.level;
  d.player.xp += amount;
  while (d.player.xp >= xpForLevel(d.player.level)) {
    d.player.level++;
  }
  return d.player.level > oldLevel;
}

let pendingXpPopup = 0;
function showXpPopup(amount) {
  pendingXpPopup += amount;
  const el = document.createElement('div');
  el.className = 'xp-popup';
  el.textContent = `+${pendingXpPopup} XP`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
  setTimeout(() => { pendingXpPopup = 0; }, 100);
}

function showLevelUp() {
  const flash = document.createElement('div');
  flash.className = 'levelup-overlay';
  document.body.appendChild(flash);
  const txt = document.createElement('div');
  txt.className = 'levelup-text';
  txt.textContent = 'LEVEL UP';
  document.body.appendChild(txt);
  setTimeout(() => { flash.remove(); txt.remove(); }, 1500);
}

function render() {
  const d = store.get();
  ensureTodayWorkout(d);
  ensureTodayQuests(d);
  d.player.stats = calcStats(d);
  d.player.streak.current = calcStreak(d);
  if (d.player.streak.current > d.player.streak.best) d.player.streak.best = d.player.streak.current;
  store.save(d);

  const key = todayStr();
  const w = d.workouts[key];
  const type = w.type;
  const split = SPLITS[type];
  const streak = d.player.streak.current;
  const level = d.player.level;
  const prevLevelXp = level > 1 ? xpForLevel(level - 1) : 0;
  const xpCur = d.player.xp - prevLevelXp;
  const xpNeed = xpForLevel(level) - prevLevelXp;
  const xpPct = Math.min(100, (xpCur / xpNeed) * 100);
  const totalCompleted = getCompletedCount(d);
  const maxStat = Math.max(d.player.stats.str, d.player.stats.agi, d.player.stats.end, 1);

  const lineClass = type === 'push' ? 'str' : type === 'pull' ? 'agi' : 'end';
  const dotClass = type === 'push' ? 'str-dot' : type === 'pull' ? 'agi-dot' : 'end-dot';
  const cardClass = type === 'push' ? 'str-line' : type === 'pull' ? 'agi-line' : 'end-line';

  let h = '';

  // HUD
  h += `<div class="hud">`;
  h += `<div class="hud-avatar">${level}</div>`;
  h += `<div class="hud-info">`;
  h += `<div class="hud-title">Player Status</div>`;
  h += `<div class="hud-name">Anime Physique</div>`;
  h += `<div class="hud-class">${split.tag} · ${split.label.toUpperCase()}</div>`;
  h += `</div>`;
  h += `<div class="hud-level"><div class="hud-level-num">${level}</div><div class="hud-level-label">Level</div></div>`;
  h += `</div>`;
  if (USER_KEY) {
    const badgeLabel = syncState === 'syncing' ? 'syncing...' : syncState === 'synced' ? 'synced' : syncState === 'error' ? 'offline' : 'local only';
    h += `<div style="text-align:right;margin-bottom:4px"><span id="sync-badge" class="sync-badge ${syncState || 'local'}">${badgeLabel}</span></div>`;
  }

  // XP Bar
  h += `<div class="xp-wrap">`;
  h += `<div class="xp-track"><div class="xp-fill" style="width:${xpPct}%"></div></div>`;
  h += `<div class="xp-text">${xpCur} / ${xpNeed} XP</div>`;
  h += `</div>`;

  // Stats
  h += `<div class="stats-panel">`;
  const statTips = { str: 'Levels up from Push days (Pike Push-ups, Dips, Decline Push-ups)', agi: 'Levels up from Pull days (Pull-ups, Inverted Rows)', end: 'Levels up from Legs days (Pistol Squats, Hip Hinges, Dragonflies)' };
  ['str', 'agi', 'end'].forEach(s => {
    const label = s.toUpperCase();
    const val = d.player.stats[s];
    const pct = Math.min(100, (val / maxStat) * 100);
    h += `<div class="stat-block ${s}" title="${statTips[s]}">`;
    h += `<div class="stat-name">${label}</div>`;
    h += `<div class="stat-value">${val}</div>`;
    h += `<div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%"></div></div>`;
    h += `</div>`;
  });
  h += `</div>`;

  if (w.completedAt) {
    // Done state
    const nextType = SPLIT_ORDER[totalCompleted % 3];
    const nextSplit = SPLITS[nextType];
    h += `<div class="done-banner">`;
    h += `<div class="done-status">Mission Complete</div>`;
    h += `<div class="done-title">${split.label}</div>`;
    h += `<div class="done-xp">+${w.xpEarned} XP EARNED</div>`;
    h += `<div class="done-next">NEXT → ${nextSplit.label.toUpperCase()}</div>`;
    h += `</div>`;
  } else {
    // Mission header
    let totalSets = 0, doneSets = 0;
    w.exercises.forEach(ex => {
      ex.sets.forEach(s => { totalSets++; if (s.done) doneSets++; });
    });

    h += `<div class="mission">`;
    h += `<div class="mission-header"><span class="mission-tag">Today's Mission</span></div>`;
    h += `<div class="mission-type-bar ${type}">${split.label}</div>`;
    h += `<div class="mission-progress"><span>${doneSets}</span> / ${totalSets} sets cleared</div>`;
    h += `</div>`;

    // Skill cards
    h += `<div class="skill-list">`;
    w.exercises.forEach((ex, ei) => {
      const cfg = split.exercises[ei];
      const allDone = ex.sets.every(s => s.done);
      h += `<div class="skill-card ${cardClass} ${allDone ? 'all-done' : ''}">`;
      const vidIcon = `<svg viewBox="0 0 24 20" width="28" height="22" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="22" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><polygon points="9,5.5 9,14.5 17,10" fill="currentColor"/></svg>`;
      h += `<div class="skill-name">${cfg.name} ${cfg.video ? `<a href="${cfg.video}" target="_blank" class="skill-video">${vidIcon}</a>` : ''}</div>`;
      h += `<div class="skill-detail">${cfg.defaultSets} SETS · ${cfg.defaultReps} REPS</div>`;
      h += `<div class="skill-sets">`;
      ex.sets.forEach((s, si) => {
        h += `<button class="set-btn ${s.done ? 'done ' + dotClass : ''}" onclick="toggleSet(${ei},${si})"><span>${si + 1}</span></button>`;
      });
      h += `</div></div>`;
    });
    h += `</div>`;

    // Complete button
    const canComplete = doneSets === totalSets && totalSets > 0;
    h += `<button class="complete-btn ${canComplete ? 'ready' : ''}" ${canComplete ? 'onclick="completeWorkout()"' : ''}>`;
    h += canComplete ? 'Execute Mission' : `${doneSets} / ${totalSets} Sets`;
    h += `</button>`;
  }

  // Quest log
  updateQuests(d);
  store.save(d);
  const quests = d.quests[key] || [];
  h += `<div class="quest-log">`;
  h += `<div class="quest-header">Quest Log</div>`;
  h += `<div class="quest-items">`;
  quests.forEach(q => {
    h += `<div class="quest-item">`;
    h += `<div class="quest-diamond ${q.done ? 'done' : ''}"></div>`;
    h += `<span class="quest-label ${q.done ? 'done' : ''}">${q.label}</span>`;
    h += `</div>`;
  });
  h += `</div></div>`;

  // Timeline
  h += `<div class="timeline-section">`;
  h += `<div class="streak-display"><div class="streak-num">${streak}</div><div class="streak-label">Streak</div></div>`;
  h += `<div class="week-track">`;
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
  const dayLabels = ['M','T','W','T','F','S','S'];
  for (let i = 0; i < 7; i++) {
    const dt = new Date(mon);
    dt.setDate(dt.getDate() + i);
    const dk = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const isToday = dk === todayStr();
    const wk = d.workouts[dk];
    const done = wk?.completedAt;
    h += `<div class="week-cell ${done ? 'done' : ''} ${isToday ? 'today' : ''}"><div class="week-dot">${dayLabels[i]}</div></div>`;
  }
  h += `</div></div>`;

  document.getElementById('app').innerHTML = h;
}

function toggleSet(ei, si) {
  const d = store.get();
  ensureTodayWorkout(d);
  const w = d.workouts[todayStr()];
  if (w.completedAt) return;

  const set = w.exercises[ei].sets[si];
  const wasDone = set.done;
  set.done = !set.done;

  if (!wasDone) {
    awardXP(d, XP_SET);
    showXpPopup(XP_SET);
    const allExSets = w.exercises[ei].sets.every(s => s.done);
    if (allExSets) {
      awardXP(d, XP_EXERCISE);
      showXpPopup(XP_EXERCISE);
    }
  } else {
    const wasAllDone = w.exercises[ei].sets.filter((s, idx) => idx !== si).every(s => s.done);
    if (wasAllDone) d.player.xp = Math.max(0, d.player.xp - XP_EXERCISE);
    d.player.xp = Math.max(0, d.player.xp - XP_SET);
    while (d.player.level > 1 && d.player.xp < xpForLevel(d.player.level - 1)) d.player.level--;
  }

  store.save(d);
  render();
  debouncedSync();
}

function completeWorkout() {
  const d = store.get();
  const key = todayStr();
  const w = d.workouts[key];
  if (w.completedAt) return;
  if (!w.exercises.every(ex => ex.sets.every(s => s.done))) return;

  let earned = XP_WORKOUT;
  const streak = calcStreak(d) + 1;
  earned += streak * 2;
  w.xpEarned = (w.xpEarned || 0) + earned;
  w.completedAt = new Date().toISOString();

  const leveled = awardXP(d, earned);
  showXpPopup(earned);

  d.player.streak.current = streak;
  if (streak > d.player.streak.best) d.player.streak.best = streak;
  d.player.streak.lastDate = key;

  store.save(d);
  render();

  if (leveled) {
    setTimeout(showLevelUp, 200);
  }

  store.sync();
}

render();
store.pull().then(() => render());
</script>
</body>
</html>
