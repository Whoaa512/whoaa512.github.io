<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WANTED // TRAINING LOG</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f4e8c1">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pirata+One&display=swap');

  @keyframes stamp-in {
    0% { transform: scale(2) rotate(-8deg); opacity: 0; }
    60% { transform: scale(1.05) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(-2deg); opacity: 1; }
  }
  @keyframes xp-float {
    0% { opacity: 1; transform: translate(-50%, 0) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -10px) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(1); }
  }
  @keyframes levelup-flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes levelup-text {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    60% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes rope-pull {
    0% { background-position: 0 0; }
    100% { background-position: 40px 0; }
  }
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  :root {
    --parchment: #f4e8c1;
    --parchment-dark: #e8d5a3;
    --ink: #2c1810;
    --ink-light: #5a3a28;
    --ink-dim: #9c8872;
    --red: #c41e3a;
    --red-dark: #8b1528;
    --gold: #8b6914;
    --gold-light: #c49b2a;
    --rope: #8b7355;
    --str-color: #8b2500;
    --agi-color: #1a4a6e;
    --end-color: #2e5a1e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', Times, serif;
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 15%;
    right: 8%;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139,107,84,0.08) 0%, rgba(139,107,84,0.04) 40%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: 25%;
    left: 5%;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139,107,84,0.06) 0%, rgba(139,107,84,0.03) 40%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    max-width: 400px;
    margin: 0 auto;
    padding: 0 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* === WANTED POSTER HEADER === */
  .wanted-header {
    text-align: center;
    padding: 20px 0 12px;
    border-bottom: 4px double var(--ink);
    margin-bottom: 16px;
    position: relative;
  }

  .wanted-title {
    font-family: 'Pirata One', Georgia, serif;
    font-size: 2.8rem;
    font-weight: 400;
    letter-spacing: 6px;
    color: var(--ink);
    line-height: 1;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
  }

  .wanted-subtitle {
    font-size: 0.6rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-top: 2px;
  }

  .wanted-split {
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 6px;
  }

  .bounty-amount {
    font-family: 'Pirata One', Georgia, serif;
    font-size: 1.6rem;
    color: var(--ink);
    margin-top: 8px;
    letter-spacing: 2px;
  }

  .bounty-label {
    font-size: 0.55rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  /* === XP BAR (rope style) === */
  .xp-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .xp-track {
    height: 10px;
    background: var(--parchment-dark);
    border: 2px solid var(--ink-light);
    border-radius: 5px;
    overflow: hidden;
    position: relative;
  }

  .xp-fill {
    height: 100%;
    background: repeating-linear-gradient(
      90deg,
      var(--rope) 0px,
      #a08660 3px,
      var(--rope) 6px,
      #6b5540 9px,
      var(--rope) 12px
    );
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 3px;
    position: relative;
  }

  .xp-text {
    font-size: 0.6rem;
    color: var(--ink-dim);
    text-align: right;
    margin-top: 3px;
    letter-spacing: 1px;
    font-style: italic;
  }

  /* === STATS (bounty attributes) === */
  .stats-panel {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .stat-block {
    flex: 1;
    background: var(--parchment-dark);
    border: 2px solid var(--ink-light);
    border-width: 2px 2px 3px 2px;
    padding: 10px 8px 8px;
    text-align: center;
  }

  .stat-name {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
    font-weight: 700;
  }

  .stat-block.str .stat-name { color: var(--str-color); }
  .stat-block.agi .stat-name { color: var(--agi-color); }
  .stat-block.end .stat-name { color: var(--end-color); }

  .stat-value {
    font-family: 'Pirata One', Georgia, serif;
    font-size: 1.5rem;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-block.str .stat-value { color: var(--str-color); }
  .stat-block.agi .stat-value { color: var(--agi-color); }
  .stat-block.end .stat-value { color: var(--end-color); }

  .stat-bar-track {
    height: 4px;
    background: rgba(44,24,16,0.15);
    border-radius: 2px;
    overflow: hidden;
  }

  .stat-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .stat-block.str .stat-bar-fill { background: var(--str-color); }
  .stat-block.agi .stat-bar-fill { background: var(--agi-color); }
  .stat-block.end .stat-bar-fill { background: var(--end-color); }

  /* === CAPTAIN'S TRAINING LOG (mission section) === */
  .mission {
    border: 3px solid var(--ink);
    border-width: 3px 2px 2px 3px;
    margin-bottom: 16px;
    background: var(--parchment);
    position: relative;
  }

  .mission::before {
    content: '☠';
    position: absolute;
    top: -1px;
    right: 12px;
    font-size: 1.2rem;
    color: var(--ink-light);
    opacity: 0.3;
  }

  .mission-header {
    padding: 12px 16px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .mission-tag {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--ink-dim);
    font-style: italic;
  }

  .mission-type {
    font-family: 'Pirata One', Georgia, serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    padding: 6px 16px 10px;
    color: var(--ink);
  }

  .mission-progress {
    padding: 0 16px 10px;
    font-size: 0.65rem;
    color: var(--ink-dim);
    letter-spacing: 1px;
    font-style: italic;
  }

  .mission-progress span {
    color: var(--ink);
    font-weight: 700;
    font-style: normal;
  }

  /* === LOG ENTRIES (exercise cards) === */
  .skill-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .skill-card {
    background: var(--parchment);
    border: 2px solid var(--ink-light);
    border-left: 4px solid var(--ink);
    padding: 14px 16px;
    position: relative;
    animation: slide-in 0.3s ease backwards;
  }

  .skill-card:nth-child(1) { animation-delay: 0.05s; }
  .skill-card:nth-child(2) { animation-delay: 0.1s; }
  .skill-card:nth-child(3) { animation-delay: 0.15s; }

  .skill-card.all-done {
    border-color: var(--end-color);
    border-left-color: var(--end-color);
    background: rgba(46,90,30,0.04);
  }

  .skill-card.all-done::after {
    content: '✓ DONE';
    position: absolute;
    top: 10px;
    right: 12px;
    font-size: 0.5rem;
    letter-spacing: 2px;
    color: var(--end-color);
    font-weight: 800;
  }

  .skill-name {
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
    color: var(--ink);
  }

  .skill-video {
    color: var(--ink-light);
    text-decoration: none;
    margin-left: 8px;
    transition: all 0.2s;
    display: inline-block;
    vertical-align: middle;
    opacity: 0.6;
  }
  .skill-video:active { transform: scale(1.2); opacity: 1; }

  .skill-detail {
    font-size: 0.65rem;
    color: var(--ink-dim);
    letter-spacing: 1px;
    margin-bottom: 10px;
    font-style: italic;
  }

  .skill-sets {
    display: flex;
    gap: 10px;
  }

  /* === SET BUTTONS (tally marks with X) === */
  .set-btn {
    width: 40px;
    height: 40px;
    border: 2px solid var(--ink-light);
    background: var(--parchment);
    color: var(--ink-dim);
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
  }

  .set-btn span {
    display: block;
    position: relative;
    z-index: 1;
  }

  .set-btn:active {
    transform: scale(0.9);
  }

  .set-btn.done {
    background: var(--parchment-dark);
    border-color: var(--ink);
    color: var(--ink);
    font-weight: 900;
  }

  .set-btn.done::before,
  .set-btn.done::after {
    content: '';
    position: absolute;
    background: var(--ink);
  }

  .set-btn.done::before {
    width: 80%;
    height: 2px;
    top: 50%;
    left: 10%;
    transform: rotate(45deg);
  }

  .set-btn.done::after {
    width: 80%;
    height: 2px;
    top: 50%;
    left: 10%;
    transform: rotate(-45deg);
  }

  .set-btn.done span {
    opacity: 0;
  }

  /* === COMPLETE BUTTON (Marine stamp) === */
  .complete-btn {
    width: 100%;
    padding: 16px;
    border: 3px solid var(--ink-dim);
    background: var(--parchment);
    color: var(--ink-dim);
    font-family: Georgia, serif;
    font-size: 0.85rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 3px;
    cursor: default;
    transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
    margin-bottom: 16px;
    position: relative;
  }

  .complete-btn.ready {
    border-color: var(--red);
    color: var(--red);
    cursor: pointer;
    background: var(--parchment);
    box-shadow: inset 0 0 0 2px var(--red);
    transform: rotate(-1deg);
    font-size: 1rem;
    letter-spacing: 4px;
  }

  .complete-btn.ready:active {
    transform: rotate(-1deg) scale(0.97);
  }

  /* === QUEST LOG (Captain's Orders) === */
  .quest-log {
    background: var(--parchment);
    border: 2px solid var(--ink-light);
    margin-bottom: 16px;
    position: relative;
  }

  .quest-log::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--red);
  }

  .quest-header {
    padding: 12px 16px 8px;
    font-family: 'Pirata One', Georgia, serif;
    font-size: 0.85rem;
    letter-spacing: 2px;
    color: var(--red);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .quest-header::before {
    content: '⚓';
    font-size: 0.8rem;
  }

  .quest-item {
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
    border-top: 1px solid rgba(44,24,16,0.15);
    position: relative;
  }

  .quest-item:last-child {
    padding-bottom: 12px;
  }

  .quest-diamond {
    width: 14px;
    height: 14px;
    border: 2px solid var(--ink-light);
    flex-shrink: 0;
    transition: all 0.3s;
  }

  .quest-diamond.done {
    background: var(--end-color);
    border-color: var(--end-color);
    position: relative;
  }

  .quest-label { color: var(--ink); font-style: italic; }
  .quest-label.done {
    color: var(--ink-dim);
    text-decoration: line-through;
  }

  /* === STREAK & TIMELINE === */
  .timeline-section {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .streak-display {
    background: var(--parchment-dark);
    border: 2px solid var(--ink-light);
    padding: 12px;
    text-align: center;
    flex-shrink: 0;
    width: 80px;
  }

  .streak-num {
    font-family: 'Pirata One', Georgia, serif;
    font-size: 2rem;
    line-height: 1;
    color: var(--ink);
  }

  .streak-label {
    font-size: 0.45rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--ink-dim);
    margin-top: 2px;
    font-style: italic;
  }

  .week-track {
    flex: 1;
    background: var(--parchment-dark);
    border: 2px solid var(--ink-light);
    padding: 8px;
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
  }

  .week-cell {
    flex: 1;
    max-width: 38px;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    color: var(--ink-dim);
    background: var(--parchment);
    border: 2px solid var(--ink-light);
    border-radius: 50%;
    transition: all 0.3s;
    font-weight: 700;
  }

  .week-cell.done {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--parchment);
  }

  .week-cell.today {
    border-color: var(--red);
    color: var(--red);
    border-width: 3px;
  }

  .week-cell.done.today {
    border-color: var(--ink);
    color: var(--parchment);
    background: var(--ink);
  }

  /* === DONE BANNER === */
  .done-banner {
    background: var(--parchment);
    border: 3px solid var(--ink);
    padding: 32px 20px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
  }

  .done-banner::before {
    content: '';
    position: absolute;
    top: 4px;
    left: 4px;
    right: 4px;
    bottom: 4px;
    border: 1px solid var(--ink-light);
    pointer-events: none;
  }

  .done-status {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--end-color);
    margin-bottom: 8px;
  }

  .done-title {
    font-family: 'Pirata One', Georgia, serif;
    font-size: 1.5rem;
    letter-spacing: 3px;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .done-xp {
    font-size: 0.85rem;
    color: var(--gold);
    font-weight: 700;
  }

  .done-next {
    font-size: 0.7rem;
    color: var(--ink-dim);
    margin-top: 8px;
    letter-spacing: 1px;
    font-style: italic;
  }

  /* === XP POPUP === */
  .xp-popup {
    position: fixed;
    top: 40%;
    left: 50%;
    font-family: 'Pirata One', Georgia, serif;
    font-size: 2.2rem;
    font-weight: 400;
    color: var(--gold-light);
    text-shadow: 2px 2px 0 rgba(44,24,16,0.3);
    pointer-events: none;
    animation: xp-float 1.2s ease forwards;
    z-index: 100;
    letter-spacing: 2px;
  }

  /* === LEVEL UP OVERLAY === */
  .levelup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(196,30,58,0.15);
    z-index: 200;
    animation: levelup-flash 1.5s ease forwards;
    pointer-events: none;
  }

  .levelup-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Pirata One', Georgia, serif;
    font-size: 2.5rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--red);
    text-shadow: 2px 2px 0 rgba(44,24,16,0.3);
    z-index: 201;
    animation: levelup-text 1.5s ease forwards;
    pointer-events: none;
  }

  /* === SYNC BADGE === */
  .sync-badge {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 3px 8px;
    border: 1px solid var(--ink-dim);
    background: var(--parchment-dark);
    color: var(--ink-dim);
    display: inline-block;
    font-family: Georgia, serif;
  }
  .sync-badge.synced { border-color: var(--end-color); color: var(--end-color); }
  .sync-badge.syncing { border-color: var(--gold); color: var(--gold); animation: glow-pulse 1s ease infinite; }
  .sync-badge.error { border-color: var(--red); color: var(--red); }
  .sync-badge.local { color: var(--ink-dim); }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const SYNC_URL = 'https://anime-bod-sync.winslowcj5.workers.dev/api/sync';
const params = new URLSearchParams(window.location.search);
const USER_KEY = params.get('key');
let syncState = USER_KEY ? 'local' : null;
let syncDebounceTimer = null;

const VID = 'https://www.youtube.com/watch?v=3Zgrh5009_k';
const SPLITS = {
  push: { label: 'Push Day', tag: 'STRENGTH', stat: 'str', exercises: [
    { id: 'pike-pushups', name: 'Pike Push-ups', defaultSets: 3, defaultReps: 10, video: `${VID}&t=188s` },
    { id: 'decline-deficit-pushups', name: 'Decline Deficit Push-ups', defaultSets: 3, defaultReps: 12, video: `${VID}&t=265s` },
    { id: 'dips', name: 'Dips', defaultSets: 3, defaultReps: 10, video: `${VID}&t=308s` }
  ]},
  pull: { label: 'Pull Day', tag: 'AGILITY', stat: 'agi', exercises: [
    { id: 'pullups', name: 'Pull-ups', defaultSets: 3, defaultReps: 8, video: `${VID}&t=55s` },
    { id: 'inverted-rows', name: 'Inverted Rows', defaultSets: 3, defaultReps: 12, video: `${VID}&t=125s` }
  ]},
  legs: { label: 'Legs Day', tag: 'ENDURANCE', stat: 'end', exercises: [
    { id: 'pistol-squats', name: 'Pistol Squats', defaultSets: 3, defaultReps: 6, video: `${VID}&t=373s` },
    { id: 'hip-hinges', name: 'Hip Hinges', defaultSets: 3, defaultReps: 12, video: `${VID}&t=411s` },
    { id: 'dragonflies', name: 'Dragonflies', defaultSets: 3, defaultReps: 8, video: `${VID}&t=479s` }
  ]}
};
const SPLIT_ORDER = ['push', 'pull', 'legs'];
const XP_SET = 5, XP_EXERCISE = 15, XP_WORKOUT = 30;

const store = {
  get() {
    try { return JSON.parse(localStorage.getItem('anime-bod') || 'null') || this.fresh(); }
    catch { return this.fresh(); }
  },
  save(d) { localStorage.setItem('anime-bod', JSON.stringify(d)); },
  fresh() {
    return {
      version: 1,
      player: { name: 'Hero', xp: 0, level: 1, stats: { str: 0, agi: 0, end: 0 }, streak: { current: 0, best: 0, lastDate: null } },
      workouts: {},
      quests: {},
      settings: {}
    };
  },
  async sync() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      await fetch(`${SYNC_URL}?key=${USER_KEY}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: localStorage.getItem('anime-bod')
      });
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  },
  async pull() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      const res = await fetch(`${SYNC_URL}?key=${USER_KEY}`);
      if (res.ok) {
        const remote = await res.json();
        const local = this.get();
        const merged = mergeState(local, remote);
        this.save(merged);
      }
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  }
};

function mergeState(local, remote) {
  if (!remote || !remote.workouts) return local;
  if (!local || !local.workouts) return remote;

  const merged = JSON.parse(JSON.stringify(local));

  Object.keys(remote.workouts).forEach(day => {
    const rw = remote.workouts[day];
    const lw = merged.workouts[day];
    if (!lw) { merged.workouts[day] = rw; return; }
    if (rw.completedAt && !lw.completedAt) { merged.workouts[day] = rw; return; }
  });

  Object.keys(remote.quests || {}).forEach(day => {
    if (!merged.quests[day]) merged.quests[day] = remote.quests[day];
  });

  if (remote.player.xp > merged.player.xp) {
    merged.player.xp = remote.player.xp;
    merged.player.level = remote.player.level;
  }
  if ((remote.player.streak?.best || 0) > (merged.player.streak?.best || 0)) {
    merged.player.streak.best = remote.player.streak.best;
  }

  return merged;
}

function setSyncState(state) {
  syncState = state;
  const el = document.getElementById('sync-badge');
  if (!el) return;
  el.className = 'sync-badge ' + state;
  el.textContent = state === 'syncing' ? 'syncing...' : state === 'synced' ? 'synced' : state === 'error' ? 'offline' : 'local only';
}

function debouncedSync() {
  if (!USER_KEY) return;
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(() => store.sync(), 2000);
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function xpForLevel(n) { return 50 * n + 10 * n * n; }

function getCompletedCount(d) {
  return Object.values(d.workouts).filter(w => w.completedAt).length;
}

function getTodayType(d) {
  return SPLIT_ORDER[getCompletedCount(d) % 3];
}

function ensureTodayWorkout(d) {
  const key = todayStr();
  if (d.workouts[key] && d.workouts[key].completedAt) return d;
  const type = getTodayType(d);
  if (!d.workouts[key] || d.workouts[key].type !== type) {
    d.workouts[key] = {
      type,
      exercises: SPLITS[type].exercises.map(ex => ({
        id: ex.id, sets: Array.from({ length: ex.defaultSets }, () => ({ done: false }))
      })),
      completedAt: null,
      xpEarned: 0
    };
  }
  return d;
}

function ensureTodayQuests(d) {
  const key = todayStr();
  if (d.quests[key]) return d;
  const type = getTodayType(d);
  const split = SPLITS[type];
  const quests = [
    { id: 'complete-workout', label: `Complete ${split.label}`, done: false },
    { id: 'all-sets', label: 'Finish every set', done: false }
  ];
  if (type === 'push') quests.push({ id: 'pike-master', label: 'Complete all Pike Push-ups', done: false });
  if (type === 'pull') quests.push({ id: 'pull-master', label: 'Complete all Pull-ups', done: false });
  if (type === 'legs') quests.push({ id: 'pistol-master', label: 'Complete all Pistol Squats', done: false });
  d.quests[key] = quests;
  return d;
}

function updateQuests(d) {
  const key = todayStr();
  const w = d.workouts[key];
  const q = d.quests[key];
  if (!w || !q) return;
  const allSetsDone = w.exercises.every(ex => ex.sets.every(s => s.done));
  q.forEach(quest => {
    if (quest.id === 'complete-workout') quest.done = !!w.completedAt;
    if (quest.id === 'all-sets') quest.done = allSetsDone;
    if (quest.id === 'pike-master') quest.done = w.exercises.find(e => e.id === 'pike-pushups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pull-master') quest.done = w.exercises.find(e => e.id === 'pullups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pistol-master') quest.done = w.exercises.find(e => e.id === 'pistol-squats')?.sets.every(s => s.done) || false;
  });
}

function calcStreak(d) {
  let streak = 0;
  const t = new Date();
  if (d.workouts[todayStr()]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
  else { t.setDate(t.getDate() - 1); }
  for (let i = 0; i < 365; i++) {
    const key = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const dow = t.getDay();
    if (dow === 0) { t.setDate(t.getDate() - 1); continue; }
    if (d.workouts[key]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
    else break;
  }
  return streak;
}

function calcStats(d) {
  const stats = { str: 0, agi: 0, end: 0 };
  Object.values(d.workouts).forEach(w => {
    if (!w.completedAt) return;
    const split = SPLITS[w.type];
    if (!split) return;
    const vol = w.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => s.done).length, 0);
    stats[split.stat] += vol;
  });
  return stats;
}

function awardXP(d, amount) {
  const oldLevel = d.player.level;
  d.player.xp += amount;
  while (d.player.xp >= xpForLevel(d.player.level)) {
    d.player.level++;
  }
  return d.player.level > oldLevel;
}

let pendingXpPopup = 0;
function showXpPopup(amount) {
  pendingXpPopup += amount;
  const el = document.createElement('div');
  el.className = 'xp-popup';
  el.textContent = `+${pendingXpPopup} XP`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
  setTimeout(() => { pendingXpPopup = 0; }, 100);
}

function showLevelUp() {
  const flash = document.createElement('div');
  flash.className = 'levelup-overlay';
  document.body.appendChild(flash);
  const txt = document.createElement('div');
  txt.className = 'levelup-text';
  txt.textContent = 'BOUNTY UP!';
  document.body.appendChild(txt);
  setTimeout(() => { flash.remove(); txt.remove(); }, 1500);
}

function render() {
  const d = store.get();
  ensureTodayWorkout(d);
  ensureTodayQuests(d);
  d.player.stats = calcStats(d);
  d.player.streak.current = calcStreak(d);
  if (d.player.streak.current > d.player.streak.best) d.player.streak.best = d.player.streak.current;
  store.save(d);

  const key = todayStr();
  const w = d.workouts[key];
  const type = w.type;
  const split = SPLITS[type];
  const streak = d.player.streak.current;
  const level = d.player.level;
  const prevLevelXp = level > 1 ? xpForLevel(level - 1) : 0;
  const xpCur = d.player.xp - prevLevelXp;
  const xpNeed = xpForLevel(level) - prevLevelXp;
  const xpPct = Math.min(100, (xpCur / xpNeed) * 100);
  const totalCompleted = getCompletedCount(d);
  const maxStat = Math.max(d.player.stats.str, d.player.stats.agi, d.player.stats.end, 1);

  const bountyAmount = (level * level * 5000000).toLocaleString();
  const statLabels = { str: 'STRENGTH', agi: 'SPEED', end: 'STAMINA' };

  let h = '';

  // WANTED POSTER HEADER
  h += `<div class="wanted-header">`;
  h += `<div class="wanted-title">WANTED</div>`;
  h += `<div class="wanted-subtitle">DEAD OR ALIVE</div>`;
  h += `<div class="wanted-split">${split.tag} · ${split.label.toUpperCase()}</div>`;
  h += `<div class="bounty-amount">₿ ${bountyAmount}</div>`;
  h += `<div class="bounty-label">Bounty · Level ${level}</div>`;
  h += `</div>`;
  if (USER_KEY) {
    const badgeLabel = syncState === 'syncing' ? 'syncing...' : syncState === 'synced' ? 'synced' : syncState === 'error' ? 'offline' : 'local only';
    h += `<div style="text-align:right;margin-bottom:4px"><span id="sync-badge" class="sync-badge ${syncState || 'local'}">${badgeLabel}</span></div>`;
  }

  // XP Bar
  h += `<div class="xp-wrap">`;
  h += `<div class="xp-track"><div class="xp-fill" style="width:${xpPct}%"></div></div>`;
  h += `<div class="xp-text">${xpCur} / ${xpNeed} XP</div>`;
  h += `</div>`;

  // Stats
  h += `<div class="stats-panel">`;
  const statTips = { str: 'Levels up from Push days (Pike Push-ups, Dips, Decline Push-ups)', agi: 'Levels up from Pull days (Pull-ups, Inverted Rows)', end: 'Levels up from Legs days (Pistol Squats, Hip Hinges, Dragonflies)' };
  ['str', 'agi', 'end'].forEach(s => {
    const label = statLabels[s];
    const val = d.player.stats[s];
    const pct = Math.min(100, (val / maxStat) * 100);
    h += `<div class="stat-block ${s}" title="${statTips[s]}">`;
    h += `<div class="stat-name">${label}</div>`;
    h += `<div class="stat-value">${val}</div>`;
    h += `<div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%"></div></div>`;
    h += `</div>`;
  });
  h += `</div>`;

  if (w.completedAt) {
    // Done state
    const nextType = SPLIT_ORDER[totalCompleted % 3];
    const nextSplit = SPLITS[nextType];
    h += `<div class="done-banner">`;
    h += `<div class="done-status">Training Complete</div>`;
    h += `<div class="done-title">${split.label}</div>`;
    h += `<div class="done-xp">+${w.xpEarned} XP EARNED</div>`;
    h += `<div class="done-next">Next Orders: ${nextSplit.label.toUpperCase()}</div>`;
    h += `</div>`;
  } else {
    // Mission header
    let totalSets = 0, doneSets = 0;
    w.exercises.forEach(ex => {
      ex.sets.forEach(s => { totalSets++; if (s.done) doneSets++; });
    });

    h += `<div class="mission">`;
    h += `<div class="mission-header"><span class="mission-tag">Captain's Training Log</span></div>`;
    h += `<div class="mission-type">${split.label}</div>`;
    h += `<div class="mission-progress"><span>${doneSets}</span> / ${totalSets} sets logged</div>`;
    h += `</div>`;

    // Skill cards
    h += `<div class="skill-list">`;
    w.exercises.forEach((ex, ei) => {
      const cfg = split.exercises[ei];
      const allDone = ex.sets.every(s => s.done);
      h += `<div class="skill-card ${allDone ? 'all-done' : ''}">`;
      const vidIcon = `<svg viewBox="0 0 24 20" width="32" height="26" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="22" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><polygon points="9,5.5 9,14.5 17,10" fill="currentColor"/></svg>`;
      h += `<div class="skill-name">${cfg.name} ${cfg.video ? `<a href="${cfg.video}" target="_blank" class="skill-video">${vidIcon}</a>` : ''}</div>`;
      h += `<div class="skill-detail">${cfg.defaultSets} SETS / ${cfg.defaultReps} REPS</div>`;
      h += `<div class="skill-sets">`;
      ex.sets.forEach((s, si) => {
        h += `<button class="set-btn ${s.done ? 'done' : ''}" onclick="toggleSet(${ei},${si})"><span>${si + 1}</span></button>`;
      });
      h += `</div></div>`;
    });
    h += `</div>`;

    // Complete button
    const canComplete = doneSets === totalSets && totalSets > 0;
    h += `<button class="complete-btn ${canComplete ? 'ready' : ''}" ${canComplete ? 'onclick="completeWorkout()"' : ''}>`;
    h += canComplete ? '⬥ APPROVED ⬥' : `${doneSets} / ${totalSets} Sets`;
    h += `</button>`;
  }

  // Quest log
  updateQuests(d);
  store.save(d);
  const quests = d.quests[key] || [];
  h += `<div class="quest-log">`;
  h += `<div class="quest-header">Orders from the Captain</div>`;
  quests.forEach(q => {
    h += `<div class="quest-item">`;
    h += `<div class="quest-diamond ${q.done ? 'done' : ''}"></div>`;
    h += `<span class="quest-label ${q.done ? 'done' : ''}">${q.label}</span>`;
    h += `</div>`;
  });
  h += `</div>`;

  // Timeline
  h += `<div class="timeline-section">`;
  h += `<div class="streak-display"><div class="streak-num">${streak}</div><div class="streak-label">Days at Sea</div></div>`;
  h += `<div class="week-track">`;
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
  const dayLabels = ['M','T','W','T','F','S','S'];
  for (let i = 0; i < 7; i++) {
    const dt = new Date(mon);
    dt.setDate(dt.getDate() + i);
    const dk = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const isToday = dk === todayStr();
    const wk = d.workouts[dk];
    const done = wk?.completedAt;
    h += `<div class="week-cell ${done ? 'done' : ''} ${isToday ? 'today' : ''}">${dayLabels[i]}</div>`;
  }
  h += `</div></div>`;

  document.getElementById('app').innerHTML = h;
}

function toggleSet(ei, si) {
  const d = store.get();
  ensureTodayWorkout(d);
  const w = d.workouts[todayStr()];
  if (w.completedAt) return;

  const set = w.exercises[ei].sets[si];
  const wasDone = set.done;
  set.done = !set.done;

  if (!wasDone) {
    awardXP(d, XP_SET);
    showXpPopup(XP_SET);
    const allExSets = w.exercises[ei].sets.every(s => s.done);
    if (allExSets) {
      awardXP(d, XP_EXERCISE);
      showXpPopup(XP_EXERCISE);
    }
  } else {
    const wasAllDone = w.exercises[ei].sets.filter((s, idx) => idx !== si).every(s => s.done);
    if (wasAllDone) d.player.xp = Math.max(0, d.player.xp - XP_EXERCISE);
    d.player.xp = Math.max(0, d.player.xp - XP_SET);
    while (d.player.level > 1 && d.player.xp < xpForLevel(d.player.level - 1)) d.player.level--;
  }

  store.save(d);
  render();
  debouncedSync();
}

function completeWorkout() {
  const d = store.get();
  const key = todayStr();
  const w = d.workouts[key];
  if (w.completedAt) return;
  if (!w.exercises.every(ex => ex.sets.every(s => s.done))) return;

  let earned = XP_WORKOUT;
  const streak = calcStreak(d) + 1;
  earned += streak * 2;
  w.xpEarned = (w.xpEarned || 0) + earned;
  w.completedAt = new Date().toISOString();

  const leveled = awardXP(d, earned);
  showXpPopup(earned);

  d.player.streak.current = streak;
  if (streak > d.player.streak.best) d.player.streak.best = streak;
  d.player.streak.lastDate = key;

  store.save(d);
  render();

  if (leveled) {
    setTimeout(showLevelUp, 200);
  }

  store.sync();
}

render();
store.pull().then(() => render());
</script>
</body>
</html>
