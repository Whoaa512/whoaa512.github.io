<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ANIME PHYSIQUE // SHONEN</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<style>
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes xp-float {
    0% { opacity: 1; transform: translate(-50%, 0) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -10px) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(1); }
  }
  @keyframes levelup-flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes levelup-text {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    60% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes stat-fill {
    from { width: 0; }
  }
  @keyframes impact-pop {
    0% { transform: scale(0.8); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulse-ready {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  @keyframes border-flow {
    0% { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #000000;
    color: #ffffff;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: conic-gradient(
      from 0deg at 50% 50%,
      #000 0deg, #0a0a0a 4deg, #000 8deg, #080808 12deg,
      #000 16deg, #0a0a0a 20deg, #000 24deg, #070707 28deg,
      #000 32deg, #090909 36deg, #000 40deg, #080808 44deg,
      #000 48deg, #0a0a0a 52deg, #000 56deg, #070707 60deg,
      #000 64deg, #090909 68deg, #000 72deg, #080808 76deg,
      #000 80deg, #0a0a0a 84deg, #000 88deg, #070707 92deg,
      #000 96deg, #090909 100deg, #000 104deg, #080808 108deg,
      #000 112deg, #0a0a0a 116deg, #000 120deg, #070707 124deg,
      #000 128deg, #090909 132deg, #000 136deg, #080808 140deg,
      #000 144deg, #0a0a0a 148deg, #000 152deg, #070707 156deg,
      #000 160deg, #090909 164deg, #000 168deg, #080808 172deg,
      #000 176deg, #0a0a0a 180deg, #000 184deg, #070707 188deg,
      #000 192deg, #090909 196deg, #000 200deg, #080808 204deg,
      #000 208deg, #0a0a0a 212deg, #000 216deg, #070707 220deg,
      #000 224deg, #090909 228deg, #000 232deg, #080808 236deg,
      #000 240deg, #0a0a0a 244deg, #000 248deg, #070707 252deg,
      #000 256deg, #090909 260deg, #000 264deg, #080808 268deg,
      #000 272deg, #0a0a0a 276deg, #000 280deg, #070707 284deg,
      #000 288deg, #090909 292deg, #000 296deg, #080808 300deg,
      #000 304deg, #0a0a0a 308deg, #000 312deg, #070707 316deg,
      #000 320deg, #090909 324deg, #000 328deg, #080808 332deg,
      #000 336deg, #0a0a0a 340deg, #000 344deg, #070707 348deg,
      #000 352deg, #090909 356deg, #000 360deg
    );
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  body::after { display: none; }

  .app {
    max-width: 420px;
    margin: 0 auto;
    padding: 0 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* === CHARACTER HUD === */
  .hud {
    padding: 24px 0 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hud-avatar {
    width: 48px;
    height: 48px;
    border: 2px solid #ffffff;
    border-radius: 50%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 900;
    flex-shrink: 0;
    color: #fff;
  }

  .hud-info { flex: 1; min-width: 0; }

  .hud-title {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.35);
  }

  .hud-name {
    font-size: 1.3rem;
    font-weight: 900;
    font-style: italic;
    letter-spacing: -1px;
    text-transform: uppercase;
    color: #ffffff;
  }

  .hud-class {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }

  .hud-level {
    text-align: center;
    flex-shrink: 0;
  }

  .hud-level-num {
    font-size: 2.2rem;
    font-weight: 900;
    font-style: italic;
    line-height: 1;
    color: #ffffff;
  }

  .hud-level-label {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.35);
  }

  /* === XP BAR === */
  .xp-wrap {
    position: relative;
    margin-bottom: 28px;
    padding-top: 8px;
  }

  .xp-track {
    height: 3px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
  }

  .xp-fill {
    height: 100%;
    background: #ff2d2d;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 8px rgba(255,45,45,0.5);
  }

  .xp-text {
    font-size: 0.55rem;
    color: rgba(255,255,255,0.3);
    text-align: right;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* === STATS PANEL === */
  .stats-panel {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
  }

  .stat-block {
    flex: 1;
    text-align: center;
    padding: 8px 0;
  }

  .stat-name {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 2rem;
    font-weight: 900;
    font-style: italic;
    line-height: 1;
    color: #ffffff;
    letter-spacing: -1px;
  }

  .stat-bar-track { display: none; }
  .stat-bar-fill { display: none; }

  /* === MISSION BRIEFING === */
  .mission {
    margin-bottom: 24px;
  }

  .mission-header {
    padding: 0;
  }

  .mission-tag {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mission-tag::before {
    content: '';
    display: inline-block;
    width: 5px;
    height: 5px;
    background: #ff2d2d;
    border-radius: 50%;
  }

  .mission-type {
    font-size: 2rem;
    font-weight: 900;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: -1px;
    padding: 4px 0 6px;
    color: #ffffff;
  }

  .mission-progress {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
  }

  .mission-progress span {
    color: #ff2d2d;
    font-weight: 700;
  }

  /* === SKILL CARDS (exercises) === */
  .skill-list {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 24px;
  }

  .skill-card {
    animation: slide-in 0.3s ease backwards;
  }

  .skill-card:nth-child(1) { animation-delay: 0.05s; }
  .skill-card:nth-child(2) { animation-delay: 0.1s; }
  .skill-card:nth-child(3) { animation-delay: 0.15s; }

  .skill-card.all-done .skill-name { color: rgba(255,255,255,0.35); }

  .skill-name {
    font-size: 1.2rem;
    font-weight: 900;
    font-style: italic;
    letter-spacing: -0.5px;
    text-transform: uppercase;
    margin-bottom: 2px;
    color: #ffffff;
  }

  .skill-video {
    color: rgba(255,255,255,0.3);
    text-decoration: none;
    margin-left: 8px;
    transition: all 0.2s;
    display: inline-block;
    vertical-align: middle;
    opacity: 0.6;
  }
  .skill-video:active { transform: scale(1.2); opacity: 1; }

  .skill-detail {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .skill-sets {
    display: flex;
    gap: 12px;
  }

  /* === SET BUTTONS — Circles === */
  .set-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    background: transparent;
    color: rgba(255,255,255,0.4);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .set-btn span {
    display: block;
  }

  .set-btn:active {
    transform: scale(0.9);
  }

  .set-btn.done {
    background: #ff2d2d;
    border-color: #ff2d2d;
    color: #ffffff;
    font-weight: 900;
    animation: impact-pop 0.25s ease;
  }

  /* === COMPLETE BUTTON === */
  .complete-btn {
    width: 100%;
    padding: 18px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: rgba(255,255,255,0.15);
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
    cursor: default;
    transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
    border-radius: 0;
  }

  .complete-btn.ready {
    border-color: #ff2d2d;
    color: #ffffff;
    cursor: pointer;
    background: #ff2d2d;
    font-weight: 900;
    font-style: italic;
    font-size: 0.9rem;
    letter-spacing: 5px;
    animation: pulse-ready 2s ease infinite;
  }

  .complete-btn.ready:active {
    transform: scale(0.98);
  }

  /* === QUEST LOG === */
  .quest-log {
    margin-bottom: 32px;
  }

  .quest-header {
    padding: 0 0 10px;
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.3);
  }

  .quest-header::before { display: none; }

  .quest-item {
    padding: 8px 0;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.85rem;
  }

  .quest-item:last-child {
    padding-bottom: 0;
  }

  .quest-diamond {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ff2d2d;
    flex-shrink: 0;
    transition: all 0.3s;
    border: none;
    transform: none;
  }

  .quest-diamond.done {
    background: transparent;
    box-shadow: none;
  }

  .quest-diamond.done::after {
    content: '✓';
    display: block;
    color: #ffffff;
    font-size: 0.7rem;
    font-weight: 900;
    line-height: 8px;
    text-align: center;
    margin-top: -1px;
    margin-left: -2px;
  }

  .quest-label { color: rgba(255,255,255,0.7); }
  .quest-label.done {
    color: rgba(255,255,255,0.25);
    text-decoration: line-through;
    text-decoration-color: rgba(255,255,255,0.15);
  }

  /* === STREAK & TIMELINE === */
  .timeline-section {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    align-items: center;
  }

  .streak-display {
    text-align: center;
    flex-shrink: 0;
    width: 80px;
  }

  .streak-num {
    font-size: 3.5rem;
    font-weight: 900;
    font-style: italic;
    line-height: 1;
    color: #ffffff;
    letter-spacing: -2px;
  }

  .streak-label {
    font-size: 0.45rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.25);
    margin-top: 2px;
  }

  .week-track {
    flex: 1;
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    padding: 0;
    background: none;
    border: none;
  }

  .week-cell {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    font-weight: 700;
    color: rgba(255,255,255,0.2);
    background: transparent;
    border: none;
    transition: all 0.3s;
    clip-path: none;
  }

  .week-cell.done {
    background: #ff2d2d;
    color: #ffffff;
    font-weight: 900;
  }

  .week-cell.today {
    border: 2px solid rgba(255,255,255,0.5);
    color: #ffffff;
  }

  .week-cell.done.today {
    border: none;
    background: #ff2d2d;
    color: #ffffff;
  }

  /* === DONE BANNER === */
  .done-banner {
    padding: 40px 0;
    text-align: center;
    margin-bottom: 32px;
  }

  .done-banner::before { display: none; }

  .done-status {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 8px;
  }

  .done-title {
    font-size: 2rem;
    font-weight: 900;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: -1px;
    color: #ffffff;
    -webkit-text-fill-color: #ffffff;
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
    margin-bottom: 8px;
  }

  .done-xp {
    font-size: 1rem;
    color: #ff2d2d;
    font-weight: 900;
    font-style: italic;
  }

  .done-next {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.25);
    margin-top: 12px;
    letter-spacing: 3px;
  }

  /* === XP POPUP === */
  .xp-popup {
    position: fixed;
    top: 40%;
    left: 50%;
    font-size: 2.5rem;
    font-weight: 900;
    font-style: italic;
    color: #ff2d2d;
    text-shadow: 0 0 20px rgba(255,45,45,0.8), 0 0 40px rgba(255,45,45,0.4);
    pointer-events: none;
    animation: xp-float 1.2s ease forwards;
    z-index: 100;
    letter-spacing: -1px;
  }

  /* === LEVEL UP OVERLAY === */
  .levelup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,45,45,0.2);
    z-index: 200;
    animation: levelup-flash 1.5s ease forwards;
    pointer-events: none;
  }

  .levelup-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 3.5rem;
    font-weight: 900;
    font-style: italic;
    letter-spacing: -2px;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow: 0 0 30px rgba(255,45,45,0.8), 0 0 60px rgba(255,45,45,0.4);
    z-index: 201;
    animation: levelup-text 1.5s ease forwards;
    pointer-events: none;
  }

  /* === SYNC BADGE === */
  .sync-badge {
    font-size: 0.45rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 2px 6px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: rgba(255,255,255,0.2);
    display: inline-block;
  }
  .sync-badge.synced { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.4); }
  .sync-badge.syncing { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.3); animation: glow-pulse 1s ease infinite; }
  .sync-badge.error { border-color: #ff2d2d; color: #ff2d2d; }
  .sync-badge.local { color: rgba(255,255,255,0.2); }

  .corner-tl, .corner-br { display: none; }
</style>
</head>
<body>
<div class="corner-tl"></div>
<div class="corner-br"></div>
<div class="app" id="app"></div>
<script>
const SYNC_URL = 'https://anime-bod-sync.winslowcj5.workers.dev/api/sync';
const params = new URLSearchParams(window.location.search);
const USER_KEY = params.get('key');
let syncState = USER_KEY ? 'local' : null;
let syncDebounceTimer = null;

const VID = 'https://www.youtube.com/watch?v=3Zgrh5009_k';
const SPLITS = {
  push: { label: 'Push Day', tag: 'STRENGTH', stat: 'str', exercises: [
    { id: 'pike-pushups', name: 'Pike Push-ups', defaultSets: 3, defaultReps: 10, video: `${VID}&t=188s` },
    { id: 'decline-deficit-pushups', name: 'Decline Deficit Push-ups', defaultSets: 3, defaultReps: 12, video: `${VID}&t=265s` },
    { id: 'dips', name: 'Dips', defaultSets: 3, defaultReps: 10, video: `${VID}&t=308s` }
  ]},
  pull: { label: 'Pull Day', tag: 'AGILITY', stat: 'agi', exercises: [
    { id: 'pullups', name: 'Pull-ups', defaultSets: 3, defaultReps: 8, video: `${VID}&t=55s` },
    { id: 'inverted-rows', name: 'Inverted Rows', defaultSets: 3, defaultReps: 12, video: `${VID}&t=125s` }
  ]},
  legs: { label: 'Legs Day', tag: 'ENDURANCE', stat: 'end', exercises: [
    { id: 'pistol-squats', name: 'Pistol Squats', defaultSets: 3, defaultReps: 6, video: `${VID}&t=373s` },
    { id: 'hip-hinges', name: 'Hip Hinges', defaultSets: 3, defaultReps: 12, video: `${VID}&t=411s` },
    { id: 'dragonflies', name: 'Dragonflies', defaultSets: 3, defaultReps: 8, video: `${VID}&t=479s` }
  ]}
};
const SPLIT_ORDER = ['push', 'pull', 'legs'];
const XP_SET = 5, XP_EXERCISE = 15, XP_WORKOUT = 30;

const store = {
  get() {
    try { return JSON.parse(localStorage.getItem('anime-bod') || 'null') || this.fresh(); }
    catch { return this.fresh(); }
  },
  save(d) { localStorage.setItem('anime-bod', JSON.stringify(d)); },
  fresh() {
    return {
      version: 1,
      player: { name: 'Hero', xp: 0, level: 1, stats: { str: 0, agi: 0, end: 0 }, streak: { current: 0, best: 0, lastDate: null } },
      workouts: {},
      quests: {},
      settings: {}
    };
  },
  async sync() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      await fetch(`${SYNC_URL}?key=${USER_KEY}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: localStorage.getItem('anime-bod')
      });
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  },
  async pull() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      const res = await fetch(`${SYNC_URL}?key=${USER_KEY}`);
      if (res.ok) {
        const remote = await res.json();
        const local = this.get();
        const merged = mergeState(local, remote);
        this.save(merged);
      }
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  }
};

function mergeState(local, remote) {
  if (!remote || !remote.workouts) return local;
  if (!local || !local.workouts) return remote;

  const merged = JSON.parse(JSON.stringify(local));

  Object.keys(remote.workouts).forEach(day => {
    const rw = remote.workouts[day];
    const lw = merged.workouts[day];
    if (!lw) { merged.workouts[day] = rw; return; }
    if (rw.completedAt && !lw.completedAt) { merged.workouts[day] = rw; return; }
  });

  Object.keys(remote.quests || {}).forEach(day => {
    if (!merged.quests[day]) merged.quests[day] = remote.quests[day];
  });

  if (remote.player.xp > merged.player.xp) {
    merged.player.xp = remote.player.xp;
    merged.player.level = remote.player.level;
  }
  if ((remote.player.streak?.best || 0) > (merged.player.streak?.best || 0)) {
    merged.player.streak.best = remote.player.streak.best;
  }

  return merged;
}

function setSyncState(state) {
  syncState = state;
  const el = document.getElementById('sync-badge');
  if (!el) return;
  el.className = 'sync-badge ' + state;
  el.textContent = state === 'syncing' ? 'syncing...' : state === 'synced' ? 'synced' : state === 'error' ? 'offline' : 'local only';
}

function debouncedSync() {
  if (!USER_KEY) return;
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(() => store.sync(), 2000);
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function xpForLevel(n) { return 50 * n + 10 * n * n; }

function getCompletedCount(d) {
  return Object.values(d.workouts).filter(w => w.completedAt).length;
}

function getTodayType(d) {
  return SPLIT_ORDER[getCompletedCount(d) % 3];
}

function ensureTodayWorkout(d) {
  const key = todayStr();
  if (d.workouts[key] && d.workouts[key].completedAt) return d;
  const type = getTodayType(d);
  if (!d.workouts[key] || d.workouts[key].type !== type) {
    d.workouts[key] = {
      type,
      exercises: SPLITS[type].exercises.map(ex => ({
        id: ex.id, sets: Array.from({ length: ex.defaultSets }, () => ({ done: false }))
      })),
      completedAt: null,
      xpEarned: 0
    };
  }
  return d;
}

function ensureTodayQuests(d) {
  const key = todayStr();
  if (d.quests[key]) return d;
  const type = getTodayType(d);
  const split = SPLITS[type];
  const quests = [
    { id: 'complete-workout', label: `Complete ${split.label}`, done: false },
    { id: 'all-sets', label: 'Finish every set', done: false }
  ];
  if (type === 'push') quests.push({ id: 'pike-master', label: 'Complete all Pike Push-ups', done: false });
  if (type === 'pull') quests.push({ id: 'pull-master', label: 'Complete all Pull-ups', done: false });
  if (type === 'legs') quests.push({ id: 'pistol-master', label: 'Complete all Pistol Squats', done: false });
  d.quests[key] = quests;
  return d;
}

function updateQuests(d) {
  const key = todayStr();
  const w = d.workouts[key];
  const q = d.quests[key];
  if (!w || !q) return;
  const allSetsDone = w.exercises.every(ex => ex.sets.every(s => s.done));
  q.forEach(quest => {
    if (quest.id === 'complete-workout') quest.done = !!w.completedAt;
    if (quest.id === 'all-sets') quest.done = allSetsDone;
    if (quest.id === 'pike-master') quest.done = w.exercises.find(e => e.id === 'pike-pushups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pull-master') quest.done = w.exercises.find(e => e.id === 'pullups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pistol-master') quest.done = w.exercises.find(e => e.id === 'pistol-squats')?.sets.every(s => s.done) || false;
  });
}

function calcStreak(d) {
  let streak = 0;
  const t = new Date();
  if (d.workouts[todayStr()]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
  else { t.setDate(t.getDate() - 1); }
  for (let i = 0; i < 365; i++) {
    const key = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const dow = t.getDay();
    if (dow === 0) { t.setDate(t.getDate() - 1); continue; }
    if (d.workouts[key]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
    else break;
  }
  return streak;
}

function calcStats(d) {
  const stats = { str: 0, agi: 0, end: 0 };
  Object.values(d.workouts).forEach(w => {
    if (!w.completedAt) return;
    const split = SPLITS[w.type];
    if (!split) return;
    const vol = w.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => s.done).length, 0);
    stats[split.stat] += vol;
  });
  return stats;
}

function awardXP(d, amount) {
  const oldLevel = d.player.level;
  d.player.xp += amount;
  while (d.player.xp >= xpForLevel(d.player.level)) {
    d.player.level++;
  }
  return d.player.level > oldLevel;
}

let pendingXpPopup = 0;
function showXpPopup(amount) {
  pendingXpPopup += amount;
  const el = document.createElement('div');
  el.className = 'xp-popup';
  el.textContent = `+${pendingXpPopup} XP`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
  setTimeout(() => { pendingXpPopup = 0; }, 100);
}

function showLevelUp() {
  const flash = document.createElement('div');
  flash.className = 'levelup-overlay';
  document.body.appendChild(flash);
  const txt = document.createElement('div');
  txt.className = 'levelup-text';
  txt.textContent = 'LEVEL UP';
  document.body.appendChild(txt);
  setTimeout(() => { flash.remove(); txt.remove(); }, 1500);
}

function render() {
  const d = store.get();
  ensureTodayWorkout(d);
  ensureTodayQuests(d);
  d.player.stats = calcStats(d);
  d.player.streak.current = calcStreak(d);
  if (d.player.streak.current > d.player.streak.best) d.player.streak.best = d.player.streak.current;
  store.save(d);

  const key = todayStr();
  const w = d.workouts[key];
  const type = w.type;
  const split = SPLITS[type];
  const streak = d.player.streak.current;
  const level = d.player.level;
  const prevLevelXp = level > 1 ? xpForLevel(level - 1) : 0;
  const xpCur = d.player.xp - prevLevelXp;
  const xpNeed = xpForLevel(level) - prevLevelXp;
  const xpPct = Math.min(100, (xpCur / xpNeed) * 100);
  const totalCompleted = getCompletedCount(d);
  const maxStat = Math.max(d.player.stats.str, d.player.stats.agi, d.player.stats.end, 1);

  let h = '';

  // HUD
  h += `<div class="hud">`;
  h += `<div class="hud-avatar">${level}</div>`;
  h += `<div class="hud-info">`;
  h += `<div class="hud-title">Player Status</div>`;
  h += `<div class="hud-name">Anime Physique</div>`;
  h += `<div class="hud-class">${split.tag} // ${split.label.toUpperCase()}</div>`;
  h += `</div>`;
  h += `<div class="hud-level"><div class="hud-level-num">${level}</div><div class="hud-level-label">Level</div></div>`;
  h += `</div>`;
  if (USER_KEY) {
    const badgeLabel = syncState === 'syncing' ? 'syncing...' : syncState === 'synced' ? 'synced' : syncState === 'error' ? 'offline' : 'local only';
    h += `<div style="text-align:right;margin-bottom:4px"><span id="sync-badge" class="sync-badge ${syncState || 'local'}">${badgeLabel}</span></div>`;
  }

  // XP Bar
  h += `<div class="xp-wrap">`;
  h += `<div class="xp-track"><div class="xp-fill" style="width:${xpPct}%"></div></div>`;
  h += `<div class="xp-text">${xpCur} / ${xpNeed} XP</div>`;
  h += `</div>`;

  // Stats
  h += `<div class="stats-panel">`;
  const statTips = { str: 'Levels up from Push days (Pike Push-ups, Dips, Decline Push-ups)', agi: 'Levels up from Pull days (Pull-ups, Inverted Rows)', end: 'Levels up from Legs days (Pistol Squats, Hip Hinges, Dragonflies)' };
  ['str', 'agi', 'end'].forEach(s => {
    const label = s.toUpperCase();
    const val = d.player.stats[s];
    const pct = Math.min(100, (val / maxStat) * 100);
    h += `<div class="stat-block ${s}" title="${statTips[s]}">`;
    h += `<div class="stat-name">${label}</div>`;
    h += `<div class="stat-value">${val}</div>`;
    h += `<div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%"></div></div>`;
    h += `</div>`;
  });
  h += `</div>`;

  if (w.completedAt) {
    // Done state
    const nextType = SPLIT_ORDER[totalCompleted % 3];
    const nextSplit = SPLITS[nextType];
    h += `<div class="done-banner">`;
    h += `<div class="done-status">Mission Complete</div>`;
    h += `<div class="done-title">${split.label}</div>`;
    h += `<div class="done-xp">+${w.xpEarned} XP EARNED</div>`;
    h += `<div class="done-next">NEXT MISSION // ${nextSplit.label.toUpperCase()}</div>`;
    h += `</div>`;
  } else {
    // Mission header
    let totalSets = 0, doneSets = 0;
    w.exercises.forEach(ex => {
      ex.sets.forEach(s => { totalSets++; if (s.done) doneSets++; });
    });

    h += `<div class="mission">`;
    h += `<div class="mission-header"><span class="mission-tag">Today's Mission</span></div>`;
    h += `<div class="mission-type">${split.label}</div>`;
    h += `<div class="mission-progress"><span>${doneSets}</span> / ${totalSets} sets cleared</div>`;
    h += `</div>`;

    // Skill cards
    h += `<div class="skill-list">`;
    w.exercises.forEach((ex, ei) => {
      const cfg = split.exercises[ei];
      const allDone = ex.sets.every(s => s.done);
      h += `<div class="skill-card ${allDone ? 'all-done' : ''}">`;
      const vidIcon = `<svg viewBox="0 0 24 20" width="32" height="26" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="22" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><polygon points="9,5.5 9,14.5 17,10" fill="currentColor"/></svg>`;
      h += `<div class="skill-name">${cfg.name} ${cfg.video ? `<a href="${cfg.video}" target="_blank" class="skill-video">${vidIcon}</a>` : ''}</div>`;
      h += `<div class="skill-detail">${cfg.defaultSets} SETS / ${cfg.defaultReps} REPS</div>`;
      h += `<div class="skill-sets">`;
      ex.sets.forEach((s, si) => {
        h += `<button class="set-btn ${s.done ? 'done' : ''}" onclick="toggleSet(${ei},${si})"><span>${si + 1}</span></button>`;
      });
      h += `</div></div>`;
    });
    h += `</div>`;

    // Complete button
    const canComplete = doneSets === totalSets && totalSets > 0;
    h += `<button class="complete-btn ${canComplete ? 'ready' : ''}" ${canComplete ? 'onclick="completeWorkout()"' : ''}>`;
    h += canComplete ? 'GO BEYOND' : `${doneSets} / ${totalSets} Sets`;
    h += `</button>`;
  }

  // Quest log
  updateQuests(d);
  store.save(d);
  const quests = d.quests[key] || [];
  h += `<div class="quest-log">`;
  h += `<div class="quest-header">Quest Log</div>`;
  quests.forEach(q => {
    h += `<div class="quest-item">`;
    h += `<div class="quest-diamond ${q.done ? 'done' : ''}"></div>`;
    h += `<span class="quest-label ${q.done ? 'done' : ''}">${q.label}</span>`;
    h += `</div>`;
  });
  h += `</div>`;

  // Timeline
  h += `<div class="timeline-section">`;
  h += `<div class="streak-display"><div class="streak-num">${streak}</div><div class="streak-label">Streak</div></div>`;
  h += `<div class="week-track">`;
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
  const dayLabels = ['M','T','W','T','F','S','S'];
  for (let i = 0; i < 7; i++) {
    const dt = new Date(mon);
    dt.setDate(dt.getDate() + i);
    const dk = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const isToday = dk === todayStr();
    const wk = d.workouts[dk];
    const done = wk?.completedAt;
    h += `<div class="week-cell ${done ? 'done' : ''} ${isToday ? 'today' : ''}">${dayLabels[i]}</div>`;
  }
  h += `</div></div>`;

  document.getElementById('app').innerHTML = h;
}

function toggleSet(ei, si) {
  const d = store.get();
  ensureTodayWorkout(d);
  const w = d.workouts[todayStr()];
  if (w.completedAt) return;

  const set = w.exercises[ei].sets[si];
  const wasDone = set.done;
  set.done = !set.done;

  if (!wasDone) {
    awardXP(d, XP_SET);
    showXpPopup(XP_SET);
    const allExSets = w.exercises[ei].sets.every(s => s.done);
    if (allExSets) {
      awardXP(d, XP_EXERCISE);
      showXpPopup(XP_EXERCISE);
    }
  } else {
    const wasAllDone = w.exercises[ei].sets.filter((s, idx) => idx !== si).every(s => s.done);
    if (wasAllDone) d.player.xp = Math.max(0, d.player.xp - XP_EXERCISE);
    d.player.xp = Math.max(0, d.player.xp - XP_SET);
    while (d.player.level > 1 && d.player.xp < xpForLevel(d.player.level - 1)) d.player.level--;
  }

  store.save(d);
  render();
  debouncedSync();
}

function completeWorkout() {
  const d = store.get();
  const key = todayStr();
  const w = d.workouts[key];
  if (w.completedAt) return;
  if (!w.exercises.every(ex => ex.sets.every(s => s.done))) return;

  let earned = XP_WORKOUT;
  const streak = calcStreak(d) + 1;
  earned += streak * 2;
  w.xpEarned = (w.xpEarned || 0) + earned;
  w.completedAt = new Date().toISOString();

  const leveled = awardXP(d, earned);
  showXpPopup(earned);

  d.player.streak.current = streak;
  if (streak > d.player.streak.best) d.player.streak.best = streak;
  d.player.streak.lastDate = key;

  store.save(d);
  render();

  if (leveled) {
    setTimeout(showLevelUp, 200);
  }

  store.sync();
}

render();
store.pull().then(() => render());
</script>
</body>
</html>
