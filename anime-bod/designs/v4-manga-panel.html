<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ANIME BOD // 体力</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@500;700&display=swap');

  @keyframes speed-lines {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes xp-float {
    0% { opacity: 1; transform: translate(-50%, 0) scale(0.5) rotate(-3deg); }
    20% { opacity: 1; transform: translate(-50%, -10px) scale(1.4) rotate(2deg); }
    100% { opacity: 0; transform: translate(-50%, -70px) scale(1) rotate(-1deg); }
  }
  @keyframes levelup-flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes levelup-text {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2) rotate(-8deg); }
    25% { opacity: 1; transform: translate(-50%, -50%) scale(1.3) rotate(3deg); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1) rotate(-2deg); }
  }
  @keyframes stat-fill {
    from { width: 0; }
  }
  @keyframes set-pop {
    0% { transform: scale(0.7); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateY(12px) skewX(-1deg); }
    to { opacity: 1; transform: translateY(0) skewX(0); }
  }
  @keyframes sfx-bounce {
    0% { transform: scale(0.3) rotate(-12deg); opacity: 0; }
    50% { transform: scale(1.15) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(-2deg); opacity: 1; }
  }
  @keyframes streak-fire {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(1.15); }
  }

  :root {
    --ink: #1a1a1a;
    --ink-light: #444;
    --ink-faint: #999;
    --paper: #fff;
    --paper-cream: #faf8f2;
    --panel-bg: #fff;
    --border-thick: 4px;
    --border-medium: 2.5px;
    --border-thin: 1.5px;
    --red: #d32f2f;
    --blue: #1565c0;
    --gold: #f9a825;
    --gold-dark: #c17900;
    --green: #2e7d32;
    --str-color: #c62828;
    --agi-color: #1565c0;
    --end-color: #2e7d32;
    --tone-dots: radial-gradient(circle, #000 0.8px, transparent 0.8px);
    --tone-size: 6px 6px;
    --tone-light: radial-gradient(circle, rgba(0,0,0,0.08) 0.6px, transparent 0.6px);
    --tone-light-size: 4px 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Oswald', 'Impact', 'Arial Narrow', sans-serif;
    background: var(--paper-cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 440px;
    margin: 0 auto;
    padding: 6px 6px 70px;
    position: relative;
    background: var(--paper);
    min-height: 100vh;
    border-left: var(--border-thick) solid var(--ink);
    border-right: var(--border-thick) solid var(--ink);
  }

  /* === MANGA PANEL SYSTEM === */
  .panel {
    border: var(--border-thick) solid var(--ink);
    background: var(--panel-bg);
    position: relative;
    overflow: hidden;
  }

  .panel-thin {
    border-width: var(--border-medium);
  }

  .panel-bleed {
    margin-left: -6px;
    margin-right: -6px;
    border-left: none;
    border-right: none;
  }

  /* Gutter between panels */
  .gutter { height: 6px; }
  .gutter-sm { height: 4px; }

  /* === HALFTONE / SCREENTONE OVERLAYS === */
  .tone-dark {
    background-image: var(--tone-dots);
    background-size: var(--tone-size);
  }

  .tone-light::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: var(--tone-light);
    background-size: var(--tone-light-size);
    pointer-events: none;
    z-index: 0;
  }

  /* === SPEED LINES === */
  .speed-lines {
    position: absolute;
    pointer-events: none;
    z-index: 0;
  }

  .speed-lines-radial::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 300%;
    height: 300%;
    transform: translate(-50%, -50%);
    background: repeating-conic-gradient(
      transparent 0deg, transparent 1.2deg,
      rgba(0,0,0,0.04) 1.2deg, rgba(0,0,0,0.04) 1.8deg
    );
    pointer-events: none;
    z-index: 0;
  }

  .speed-lines-h::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent, transparent 3px,
      rgba(0,0,0,0.035) 3px, rgba(0,0,0,0.035) 3.8px
    );
    pointer-events: none;
  }

  /* === MANGA SFX TEXT === */
  .sfx {
    font-family: 'Bangers', 'Impact', cursive;
    position: absolute;
    z-index: 2;
    line-height: 1;
    pointer-events: none;
    letter-spacing: 2px;
    -webkit-text-stroke: 1.5px var(--ink);
    paint-order: stroke fill;
  }

  .sfx-outline {
    color: var(--paper);
    -webkit-text-stroke: 2.5px var(--ink);
  }

  /* === CHARACTER HUD PANEL === */
  .hud-panel {
    display: grid;
    grid-template-columns: 68px 1fr auto;
    gap: 0;
    padding: 0;
  }

  .hud-avatar-cell {
    border-right: var(--border-thick) solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: var(--ink);
    color: var(--paper);
    min-height: 72px;
  }

  .hud-avatar-num {
    font-family: 'Bangers', cursive;
    font-size: 2.6rem;
    line-height: 1;
    color: var(--paper);
    position: relative;
    z-index: 1;
  }

  .hud-info-cell {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }

  .hud-title {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--ink-faint);
    font-weight: 500;
  }

  .hud-name {
    font-family: 'Bangers', cursive;
    font-size: 1.5rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1.1;
  }

  .hud-class {
    font-size: 0.65rem;
    color: var(--ink-light);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .hud-level-cell {
    border-left: var(--border-medium) solid var(--ink);
    padding: 6px 14px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .hud-level-cell::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: var(--tone-light);
    background-size: var(--tone-light-size);
    pointer-events: none;
  }

  .hud-level-num {
    font-family: 'Bangers', cursive;
    font-size: 2.2rem;
    line-height: 1;
    color: var(--gold-dark);
    position: relative;
    z-index: 1;
  }

  .hud-level-label {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--ink-faint);
    font-weight: 700;
    position: relative;
    z-index: 1;
  }

  /* === XP BAR === */
  .xp-panel {
    padding: 8px 12px 10px;
    position: relative;
  }

  .xp-track {
    height: 12px;
    background: var(--paper);
    border: var(--border-medium) solid var(--ink);
    overflow: hidden;
    position: relative;
  }

  .xp-fill {
    height: 100%;
    background: var(--ink);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .xp-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent, transparent 3px,
      rgba(255,255,255,0.25) 3px, rgba(255,255,255,0.25) 6px
    );
  }

  .xp-text {
    font-size: 0.6rem;
    color: var(--ink-faint);
    text-align: right;
    margin-top: 3px;
    letter-spacing: 2px;
    font-weight: 700;
  }

  /* === STATS ROW === */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }

  .stat-cell {
    border: var(--border-medium) solid var(--ink);
    padding: 10px 10px 8px;
    position: relative;
    text-align: center;
  }

  .stat-cell + .stat-cell {
    border-left: none;
  }

  .stat-label {
    font-size: 0.55rem;
    letter-spacing: 3px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .stat-cell.str .stat-label { color: var(--str-color); }
  .stat-cell.agi .stat-label { color: var(--agi-color); }
  .stat-cell.end .stat-label { color: var(--end-color); }

  .stat-num {
    font-family: 'Bangers', cursive;
    font-size: 1.8rem;
    line-height: 1.1;
  }

  .stat-cell.str .stat-num { color: var(--str-color); }
  .stat-cell.agi .stat-num { color: var(--agi-color); }
  .stat-cell.end .stat-num { color: var(--end-color); }

  .stat-bar {
    height: 4px;
    background: #e0e0e0;
    margin-top: 4px;
    overflow: hidden;
  }

  .stat-bar-inner {
    height: 100%;
    animation: stat-fill 0.8s ease-out;
  }

  .stat-cell.str .stat-bar-inner { background: var(--str-color); }
  .stat-cell.agi .stat-bar-inner { background: var(--agi-color); }
  .stat-cell.end .stat-bar-inner { background: var(--end-color); }

  /* === MISSION PANEL (big dramatic) === */
  .mission-panel {
    position: relative;
    padding: 0;
  }

  .mission-panel .speed-lines-radial::before {
    opacity: 0.5;
  }

  .mission-tag-bar {
    background: var(--ink);
    color: var(--paper);
    padding: 5px 14px;
    font-size: 0.55rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 700;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .mission-tag-bar .progress-text {
    color: #aaa;
    font-weight: 500;
  }

  .mission-tag-bar .progress-text span {
    color: var(--paper);
    font-weight: 700;
  }

  .mission-title {
    font-family: 'Bangers', cursive;
    font-size: 2.4rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    padding: 14px 16px 16px;
    line-height: 1;
    color: var(--ink);
    position: relative;
    z-index: 1;
  }

  /* === EXERCISE PANELS (asymmetric layout) === */
  .exercise-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .ex-panel {
    border: var(--border-thick) solid var(--ink);
    position: relative;
    overflow: hidden;
    animation: slide-in 0.3s ease backwards;
  }

  .ex-panel:nth-child(1) { animation-delay: 0.05s; }
  .ex-panel:nth-child(2) { animation-delay: 0.1s; }
  .ex-panel:nth-child(3) { animation-delay: 0.15s; }

  .ex-panel + .ex-panel {
    margin-top: -4px;
  }

  .ex-panel.all-done {
    position: relative;
  }

  .ex-panel.all-done::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: var(--tone-light);
    background-size: 5px 5px;
    pointer-events: none;
    z-index: 0;
  }

  .ex-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 14px 4px;
    position: relative;
    z-index: 1;
  }

  .ex-name {
    font-family: 'Bangers', cursive;
    font-size: 1.2rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1.1;
    color: var(--ink);
  }

  .ex-video {
    color: var(--ink);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-left: 8px;
    opacity: 0.6;
  }
  .ex-video:active { transform: scale(1.2); opacity: 1; }

  .ex-detail {
    font-size: 0.6rem;
    color: var(--ink-faint);
    letter-spacing: 2px;
    font-weight: 700;
    padding: 0 14px 8px;
    position: relative;
    z-index: 1;
  }

  .ex-sets {
    display: flex;
    gap: 0;
    padding: 0 14px 12px;
    position: relative;
    z-index: 1;
  }

  .ex-sfx {
    font-family: 'Bangers', cursive;
    position: absolute;
    right: 10px;
    top: 4px;
    font-size: 1.6rem;
    color: var(--green);
    z-index: 2;
    animation: sfx-bounce 0.4s ease;
    letter-spacing: 1px;
    -webkit-text-stroke: 1px var(--ink);
    paint-order: stroke fill;
    pointer-events: none;
  }

  /* === SET BUTTONS (ink stamp style) === */
  .set-btn {
    width: 48px;
    height: 48px;
    border: var(--border-medium) solid var(--ink);
    background: var(--paper);
    color: var(--ink-faint);
    font-family: 'Bangers', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 8px;
  }

  .set-btn:active {
    transform: scale(0.9);
  }

  .set-btn.done {
    background: var(--ink);
    color: var(--paper);
    animation: set-pop 0.3s ease;
  }

  .set-btn.done::after {
    content: '';
    position: absolute;
    inset: 2px;
    border: 1.5px solid rgba(255,255,255,0.3);
  }

  /* === COMPLETE BUTTON === */
  .complete-btn {
    width: calc(100% - 12px);
    margin: 6px 6px;
    padding: 16px;
    border: var(--border-thick) solid var(--ink);
    background: var(--paper);
    color: var(--ink-faint);
    font-family: 'Bangers', cursive;
    font-size: 1.2rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    cursor: default;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
  }

  .complete-btn.ready {
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
  }

  .complete-btn.ready::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent, transparent 5px,
      rgba(255,255,255,0.06) 5px, rgba(255,255,255,0.06) 10px
    );
  }

  .complete-btn.ready:active {
    transform: scale(0.98);
  }

  /* === QUEST LOG PANEL === */
  .quest-panel {
    position: relative;
  }

  .quest-header {
    background: var(--ink);
    color: var(--paper);
    padding: 6px 14px;
    font-family: 'Bangers', cursive;
    font-size: 0.9rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .quest-header::before {
    content: '!';
    display: inline-flex;
    width: 18px;
    height: 18px;
    align-items: center;
    justify-content: center;
    background: var(--red);
    color: var(--paper);
    font-weight: 900;
    font-size: 0.75rem;
    flex-shrink: 0;
  }

  .quest-item {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    border-top: var(--border-thin) solid #ddd;
    position: relative;
  }

  .quest-item:last-child { padding-bottom: 12px; }

  .quest-check {
    width: 16px;
    height: 16px;
    border: 2px solid var(--ink);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 900;
  }

  .quest-check.done {
    background: var(--ink);
    color: var(--paper);
  }

  .quest-check.done::after { content: '✓'; }

  .quest-label { color: var(--ink); }
  .quest-label.done {
    color: var(--ink-faint);
    text-decoration: line-through;
  }

  /* === STREAK / WEEK PANEL === */
  .bottom-grid {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 0;
  }

  .streak-cell {
    border: var(--border-thick) solid var(--ink);
    padding: 10px 8px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--ink);
    color: var(--paper);
    position: relative;
    overflow: hidden;
  }

  .streak-num {
    font-family: 'Bangers', cursive;
    font-size: 2.8rem;
    line-height: 1;
    position: relative;
    z-index: 1;
  }

  .streak-label {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    opacity: 0.6;
    font-weight: 700;
    position: relative;
    z-index: 1;
  }

  .week-row {
    border: var(--border-thick) solid var(--ink);
    border-left: none;
    display: flex;
    gap: 0;
    align-items: stretch;
  }

  .week-day {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 2px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--ink-faint);
    position: relative;
    border-right: var(--border-thin) solid #ddd;
  }

  .week-day:last-child { border-right: none; }

  .week-day.done {
    background: var(--ink);
    color: var(--paper);
    border-right-color: #333;
  }

  .week-day.today {
    outline: 2px solid var(--ink);
    outline-offset: -2px;
    font-weight: 900;
    color: var(--ink);
  }

  .week-day.done.today {
    color: var(--paper);
    outline-color: var(--paper);
  }

  /* === DONE BANNER === */
  .done-panel {
    text-align: center;
    padding: 28px 20px;
    position: relative;
    overflow: hidden;
  }

  .done-panel .speed-lines-radial::before {
    opacity: 0.7;
  }

  .done-sfx {
    font-family: 'Bangers', cursive;
    font-size: 3.2rem;
    letter-spacing: 6px;
    color: var(--ink);
    -webkit-text-stroke: 2px var(--ink);
    paint-order: stroke fill;
    position: relative;
    z-index: 1;
    line-height: 1;
    margin-bottom: 6px;
  }

  .done-subtitle {
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-light);
    position: relative;
    z-index: 1;
  }

  .done-xp {
    font-family: 'Bangers', cursive;
    font-size: 1.4rem;
    color: var(--gold-dark);
    margin-top: 6px;
    position: relative;
    z-index: 1;
    letter-spacing: 2px;
  }

  .done-next {
    font-size: 0.65rem;
    color: var(--ink-faint);
    margin-top: 10px;
    letter-spacing: 2px;
    font-weight: 700;
    position: relative;
    z-index: 1;
  }

  /* === XP POPUP (manga SFX style) === */
  .xp-popup {
    position: fixed;
    top: 40%;
    left: 50%;
    font-family: 'Bangers', cursive;
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--gold-dark);
    -webkit-text-stroke: 2px var(--ink);
    paint-order: stroke fill;
    pointer-events: none;
    animation: xp-float 1.2s ease forwards;
    z-index: 100;
    letter-spacing: 3px;
    filter: drop-shadow(2px 2px 0 var(--ink));
  }

  /* === LEVEL UP OVERLAY (manga explosion) === */
  .levelup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.9);
    z-index: 200;
    animation: levelup-flash 1.5s ease forwards;
    pointer-events: none;
  }

  .levelup-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bangers', cursive;
    font-size: 3.5rem;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: var(--ink);
    -webkit-text-stroke: 3px var(--ink);
    paint-order: stroke fill;
    z-index: 201;
    animation: levelup-text 1.5s ease forwards;
    pointer-events: none;
    filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.15));
  }

  /* === SYNC BADGE === */
  .sync-badge {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 2px 6px;
    border: 1.5px solid #ddd;
    background: var(--paper);
    color: var(--ink-faint);
    display: inline-block;
    font-weight: 700;
  }
  .sync-badge.synced { border-color: var(--green); color: var(--green); }
  .sync-badge.syncing { border-color: var(--blue); color: var(--blue); }
  .sync-badge.error { border-color: var(--red); color: var(--red); }

  /* === PAGE EDGE MARKS (like printed manga) === */
  .page-mark-top {
    text-align: center;
    padding: 10px 0 4px;
    font-size: 0.45rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #ccc;
    font-weight: 700;
  }

  /* === DIAGONAL SLASH PANELS === */
  .slash-divider {
    height: 18px;
    position: relative;
    overflow: hidden;
    margin: 0 -6px;
  }

  .slash-divider::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -10%;
    right: -10%;
    height: calc(100% + 4px);
    background: var(--ink);
    transform: skewY(-1.2deg);
  }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const SYNC_URL = 'https://anime-bod-sync.winslowcj5.workers.dev/api/sync';
const params = new URLSearchParams(window.location.search);
const USER_KEY = params.get('key');
let syncState = USER_KEY ? 'local' : null;
let syncDebounceTimer = null;

const VID = 'https://www.youtube.com/watch?v=3Zgrh5009_k';
const SPLITS = {
  push: { label: 'Push Day', tag: 'STRENGTH', stat: 'str', exercises: [
    { id: 'pike-pushups', name: 'Pike Push-ups', defaultSets: 3, defaultReps: 10, video: `${VID}&t=188s` },
    { id: 'decline-deficit-pushups', name: 'Decline Deficit Push-ups', defaultSets: 3, defaultReps: 12, video: `${VID}&t=265s` },
    { id: 'dips', name: 'Dips', defaultSets: 3, defaultReps: 10, video: `${VID}&t=308s` }
  ]},
  pull: { label: 'Pull Day', tag: 'AGILITY', stat: 'agi', exercises: [
    { id: 'pullups', name: 'Pull-ups', defaultSets: 3, defaultReps: 8, video: `${VID}&t=55s` },
    { id: 'inverted-rows', name: 'Inverted Rows', defaultSets: 3, defaultReps: 12, video: `${VID}&t=125s` }
  ]},
  legs: { label: 'Legs Day', tag: 'ENDURANCE', stat: 'end', exercises: [
    { id: 'pistol-squats', name: 'Pistol Squats', defaultSets: 3, defaultReps: 6, video: `${VID}&t=373s` },
    { id: 'hip-hinges', name: 'Hip Hinges', defaultSets: 3, defaultReps: 12, video: `${VID}&t=411s` },
    { id: 'dragonflies', name: 'Dragonflies', defaultSets: 3, defaultReps: 8, video: `${VID}&t=479s` }
  ]}
};
const SPLIT_ORDER = ['push', 'pull', 'legs'];
const XP_SET = 5, XP_EXERCISE = 15, XP_WORKOUT = 30;

const store = {
  get() {
    try { return JSON.parse(localStorage.getItem('anime-bod') || 'null') || this.fresh(); }
    catch { return this.fresh(); }
  },
  save(d) { localStorage.setItem('anime-bod', JSON.stringify(d)); },
  fresh() {
    return {
      version: 1,
      player: { name: 'Hero', xp: 0, level: 1, stats: { str: 0, agi: 0, end: 0 }, streak: { current: 0, best: 0, lastDate: null } },
      workouts: {},
      quests: {},
      settings: {}
    };
  },
  async sync() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      await fetch(`${SYNC_URL}?key=${USER_KEY}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: localStorage.getItem('anime-bod')
      });
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  },
  async pull() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      const res = await fetch(`${SYNC_URL}?key=${USER_KEY}`);
      if (res.ok) {
        const remote = await res.json();
        const local = this.get();
        const merged = mergeState(local, remote);
        this.save(merged);
      }
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  }
};

function mergeState(local, remote) {
  if (!remote || !remote.workouts) return local;
  if (!local || !local.workouts) return remote;

  const merged = JSON.parse(JSON.stringify(local));

  Object.keys(remote.workouts).forEach(day => {
    const rw = remote.workouts[day];
    const lw = merged.workouts[day];
    if (!lw) { merged.workouts[day] = rw; return; }
    if (rw.completedAt && !lw.completedAt) { merged.workouts[day] = rw; return; }
  });

  Object.keys(remote.quests || {}).forEach(day => {
    if (!merged.quests[day]) merged.quests[day] = remote.quests[day];
  });

  if (remote.player.xp > merged.player.xp) {
    merged.player.xp = remote.player.xp;
    merged.player.level = remote.player.level;
  }
  if ((remote.player.streak?.best || 0) > (merged.player.streak?.best || 0)) {
    merged.player.streak.best = remote.player.streak.best;
  }

  return merged;
}

function setSyncState(state) {
  syncState = state;
  const el = document.getElementById('sync-badge');
  if (!el) return;
  el.className = 'sync-badge ' + state;
  el.textContent = state === 'syncing' ? 'syncing...' : state === 'synced' ? 'synced' : state === 'error' ? 'offline' : 'local only';
}

function debouncedSync() {
  if (!USER_KEY) return;
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(() => store.sync(), 2000);
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function xpForLevel(n) { return 50 * n + 10 * n * n; }

function getCompletedCount(d) {
  return Object.values(d.workouts).filter(w => w.completedAt).length;
}

function getTodayType(d) {
  return SPLIT_ORDER[getCompletedCount(d) % 3];
}

function ensureTodayWorkout(d) {
  const key = todayStr();
  if (d.workouts[key] && d.workouts[key].completedAt) return d;
  const type = getTodayType(d);
  if (!d.workouts[key] || d.workouts[key].type !== type) {
    d.workouts[key] = {
      type,
      exercises: SPLITS[type].exercises.map(ex => ({
        id: ex.id, sets: Array.from({ length: ex.defaultSets }, () => ({ done: false }))
      })),
      completedAt: null,
      xpEarned: 0
    };
  }
  return d;
}

function ensureTodayQuests(d) {
  const key = todayStr();
  if (d.quests[key]) return d;
  const type = getTodayType(d);
  const split = SPLITS[type];
  const quests = [
    { id: 'complete-workout', label: `Complete ${split.label}`, done: false },
    { id: 'all-sets', label: 'Finish every set', done: false }
  ];
  if (type === 'push') quests.push({ id: 'pike-master', label: 'Complete all Pike Push-ups', done: false });
  if (type === 'pull') quests.push({ id: 'pull-master', label: 'Complete all Pull-ups', done: false });
  if (type === 'legs') quests.push({ id: 'pistol-master', label: 'Complete all Pistol Squats', done: false });
  d.quests[key] = quests;
  return d;
}

function updateQuests(d) {
  const key = todayStr();
  const w = d.workouts[key];
  const q = d.quests[key];
  if (!w || !q) return;
  const allSetsDone = w.exercises.every(ex => ex.sets.every(s => s.done));
  q.forEach(quest => {
    if (quest.id === 'complete-workout') quest.done = !!w.completedAt;
    if (quest.id === 'all-sets') quest.done = allSetsDone;
    if (quest.id === 'pike-master') quest.done = w.exercises.find(e => e.id === 'pike-pushups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pull-master') quest.done = w.exercises.find(e => e.id === 'pullups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pistol-master') quest.done = w.exercises.find(e => e.id === 'pistol-squats')?.sets.every(s => s.done) || false;
  });
}

function calcStreak(d) {
  let streak = 0;
  const t = new Date();
  if (d.workouts[todayStr()]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
  else { t.setDate(t.getDate() - 1); }
  for (let i = 0; i < 365; i++) {
    const key = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const dow = t.getDay();
    if (dow === 0) { t.setDate(t.getDate() - 1); continue; }
    if (d.workouts[key]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
    else break;
  }
  return streak;
}

function calcStats(d) {
  const stats = { str: 0, agi: 0, end: 0 };
  Object.values(d.workouts).forEach(w => {
    if (!w.completedAt) return;
    const split = SPLITS[w.type];
    if (!split) return;
    const vol = w.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => s.done).length, 0);
    stats[split.stat] += vol;
  });
  return stats;
}

function awardXP(d, amount) {
  const oldLevel = d.player.level;
  d.player.xp += amount;
  while (d.player.xp >= xpForLevel(d.player.level)) {
    d.player.level++;
  }
  return d.player.level > oldLevel;
}

let pendingXpPopup = 0;
function showXpPopup(amount) {
  pendingXpPopup += amount;
  const el = document.createElement('div');
  el.className = 'xp-popup';
  el.textContent = `+${pendingXpPopup} XP`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
  setTimeout(() => { pendingXpPopup = 0; }, 100);
}

function showLevelUp() {
  const flash = document.createElement('div');
  flash.className = 'levelup-overlay';
  document.body.appendChild(flash);
  const txt = document.createElement('div');
  txt.className = 'levelup-text';
  txt.textContent = 'LEVEL UP!';
  document.body.appendChild(txt);
  setTimeout(() => { flash.remove(); txt.remove(); }, 1500);
}

function render() {
  const d = store.get();
  ensureTodayWorkout(d);
  ensureTodayQuests(d);
  d.player.stats = calcStats(d);
  d.player.streak.current = calcStreak(d);
  if (d.player.streak.current > d.player.streak.best) d.player.streak.best = d.player.streak.current;
  store.save(d);

  const key = todayStr();
  const w = d.workouts[key];
  const type = w.type;
  const split = SPLITS[type];
  const streak = d.player.streak.current;
  const level = d.player.level;
  const prevLevelXp = level > 1 ? xpForLevel(level - 1) : 0;
  const xpCur = d.player.xp - prevLevelXp;
  const xpNeed = xpForLevel(level) - prevLevelXp;
  const xpPct = Math.min(100, (xpCur / xpNeed) * 100);
  const totalCompleted = getCompletedCount(d);
  const maxStat = Math.max(d.player.stats.str, d.player.stats.agi, d.player.stats.end, 1);

  const sfxMap = { push: '押', pull: '引', legs: '脚' };
  const sfxWord = sfxMap[type] || '力';

  let h = '';

  h += `<div class="page-mark-top">— ANIME BOD · 体力 · CH.${totalCompleted + 1} —</div>`;

  // HUD panel
  h += `<div class="panel hud-panel">`;
  h += `<div class="hud-avatar-cell"><div class="hud-avatar-num">${level}</div></div>`;
  h += `<div class="hud-info-cell">`;
  h += `<div class="hud-title">Player Status</div>`;
  h += `<div class="hud-name">Anime Bod</div>`;
  h += `<div class="hud-class">${split.tag} · ${split.label.toUpperCase()}</div>`;
  h += `</div>`;
  h += `<div class="hud-level-cell"><div class="hud-level-num">${level}</div><div class="hud-level-label">LVL</div></div>`;
  h += `</div>`;

  // Sync badge
  if (USER_KEY) {
    const badgeLabel = syncState === 'syncing' ? 'syncing...' : syncState === 'synced' ? 'synced' : syncState === 'error' ? 'offline' : 'local only';
    h += `<div style="text-align:right;margin:3px 0"><span id="sync-badge" class="sync-badge ${syncState || 'local'}">${badgeLabel}</span></div>`;
  }

  // XP Bar panel
  h += `<div class="gutter-sm"></div>`;
  h += `<div class="panel panel-thin xp-panel">`;
  h += `<div class="xp-track"><div class="xp-fill" style="width:${xpPct}%"></div></div>`;
  h += `<div class="xp-text">${xpCur} / ${xpNeed} XP</div>`;
  h += `</div>`;

  // Stats row
  h += `<div class="gutter-sm"></div>`;
  const statTips = { str: 'Levels up from Push days', agi: 'Levels up from Pull days', end: 'Levels up from Legs days' };
  h += `<div class="stats-row">`;
  ['str', 'agi', 'end'].forEach(s => {
    const val = d.player.stats[s];
    const pct = Math.min(100, (val / maxStat) * 100);
    h += `<div class="stat-cell ${s}" title="${statTips[s]}">`;
    h += `<div class="stat-label">${s.toUpperCase()}</div>`;
    h += `<div class="stat-num">${val}</div>`;
    h += `<div class="stat-bar"><div class="stat-bar-inner" style="width:${pct}%"></div></div>`;
    h += `</div>`;
  });
  h += `</div>`;

  // Slash divider
  h += `<div class="slash-divider"></div>`;

  if (w.completedAt) {
    // DONE STATE - big dramatic panel
    const nextType = SPLIT_ORDER[totalCompleted % 3];
    const nextSplit = SPLITS[nextType];
    h += `<div class="panel panel-bleed done-panel speed-lines-radial">`;
    h += `<div class="done-sfx">CLEAR!!</div>`;
    h += `<div class="done-subtitle">${split.label} — Complete</div>`;
    h += `<div class="done-xp">+${w.xpEarned} XP</div>`;
    h += `<div class="done-next">NEXT → ${nextSplit.label.toUpperCase()}</div>`;
    h += `</div>`;
  } else {
    // MISSION PANEL
    let totalSets = 0, doneSets = 0;
    w.exercises.forEach(ex => {
      ex.sets.forEach(s => { totalSets++; if (s.done) doneSets++; });
    });

    h += `<div class="panel panel-bleed mission-panel speed-lines-radial">`;
    h += `<div class="mission-tag-bar">`;
    h += `<span>Today's Mission</span>`;
    h += `<span class="progress-text"><span>${doneSets}</span> / ${totalSets} SETS</span>`;
    h += `</div>`;
    h += `<div class="mission-title">${split.label}</div>`;
    h += `<div style="position:absolute;right:12px;bottom:8px;font-family:Bangers,cursive;font-size:3.5rem;color:rgba(0,0,0,0.04);letter-spacing:4px;line-height:1;z-index:0">${sfxWord}</div>`;
    h += `</div>`;

    h += `<div class="gutter-sm"></div>`;

    // Exercise panels
    h += `<div class="exercise-grid">`;
    w.exercises.forEach((ex, ei) => {
      const cfg = split.exercises[ei];
      const allDone = ex.sets.every(s => s.done);
      h += `<div class="ex-panel ${allDone ? 'all-done' : ''}">`;

      if (allDone) {
        h += `<div class="ex-sfx">CLEAR!</div>`;
      }

      const vidIcon = `<svg viewBox="0 0 24 20" width="28" height="22" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="22" height="18" rx="2" stroke="currentColor" stroke-width="2"/><polygon points="9,5.5 9,14.5 17,10" fill="currentColor"/></svg>`;
      h += `<div class="ex-top">`;
      h += `<div class="ex-name">${cfg.name}</div>`;
      if (cfg.video) h += `<a href="${cfg.video}" target="_blank" class="ex-video">${vidIcon}</a>`;
      h += `</div>`;
      h += `<div class="ex-detail">${cfg.defaultSets} SETS × ${cfg.defaultReps} REPS</div>`;
      h += `<div class="ex-sets">`;
      ex.sets.forEach((s, si) => {
        h += `<button class="set-btn ${s.done ? 'done' : ''}" onclick="toggleSet(${ei},${si})">${si + 1}</button>`;
      });
      h += `</div></div>`;
    });
    h += `</div>`;

    // Complete button
    const canComplete = doneSets === totalSets && totalSets > 0;
    h += `<button class="complete-btn ${canComplete ? 'ready' : ''}" ${canComplete ? 'onclick="completeWorkout()"' : ''}>`;
    h += canComplete ? '— EXECUTE MISSION —' : `${doneSets} / ${totalSets} Sets`;
    h += `</button>`;
  }

  // Quest log
  h += `<div class="gutter"></div>`;
  updateQuests(d);
  store.save(d);
  const quests = d.quests[key] || [];
  h += `<div class="panel quest-panel">`;
  h += `<div class="quest-header">Quest Log</div>`;
  quests.forEach(q => {
    h += `<div class="quest-item">`;
    h += `<div class="quest-check ${q.done ? 'done' : ''}"></div>`;
    h += `<span class="quest-label ${q.done ? 'done' : ''}">${q.label}</span>`;
    h += `</div>`;
  });
  h += `</div>`;

  // Streak + week
  h += `<div class="gutter"></div>`;
  h += `<div class="bottom-grid">`;
  h += `<div class="streak-cell"><div class="streak-num">${streak}</div><div class="streak-label">Streak</div></div>`;
  h += `<div class="week-row">`;
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
  const dayLabels = ['M','T','W','T','F','S','S'];
  for (let i = 0; i < 7; i++) {
    const dt = new Date(mon);
    dt.setDate(dt.getDate() + i);
    const dk = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const isToday = dk === todayStr();
    const wk = d.workouts[dk];
    const done = wk?.completedAt;
    h += `<div class="week-day ${done ? 'done' : ''} ${isToday ? 'today' : ''}">${dayLabels[i]}</div>`;
  }
  h += `</div></div>`;

  // Page footer mark
  h += `<div class="page-mark-top" style="margin-top:16px">— ${totalCompleted} WORKOUTS LOGGED —</div>`;

  document.getElementById('app').innerHTML = h;
}

function toggleSet(ei, si) {
  const d = store.get();
  ensureTodayWorkout(d);
  const w = d.workouts[todayStr()];
  if (w.completedAt) return;

  const set = w.exercises[ei].sets[si];
  const wasDone = set.done;
  set.done = !set.done;

  if (!wasDone) {
    awardXP(d, XP_SET);
    showXpPopup(XP_SET);
    const allExSets = w.exercises[ei].sets.every(s => s.done);
    if (allExSets) {
      awardXP(d, XP_EXERCISE);
      showXpPopup(XP_EXERCISE);
    }
  } else {
    const wasAllDone = w.exercises[ei].sets.filter((s, idx) => idx !== si).every(s => s.done);
    if (wasAllDone) d.player.xp = Math.max(0, d.player.xp - XP_EXERCISE);
    d.player.xp = Math.max(0, d.player.xp - XP_SET);
    while (d.player.level > 1 && d.player.xp < xpForLevel(d.player.level - 1)) d.player.level--;
  }

  store.save(d);
  render();
  debouncedSync();
}

function completeWorkout() {
  const d = store.get();
  const key = todayStr();
  const w = d.workouts[key];
  if (w.completedAt) return;
  if (!w.exercises.every(ex => ex.sets.every(s => s.done))) return;

  let earned = XP_WORKOUT;
  const streak = calcStreak(d) + 1;
  earned += streak * 2;
  w.xpEarned = (w.xpEarned || 0) + earned;
  w.completedAt = new Date().toISOString();

  const leveled = awardXP(d, earned);
  showXpPopup(earned);

  d.player.streak.current = streak;
  if (streak > d.player.streak.best) d.player.streak.best = streak;
  d.player.streak.lastDate = key;

  store.save(d);
  render();

  if (leveled) {
    setTimeout(showLevelUp, 200);
  }

  store.sync();
}

render();
store.pull().then(() => render());
</script>
</body>
</html>
