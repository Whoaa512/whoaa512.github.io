<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SCOUTER // POWER LEVEL TRACKER</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1a0a">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes xp-float {
    0% { opacity: 1; transform: translate(-50%, 0) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -10px) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(1); }
  }
  @keyframes levelup-flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes levelup-text {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    60% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes stat-fill {
    from { width: 0; }
  }
  @keyframes diamond-pop {
    0% { transform: scale(0.8); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes quest-complete {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  @keyframes border-flow {
    0% { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; }
  }
  @keyframes reticle-rotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }
  @keyframes power-scan {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  :root {
    --bg: #0a1a0a;
    --panel: rgba(0, 30, 0, 0.6);
    --panel-edge: #0f3f0f;
    --green: #00ff41;
    --green-dim: #00aa2a;
    --green-dark: #004d15;
    --red: #ff4444;
    --text: #00ff41;
    --dim: #2a6b2a;
    --str: #00ff41;
    --agi: #00ff41;
    --end: #00ff41;
    --success: #00ff41;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    background: var(--bg);
    background-image: radial-gradient(ellipse at 60% 40%, rgba(0, 40, 0, 0.4) 0%, transparent 60%);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 255, 65, 0.02) 2px,
      rgba(0, 255, 65, 0.02) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  body::after { display: none; }

  /* Reticle */
  .reticle {
    position: fixed;
    top: 35%;
    left: 55%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 300px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.06;
  }
  .reticle::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 1px solid var(--green);
    border-radius: 50%;
  }
  .reticle::after {
    content: '';
    position: absolute;
    inset: 40px;
    border: 1px solid var(--green);
    border-radius: 50%;
  }
  .reticle-inner {
    position: absolute;
    inset: 80px;
    border: 1px solid var(--green);
    border-radius: 50%;
  }
  .reticle-cross-h, .reticle-cross-v {
    position: absolute;
    background: var(--green);
  }
  .reticle-cross-h {
    top: 50%;
    left: 10%;
    right: 10%;
    height: 1px;
  }
  .reticle-cross-v {
    left: 50%;
    top: 10%;
    bottom: 10%;
    width: 1px;
  }

  .app {
    max-width: 420px;
    margin: 0 auto;
    padding: 0 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* === CORNER HUD BRACKETS === */
  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: fixed;
    width: 40px;
    height: 40px;
    border-color: var(--green);
    border-style: solid;
    opacity: 0.2;
    pointer-events: none;
    z-index: 2;
  }
  .corner-tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

  /* === POWER LEVEL HUD === */
  .hud {
    padding: 20px 0 8px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .hud-info { flex: 1; min-width: 0; }

  .hud-title {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--dim);
  }

  .hud-name {
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    opacity: 0.8;
  }

  .hud-class {
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .power-level {
    text-align: right;
    flex-shrink: 0;
  }

  .power-level-label {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--dim);
    text-align: right;
  }

  .power-level-num {
    font-size: 2.8rem;
    font-weight: 400;
    line-height: 1;
    color: var(--green);
    text-shadow: 0 0 20px rgba(0, 255, 65, 0.5), 0 0 40px rgba(0, 255, 65, 0.2);
    animation: flicker 3s ease infinite;
    letter-spacing: 2px;
  }

  /* === XP BAR === */
  .xp-wrap {
    position: relative;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .xp-track {
    flex: 1;
    height: 2px;
    background: var(--green-dark);
    overflow: hidden;
    position: relative;
  }

  .xp-fill {
    height: 100%;
    background: var(--green);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    box-shadow: 0 0 6px rgba(0, 255, 65, 0.6);
  }

  .xp-text {
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 1px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* === STAT READOUTS === */
  .stats-panel {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .stat-block {
    flex: 1;
    padding: 8px 0;
    border-left: 1px solid var(--green-dark);
    padding-left: 10px;
  }

  .stat-name {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--dim);
    margin-bottom: 2px;
  }

  .stat-value {
    font-size: 1.6rem;
    line-height: 1;
    margin-bottom: 4px;
    color: var(--green);
    animation: flicker 2.5s ease infinite;
  }

  .stat-block:nth-child(2) .stat-value { animation-delay: 0.8s; }
  .stat-block:nth-child(3) .stat-value { animation-delay: 1.6s; }

  .stat-bar-track {
    height: 1px;
    background: var(--green-dark);
    overflow: hidden;
  }

  .stat-bar-fill {
    height: 100%;
    background: var(--green);
    animation: stat-fill 1s ease-out;
    box-shadow: 0 0 4px var(--green);
  }

  /* === MISSION BRIEFING === */
  .mission {
    border: 1px solid var(--green-dark);
    margin-bottom: 16px;
    position: relative;
    background: var(--panel);
  }

  .mission::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--green);
    opacity: 0.5;
  }

  .mission-header {
    padding: 10px 12px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .mission-tag {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mission-tag::before {
    content: '▸';
    color: var(--green);
    animation: glow-pulse 2s ease infinite;
  }

  .mission-type {
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    padding: 6px 12px 10px;
    color: var(--green);
  }

  .mission-progress {
    padding: 0 12px 10px;
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 1px;
  }

  .mission-progress span {
    color: var(--green);
  }

  /* === SKILL CARDS (exercise data readouts) === */
  .skill-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }

  .skill-card {
    border: 1px solid var(--green-dark);
    background: var(--panel);
    padding: 12px;
    position: relative;
    animation: slide-in 0.3s ease backwards;
  }

  .skill-card:nth-child(1) { animation-delay: 0.05s; }
  .skill-card:nth-child(2) { animation-delay: 0.1s; }
  .skill-card:nth-child(3) { animation-delay: 0.15s; }

  .skill-card.all-done {
    border-color: var(--green);
    box-shadow: 0 0 8px rgba(0, 255, 65, 0.1);
  }

  .skill-card.all-done::after {
    content: '◆ CLEAR';
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 0.45rem;
    letter-spacing: 2px;
    color: var(--green);
  }

  .skill-name {
    font-size: 0.85rem;
    letter-spacing: 1px;
    margin-bottom: 2px;
    color: var(--green);
  }

  .skill-video {
    color: var(--green);
    text-decoration: none;
    margin-left: 8px;
    transition: all 0.2s;
    display: inline-block;
    vertical-align: middle;
    opacity: 0.4;
  }
  .skill-video:active { opacity: 0.8; }

  .skill-detail {
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .skill-sets {
    display: flex;
    gap: 8px;
  }

  /* === SET BUTTONS — green squares === */
  .set-btn {
    width: 36px;
    height: 36px;
    border: 1px solid var(--green-dark);
    background: transparent;
    color: var(--dim);
    font-size: 0.75rem;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
  }

  .set-btn span {
    display: block;
  }

  .set-btn:active {
    transform: scale(0.9);
  }

  .set-btn.done {
    background: var(--green);
    border-color: var(--green);
    color: var(--bg);
    box-shadow: 0 0 8px rgba(0, 255, 65, 0.3);
    animation: diamond-pop 0.3s ease;
  }

  .set-btn.done::before { display: none; }

  /* === COMPLETE BUTTON === */
  .complete-btn {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--green-dark);
    background: transparent;
    color: var(--dim);
    font-size: 0.75rem;
    font-family: 'Share Tech Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 4px;
    cursor: default;
    transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .complete-btn.ready {
    border-color: var(--red);
    color: var(--red);
    cursor: pointer;
    background: rgba(255, 68, 68, 0.05);
    box-shadow: 0 0 15px rgba(255, 68, 68, 0.15);
    text-shadow: 0 0 8px rgba(255, 68, 68, 0.5);
  }

  .complete-btn.ready::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255, 68, 68, 0.03), transparent);
    animation: quest-complete 2s linear infinite;
    background-size: 200% 100%;
  }

  .complete-btn.ready:active {
    transform: scale(0.98);
    box-shadow: 0 0 25px rgba(255, 68, 68, 0.3);
  }

  /* === QUEST LOG — mission data feed === */
  .quest-log {
    border: 1px solid var(--green-dark);
    background: var(--panel);
    margin-bottom: 16px;
    position: relative;
  }

  .quest-log::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--green);
    opacity: 0.3;
  }

  .quest-header {
    padding: 10px 12px 6px;
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .quest-header::before {
    content: '▸';
    color: var(--green);
    font-size: 0.6rem;
  }

  .quest-item {
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.7rem;
    border-top: 1px solid rgba(0, 255, 65, 0.05);
    position: relative;
  }

  .quest-item:last-child {
    padding-bottom: 10px;
  }

  .quest-diamond {
    width: 8px;
    height: 8px;
    border: 1px solid var(--green-dark);
    flex-shrink: 0;
    transition: all 0.3s;
  }

  .quest-diamond.done {
    background: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 6px rgba(0, 255, 65, 0.4);
  }

  .quest-label { color: var(--dim); }
  .quest-label.done {
    color: var(--green);
    opacity: 0.6;
  }

  /* === STREAK & TIMELINE === */
  .timeline-section {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .streak-display {
    border: 1px solid var(--green-dark);
    background: var(--panel);
    padding: 10px;
    text-align: center;
    flex-shrink: 0;
    width: 72px;
  }

  .streak-num {
    font-size: 1.8rem;
    line-height: 1;
    color: var(--green);
    text-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
  }

  .streak-label {
    font-size: 0.45rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dim);
    margin-top: 2px;
  }

  /* Week: 7 small diamonds in a row */
  .week-track {
    flex: 1;
    border: 1px solid var(--green-dark);
    background: var(--panel);
    padding: 8px;
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
  }

  .week-cell {
    width: 28px;
    height: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    color: var(--dim);
    transform: rotate(45deg);
    border: 1px solid var(--green-dark);
    background: transparent;
    transition: all 0.3s;
  }

  .week-cell span {
    transform: rotate(-45deg);
  }

  .week-cell.done {
    background: var(--green);
    border-color: var(--green);
    color: var(--bg);
    box-shadow: 0 0 6px rgba(0, 255, 65, 0.2);
  }

  .week-cell.today {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 6px rgba(0, 255, 65, 0.15);
  }

  .week-cell.done.today {
    background: var(--green);
    color: var(--bg);
  }

  /* === DONE BANNER === */
  .done-banner {
    border: 1px solid var(--green);
    background: var(--panel);
    padding: 28px 16px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .done-banner::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--green);
  }

  .done-status {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 5px;
    color: var(--green);
    margin-bottom: 6px;
    opacity: 0.6;
  }

  .done-title {
    font-size: 1.6rem;
    text-transform: uppercase;
    letter-spacing: 6px;
    color: var(--green);
    text-shadow: 0 0 20px rgba(0, 255, 65, 0.6), 0 0 40px rgba(0, 255, 65, 0.3);
    margin-bottom: 4px;
    animation: power-scan 2s ease infinite;
  }

  .done-xp {
    font-size: 0.75rem;
    color: var(--green);
    opacity: 0.7;
  }

  .done-next {
    font-size: 0.6rem;
    color: var(--dim);
    margin-top: 10px;
    letter-spacing: 2px;
  }

  /* === XP POPUP === */
  .xp-popup {
    position: fixed;
    top: 40%;
    left: 50%;
    font-size: 2.2rem;
    color: var(--green);
    text-shadow: 0 0 20px rgba(0, 255, 65, 0.8), 0 0 40px rgba(0, 255, 65, 0.4);
    pointer-events: none;
    animation: xp-float 1.2s ease forwards;
    z-index: 100;
    letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* === LEVEL UP OVERLAY === */
  .levelup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 255, 65, 0.1);
    z-index: 200;
    animation: levelup-flash 1.5s ease forwards;
    pointer-events: none;
  }

  .levelup-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2.5rem;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--green);
    text-shadow: 0 0 30px rgba(0, 255, 65, 0.8), 0 0 60px rgba(0, 255, 65, 0.4);
    z-index: 201;
    animation: levelup-text 1.5s ease forwards;
    pointer-events: none;
    font-family: 'Share Tech Mono', monospace;
  }

  /* === SYNC BADGE === */
  .sync-badge {
    font-size: 0.45rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 2px 6px;
    border: 1px solid var(--green-dark);
    background: transparent;
    color: var(--dim);
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
  }
  .sync-badge.synced { border-color: var(--green); color: var(--green); opacity: 0.6; }
  .sync-badge.syncing { border-color: var(--green); color: var(--green); animation: glow-pulse 1s ease infinite; }
  .sync-badge.error { border-color: var(--red); color: var(--red); }
  .sync-badge.local { color: var(--dim); }
</style>
</head>
<body>
<div class="corner-tl"></div>
<div class="corner-tr"></div>
<div class="corner-bl"></div>
<div class="corner-br"></div>
<div class="reticle">
  <div class="reticle-inner"></div>
  <div class="reticle-cross-h"></div>
  <div class="reticle-cross-v"></div>
</div>
<div class="app" id="app"></div>
<script>
const SYNC_URL = 'https://anime-bod-sync.winslowcj5.workers.dev/api/sync';
const params = new URLSearchParams(window.location.search);
const USER_KEY = params.get('key');
let syncState = USER_KEY ? 'local' : null;
let syncDebounceTimer = null;

const VID = 'https://www.youtube.com/watch?v=3Zgrh5009_k';
const SPLITS = {
  push: { label: 'Push Day', tag: 'STRENGTH', stat: 'str', exercises: [
    { id: 'pike-pushups', name: 'Pike Push-ups', defaultSets: 3, defaultReps: 10, video: `${VID}&t=188s` },
    { id: 'decline-deficit-pushups', name: 'Decline Deficit Push-ups', defaultSets: 3, defaultReps: 12, video: `${VID}&t=265s` },
    { id: 'dips', name: 'Dips', defaultSets: 3, defaultReps: 10, video: `${VID}&t=308s` }
  ]},
  pull: { label: 'Pull Day', tag: 'AGILITY', stat: 'agi', exercises: [
    { id: 'pullups', name: 'Pull-ups', defaultSets: 3, defaultReps: 8, video: `${VID}&t=55s` },
    { id: 'inverted-rows', name: 'Inverted Rows', defaultSets: 3, defaultReps: 12, video: `${VID}&t=125s` }
  ]},
  legs: { label: 'Legs Day', tag: 'ENDURANCE', stat: 'end', exercises: [
    { id: 'pistol-squats', name: 'Pistol Squats', defaultSets: 3, defaultReps: 6, video: `${VID}&t=373s` },
    { id: 'hip-hinges', name: 'Hip Hinges', defaultSets: 3, defaultReps: 12, video: `${VID}&t=411s` },
    { id: 'dragonflies', name: 'Dragonflies', defaultSets: 3, defaultReps: 8, video: `${VID}&t=479s` }
  ]}
};
const SPLIT_ORDER = ['push', 'pull', 'legs'];
const XP_SET = 5, XP_EXERCISE = 15, XP_WORKOUT = 30;

const store = {
  get() {
    try { return JSON.parse(localStorage.getItem('anime-bod') || 'null') || this.fresh(); }
    catch { return this.fresh(); }
  },
  save(d) { localStorage.setItem('anime-bod', JSON.stringify(d)); },
  fresh() {
    return {
      version: 1,
      player: { name: 'Hero', xp: 0, level: 1, stats: { str: 0, agi: 0, end: 0 }, streak: { current: 0, best: 0, lastDate: null } },
      workouts: {},
      quests: {},
      settings: {}
    };
  },
  async sync() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      await fetch(`${SYNC_URL}?key=${USER_KEY}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: localStorage.getItem('anime-bod')
      });
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  },
  async pull() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      const res = await fetch(`${SYNC_URL}?key=${USER_KEY}`);
      if (res.ok) {
        const remote = await res.json();
        const local = this.get();
        const merged = mergeState(local, remote);
        this.save(merged);
      }
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  }
};

function mergeState(local, remote) {
  if (!remote || !remote.workouts) return local;
  if (!local || !local.workouts) return remote;

  const merged = JSON.parse(JSON.stringify(local));

  Object.keys(remote.workouts).forEach(day => {
    const rw = remote.workouts[day];
    const lw = merged.workouts[day];
    if (!lw) { merged.workouts[day] = rw; return; }
    if (rw.completedAt && !lw.completedAt) { merged.workouts[day] = rw; return; }
  });

  Object.keys(remote.quests || {}).forEach(day => {
    if (!merged.quests[day]) merged.quests[day] = remote.quests[day];
  });

  if (remote.player.xp > merged.player.xp) {
    merged.player.xp = remote.player.xp;
    merged.player.level = remote.player.level;
  }
  if ((remote.player.streak?.best || 0) > (merged.player.streak?.best || 0)) {
    merged.player.streak.best = remote.player.streak.best;
  }

  return merged;
}

function setSyncState(state) {
  syncState = state;
  const el = document.getElementById('sync-badge');
  if (!el) return;
  el.className = 'sync-badge ' + state;
  el.textContent = state === 'syncing' ? 'syncing...' : state === 'synced' ? 'synced' : state === 'error' ? 'offline' : 'local only';
}

function debouncedSync() {
  if (!USER_KEY) return;
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(() => store.sync(), 2000);
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function xpForLevel(n) { return 50 * n + 10 * n * n; }

function getCompletedCount(d) {
  return Object.values(d.workouts).filter(w => w.completedAt).length;
}

function getTodayType(d) {
  return SPLIT_ORDER[getCompletedCount(d) % 3];
}

function ensureTodayWorkout(d) {
  const key = todayStr();
  if (d.workouts[key] && d.workouts[key].completedAt) return d;
  const type = getTodayType(d);
  if (!d.workouts[key] || d.workouts[key].type !== type) {
    d.workouts[key] = {
      type,
      exercises: SPLITS[type].exercises.map(ex => ({
        id: ex.id, sets: Array.from({ length: ex.defaultSets }, () => ({ done: false }))
      })),
      completedAt: null,
      xpEarned: 0
    };
  }
  return d;
}

function ensureTodayQuests(d) {
  const key = todayStr();
  if (d.quests[key]) return d;
  const type = getTodayType(d);
  const split = SPLITS[type];
  const quests = [
    { id: 'complete-workout', label: `Complete ${split.label}`, done: false },
    { id: 'all-sets', label: 'Finish every set', done: false }
  ];
  if (type === 'push') quests.push({ id: 'pike-master', label: 'Complete all Pike Push-ups', done: false });
  if (type === 'pull') quests.push({ id: 'pull-master', label: 'Complete all Pull-ups', done: false });
  if (type === 'legs') quests.push({ id: 'pistol-master', label: 'Complete all Pistol Squats', done: false });
  d.quests[key] = quests;
  return d;
}

function updateQuests(d) {
  const key = todayStr();
  const w = d.workouts[key];
  const q = d.quests[key];
  if (!w || !q) return;
  const allSetsDone = w.exercises.every(ex => ex.sets.every(s => s.done));
  q.forEach(quest => {
    if (quest.id === 'complete-workout') quest.done = !!w.completedAt;
    if (quest.id === 'all-sets') quest.done = allSetsDone;
    if (quest.id === 'pike-master') quest.done = w.exercises.find(e => e.id === 'pike-pushups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pull-master') quest.done = w.exercises.find(e => e.id === 'pullups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pistol-master') quest.done = w.exercises.find(e => e.id === 'pistol-squats')?.sets.every(s => s.done) || false;
  });
}

function calcStreak(d) {
  let streak = 0;
  const t = new Date();
  if (d.workouts[todayStr()]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
  else { t.setDate(t.getDate() - 1); }
  for (let i = 0; i < 365; i++) {
    const key = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const dow = t.getDay();
    if (dow === 0) { t.setDate(t.getDate() - 1); continue; }
    if (d.workouts[key]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
    else break;
  }
  return streak;
}

function calcStats(d) {
  const stats = { str: 0, agi: 0, end: 0 };
  Object.values(d.workouts).forEach(w => {
    if (!w.completedAt) return;
    const split = SPLITS[w.type];
    if (!split) return;
    const vol = w.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => s.done).length, 0);
    stats[split.stat] += vol;
  });
  return stats;
}

function awardXP(d, amount) {
  const oldLevel = d.player.level;
  d.player.xp += amount;
  while (d.player.xp >= xpForLevel(d.player.level)) {
    d.player.level++;
  }
  return d.player.level > oldLevel;
}

let pendingXpPopup = 0;
function showXpPopup(amount) {
  pendingXpPopup += amount;
  const el = document.createElement('div');
  el.className = 'xp-popup';
  el.textContent = `+${pendingXpPopup} XP`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
  setTimeout(() => { pendingXpPopup = 0; }, 100);
}

function showLevelUp() {
  const flash = document.createElement('div');
  flash.className = 'levelup-overlay';
  document.body.appendChild(flash);
  const txt = document.createElement('div');
  txt.className = 'levelup-text';
  txt.textContent = 'LEVEL UP';
  document.body.appendChild(txt);
  setTimeout(() => { flash.remove(); txt.remove(); }, 1500);
}

function render() {
  const d = store.get();
  ensureTodayWorkout(d);
  ensureTodayQuests(d);
  d.player.stats = calcStats(d);
  d.player.streak.current = calcStreak(d);
  if (d.player.streak.current > d.player.streak.best) d.player.streak.best = d.player.streak.current;
  store.save(d);

  const key = todayStr();
  const w = d.workouts[key];
  const type = w.type;
  const split = SPLITS[type];
  const streak = d.player.streak.current;
  const level = d.player.level;
  const prevLevelXp = level > 1 ? xpForLevel(level - 1) : 0;
  const xpCur = d.player.xp - prevLevelXp;
  const xpNeed = xpForLevel(level) - prevLevelXp;
  const xpPct = Math.min(100, (xpCur / xpNeed) * 100);
  const totalCompleted = getCompletedCount(d);
  const maxStat = Math.max(d.player.stats.str, d.player.stats.agi, d.player.stats.end, 1);

  const powerLevel = d.player.xp > 0 ? d.player.xp.toLocaleString() : '0';

  let h = '';

  // HUD — scouter readout
  h += `<div class="hud">`;
  h += `<div class="hud-info">`;
  h += `<div class="hud-title">▸ Target Scan</div>`;
  h += `<div class="hud-name">LVL ${level} // ${split.tag}</div>`;
  h += `<div class="hud-class">${split.label.toUpperCase()} PROTOCOL</div>`;
  h += `</div>`;
  h += `<div class="power-level">`;
  h += `<div class="power-level-label">Power Level</div>`;
  h += `<div class="power-level-num">${powerLevel}</div>`;
  h += `</div>`;
  h += `</div>`;
  if (USER_KEY) {
    const badgeLabel = syncState === 'syncing' ? 'syncing...' : syncState === 'synced' ? 'synced' : syncState === 'error' ? 'offline' : 'local only';
    h += `<div style="text-align:right;margin-bottom:4px"><span id="sync-badge" class="sync-badge ${syncState || 'local'}">${badgeLabel}</span></div>`;
  }

  // XP Bar — thin line with readout
  h += `<div class="xp-wrap">`;
  h += `<div class="xp-track"><div class="xp-fill" style="width:${xpPct}%"></div></div>`;
  h += `<div class="xp-text">${xpCur}/${xpNeed}</div>`;
  h += `</div>`;

  // Stats — scouter readings
  h += `<div class="stats-panel">`;
  const statTips = { str: 'Levels up from Push days (Pike Push-ups, Dips, Decline Push-ups)', agi: 'Levels up from Pull days (Pull-ups, Inverted Rows)', end: 'Levels up from Legs days (Pistol Squats, Hip Hinges, Dragonflies)' };
  ['str', 'agi', 'end'].forEach(s => {
    const label = s.toUpperCase();
    const val = d.player.stats[s];
    const pct = Math.min(100, (val / maxStat) * 100);
    h += `<div class="stat-block ${s}" title="${statTips[s]}">`;
    h += `<div class="stat-name">${label}</div>`;
    h += `<div class="stat-value">${val}</div>`;
    h += `<div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%"></div></div>`;
    h += `</div>`;
  });
  h += `</div>`;

  if (w.completedAt) {
    // Done state — POWER LEVEL MAXIMUM
    const nextType = SPLIT_ORDER[totalCompleted % 3];
    const nextSplit = SPLITS[nextType];
    h += `<div class="done-banner">`;
    h += `<div class="done-status">▸ Scan Complete</div>`;
    h += `<div class="done-title">POWER LEVEL MAXIMUM</div>`;
    h += `<div class="done-xp">+${w.xpEarned} XP ACQUIRED</div>`;
    h += `<div class="done-next">NEXT // ${nextSplit.label.toUpperCase()}</div>`;
    h += `</div>`;
  } else {
    // Mission header
    let totalSets = 0, doneSets = 0;
    w.exercises.forEach(ex => {
      ex.sets.forEach(s => { totalSets++; if (s.done) doneSets++; });
    });

    h += `<div class="mission">`;
    h += `<div class="mission-header"><span class="mission-tag">Active Mission</span></div>`;
    h += `<div class="mission-type">${split.label}</div>`;
    h += `<div class="mission-progress"><span>${doneSets}</span> / ${totalSets} sets cleared</div>`;
    h += `</div>`;

    // Skill cards — data readouts
    h += `<div class="skill-list">`;
    w.exercises.forEach((ex, ei) => {
      const cfg = split.exercises[ei];
      const allDone = ex.sets.every(s => s.done);
      h += `<div class="skill-card ${allDone ? 'all-done' : ''}">`;
      const vidIcon = `<svg viewBox="0 0 24 20" width="32" height="26" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="22" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><polygon points="9,5.5 9,14.5 17,10" fill="currentColor"/></svg>`;
      h += `<div class="skill-name">${cfg.name} ${cfg.video ? `<a href="${cfg.video}" target="_blank" class="skill-video">${vidIcon}</a>` : ''}</div>`;
      h += `<div class="skill-detail">${cfg.defaultSets} SETS / ${cfg.defaultReps} REPS</div>`;
      h += `<div class="skill-sets">`;
      ex.sets.forEach((s, si) => {
        h += `<button class="set-btn ${s.done ? 'done' : ''}" onclick="toggleSet(${ei},${si})"><span>${si + 1}</span></button>`;
      });
      h += `</div></div>`;
    });
    h += `</div>`;

    // Complete button — red when ready (scouter overload)
    const canComplete = doneSets === totalSets && totalSets > 0;
    h += `<button class="complete-btn ${canComplete ? 'ready' : ''}" ${canComplete ? 'onclick="completeWorkout()"' : ''}>`;
    h += canComplete ? '◆ Execute Mission ◆' : `${doneSets} / ${totalSets} Sets`;
    h += `</button>`;
  }

  // Quest log — mission data feed
  updateQuests(d);
  store.save(d);
  const quests = d.quests[key] || [];
  h += `<div class="quest-log">`;
  h += `<div class="quest-header">Data Feed</div>`;
  quests.forEach(q => {
    h += `<div class="quest-item">`;
    h += `<div class="quest-diamond ${q.done ? 'done' : ''}"></div>`;
    h += `<span class="quest-label ${q.done ? 'done' : ''}">${q.label}</span>`;
    h += `</div>`;
  });
  h += `</div>`;

  // Timeline — week diamonds
  h += `<div class="timeline-section">`;
  h += `<div class="streak-display"><div class="streak-num">${streak}</div><div class="streak-label">Streak</div></div>`;
  h += `<div class="week-track">`;
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
  const dayLabels = ['M','T','W','T','F','S','S'];
  for (let i = 0; i < 7; i++) {
    const dt = new Date(mon);
    dt.setDate(dt.getDate() + i);
    const dk = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const isToday = dk === todayStr();
    const wk = d.workouts[dk];
    const done = wk?.completedAt;
    h += `<div class="week-cell ${done ? 'done' : ''} ${isToday ? 'today' : ''}"><span>${dayLabels[i]}</span></div>`;
  }
  h += `</div></div>`;

  document.getElementById('app').innerHTML = h;
}

function toggleSet(ei, si) {
  const d = store.get();
  ensureTodayWorkout(d);
  const w = d.workouts[todayStr()];
  if (w.completedAt) return;

  const set = w.exercises[ei].sets[si];
  const wasDone = set.done;
  set.done = !set.done;

  if (!wasDone) {
    awardXP(d, XP_SET);
    showXpPopup(XP_SET);
    const allExSets = w.exercises[ei].sets.every(s => s.done);
    if (allExSets) {
      awardXP(d, XP_EXERCISE);
      showXpPopup(XP_EXERCISE);
    }
  } else {
    const wasAllDone = w.exercises[ei].sets.filter((s, idx) => idx !== si).every(s => s.done);
    if (wasAllDone) d.player.xp = Math.max(0, d.player.xp - XP_EXERCISE);
    d.player.xp = Math.max(0, d.player.xp - XP_SET);
    while (d.player.level > 1 && d.player.xp < xpForLevel(d.player.level - 1)) d.player.level--;
  }

  store.save(d);
  render();
  debouncedSync();
}

function completeWorkout() {
  const d = store.get();
  const key = todayStr();
  const w = d.workouts[key];
  if (w.completedAt) return;
  if (!w.exercises.every(ex => ex.sets.every(s => s.done))) return;

  let earned = XP_WORKOUT;
  const streak = calcStreak(d) + 1;
  earned += streak * 2;
  w.xpEarned = (w.xpEarned || 0) + earned;
  w.completedAt = new Date().toISOString();

  const leveled = awardXP(d, earned);
  showXpPopup(earned);

  d.player.streak.current = streak;
  if (streak > d.player.streak.best) d.player.streak.best = streak;
  d.player.streak.lastDate = key;

  store.save(d);
  render();

  if (leveled) {
    setTimeout(showLevelUp, 200);
  }

  store.sync();
}

render();
store.pull().then(() => render());
</script>
</body>
</html>
