<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>墨 ANIME BOD — 鍛錬</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f5f0e8">
<style>
  @keyframes ink-spread {
    from { opacity: 0; transform: scaleX(0.3); }
    to { opacity: 1; transform: scaleX(1); }
  }
  @keyframes xp-float {
    0% { opacity: 1; transform: translate(-50%, 0) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -10px) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(1); }
  }
  @keyframes levelup-flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes levelup-text {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    60% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes brush-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes stamp-press {
    0% { transform: scale(0.6) rotate(-3deg); opacity: 0; }
    60% { transform: scale(1.08) rotate(1deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes pulse-soft {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  :root {
    --rice: #f5f0e8;
    --rice-dark: #e8e0d0;
    --ink: #1a1a18;
    --ink-light: #3a3a35;
    --ink-wash: rgba(26,26,24,0.06);
    --ink-wash-med: rgba(26,26,24,0.12);
    --vermillion: #c83228;
    --vermillion-dim: #a0281f;
    --gold: #b8860b;
    --gold-bright: #d4a017;
    --moss: #4a6741;
    --moss-dim: #3a5331;
    --indigo: #34495e;
    --text: #2a2a28;
    --text-dim: #8a8578;
    --str-color: #c83228;
    --agi-color: #34495e;
    --end-color: #4a6741;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', 'Palatino Linotype', 'Times New Roman', serif;
    background: var(--rice);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .app {
    max-width: 440px;
    margin: 0 auto;
    padding: 0 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* === HANKO STAMP DECORATION === */
  .stamp-tl {
    position: fixed;
    top: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border: 2px solid var(--vermillion);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    color: var(--vermillion);
    opacity: 0.35;
    pointer-events: none;
    z-index: 2;
    font-family: serif;
    line-height: 1;
  }

  /* === CHARACTER HUD === */
  .hud {
    padding: 20px 0 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 14px;
    position: relative;
  }

  .hud::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 10%;
    right: 30%;
    height: 1px;
    background: var(--ink-wash-med);
  }

  .hud-avatar {
    width: 50px;
    height: 50px;
    border: 3px solid var(--ink);
    border-radius: 4px;
    background: var(--rice-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 700;
    flex-shrink: 0;
    position: relative;
    color: var(--ink);
    box-shadow: 2px 2px 0 rgba(26,26,24,0.15);
  }

  .hud-info { flex: 1; min-width: 0; }

  .hud-title {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--text-dim);
    font-style: italic;
  }

  .hud-name {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--ink);
  }

  .hud-class {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    font-style: italic;
  }

  .hud-level {
    text-align: center;
    flex-shrink: 0;
    padding: 4px 8px;
    position: relative;
  }

  .hud-level::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 1.5px solid var(--gold);
    border-radius: 2px;
    opacity: 0.6;
  }

  .hud-level-num {
    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1;
    color: var(--gold);
  }

  .hud-level-label {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--gold);
    opacity: 0.8;
  }

  /* === XP BAR === */
  .xp-wrap {
    position: relative;
    margin-bottom: 18px;
  }

  .xp-track {
    height: 6px;
    background: var(--rice-dark);
    border: 1px solid var(--ink-wash-med);
    border-radius: 1px;
    overflow: hidden;
    position: relative;
  }

  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-bright));
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    border-radius: 1px;
  }

  .xp-text {
    font-size: 0.6rem;
    color: var(--gold);
    text-align: right;
    margin-top: 3px;
    letter-spacing: 1px;
    font-style: italic;
  }

  /* === STATS PANEL === */
  .stats-panel {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }

  .stat-block {
    flex: 1;
    background: var(--rice);
    border: 1px solid var(--ink-wash-med);
    padding: 10px 8px 8px;
    position: relative;
    border-radius: 2px;
  }

  .stat-block::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 8px;
    right: 8px;
    height: 3px;
    border-radius: 1px;
  }

  .stat-block.str::before { background: var(--str-color); }
  .stat-block.agi::before { background: var(--agi-color); }
  .stat-block.end::before { background: var(--end-color); }

  .stat-name {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 4px;
    font-style: italic;
  }

  .stat-block.str .stat-name { color: var(--str-color); }
  .stat-block.agi .stat-name { color: var(--agi-color); }
  .stat-block.end .stat-name { color: var(--end-color); }

  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-block.str .stat-value { color: var(--str-color); }
  .stat-block.agi .stat-value { color: var(--agi-color); }
  .stat-block.end .stat-value { color: var(--end-color); }

  .stat-bar-track {
    height: 3px;
    background: var(--rice-dark);
    border-radius: 1px;
    overflow: hidden;
  }

  .stat-bar-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.6s ease;
  }

  .stat-block.str .stat-bar-fill { background: var(--str-color); }
  .stat-block.agi .stat-bar-fill { background: var(--agi-color); }
  .stat-block.end .stat-bar-fill { background: var(--end-color); }

  /* === MISSION BRIEFING === */
  .mission {
    margin-bottom: 18px;
    position: relative;
    padding: 16px;
    border-left: 4px solid var(--ink);
    background: linear-gradient(135deg, rgba(26,26,24,0.03), transparent);
  }

  .mission::before {
    content: '';
    position: absolute;
    top: 0;
    left: -4px;
    width: 4px;
    height: 20px;
    background: var(--vermillion);
  }

  .mission-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .mission-tag {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--text-dim);
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mission-tag::before {
    content: '◆';
    font-size: 0.45rem;
    color: var(--vermillion);
  }

  .mission-type {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 6px 0 8px;
    color: var(--ink);
  }

  .mission-progress {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    font-style: italic;
  }

  .mission-progress span {
    color: var(--ink);
    font-weight: 700;
    font-style: normal;
  }

  /* === SKILL CARDS (exercises) === */
  .skill-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 18px;
  }

  .skill-card {
    background: var(--rice);
    border: 1px solid var(--ink-wash-med);
    border-left: 3px solid var(--ink-light);
    padding: 14px 16px;
    position: relative;
    border-radius: 0 2px 2px 0;
    animation: brush-in 0.3s ease backwards;
  }

  .skill-card:nth-child(1) { animation-delay: 0.05s; }
  .skill-card:nth-child(2) { animation-delay: 0.1s; }
  .skill-card:nth-child(3) { animation-delay: 0.15s; }

  .skill-card.all-done {
    border-left-color: var(--moss);
    background: linear-gradient(135deg, rgba(74,103,65,0.04), var(--rice));
  }

  .skill-card.all-done::after {
    content: '済';
    position: absolute;
    top: 10px;
    right: 14px;
    font-size: 1.1rem;
    color: var(--vermillion);
    font-weight: 700;
    opacity: 0.5;
    animation: stamp-press 0.4s ease;
  }

  .skill-name {
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
    color: var(--ink);
  }

  .skill-video {
    color: var(--vermillion);
    text-decoration: none;
    margin-left: 8px;
    transition: all 0.2s;
    display: inline-block;
    vertical-align: middle;
    opacity: 0.6;
  }
  .skill-video:active { transform: scale(1.2); opacity: 1; }

  .skill-detail {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 12px;
    font-style: italic;
  }

  .skill-sets {
    display: flex;
    gap: 12px;
  }

  /* === CIRCLE SET BUTTONS (ensō-inspired) === */
  .set-btn {
    width: 44px;
    height: 44px;
    border: 2.5px solid var(--ink-wash-med);
    border-radius: 50%;
    background: var(--rice);
    color: var(--text-dim);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
  }

  .set-btn span {
    display: block;
  }

  .set-btn:active {
    transform: scale(0.88);
  }

  .set-btn.done {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--rice);
    box-shadow: 1px 2px 4px rgba(26,26,24,0.3);
  }

  .set-btn.done::after {
    content: '';
    position: absolute;
    inset: -5px;
    border: 1px solid var(--ink-wash-med);
    border-radius: 50%;
  }

  /* === COMPLETE BUTTON === */
  .complete-btn {
    width: 100%;
    padding: 16px;
    border: 2px solid var(--ink-wash-med);
    background: var(--rice);
    color: var(--text-dim);
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
    cursor: default;
    transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
    font-family: Georgia, serif;
  }

  .complete-btn.ready {
    border-color: var(--ink);
    color: var(--rice);
    cursor: pointer;
    background: var(--ink);
    box-shadow: 2px 3px 0 rgba(26,26,24,0.2);
  }

  .complete-btn.ready:active {
    transform: scale(0.98);
    box-shadow: 1px 1px 0 rgba(26,26,24,0.2);
  }

  /* === QUEST LOG === */
  .quest-log {
    margin-bottom: 18px;
    position: relative;
    border: 1px solid var(--ink-wash-med);
    border-radius: 2px;
    background: var(--rice);
  }

  .quest-header {
    padding: 12px 16px 8px;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--vermillion);
    display: flex;
    align-items: center;
    gap: 8px;
    font-style: italic;
    border-bottom: 1px solid var(--ink-wash);
  }

  .quest-header::before {
    content: '巻';
    font-size: 0.85rem;
    font-style: normal;
    color: var(--vermillion);
    opacity: 0.6;
  }

  .quest-item {
    padding: 9px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
    border-top: 1px solid var(--ink-wash);
    position: relative;
  }

  .quest-item:first-of-type { border-top: none; }
  .quest-item:last-child { padding-bottom: 12px; }

  .quest-diamond {
    width: 10px;
    height: 10px;
    border: 2px solid var(--ink-wash-med);
    border-radius: 50%;
    flex-shrink: 0;
    transition: all 0.3s;
  }

  .quest-diamond.done {
    background: var(--ink);
    border-color: var(--ink);
  }

  .quest-label { color: var(--text); }
  .quest-label.done {
    color: var(--text-dim);
    text-decoration: line-through;
    text-decoration-color: var(--text-dim);
  }

  /* === STREAK & TIMELINE === */
  .timeline-section {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }

  .streak-display {
    border: 1px solid var(--ink-wash-med);
    padding: 12px;
    text-align: center;
    flex-shrink: 0;
    width: 76px;
    border-radius: 2px;
    background: var(--rice);
    position: relative;
  }

  .streak-display::after {
    content: '連';
    position: absolute;
    bottom: 4px;
    right: 5px;
    font-size: 0.6rem;
    color: var(--vermillion);
    opacity: 0.25;
  }

  .streak-num {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
  }

  .streak-label {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-top: 3px;
    font-style: italic;
  }

  .week-track {
    flex: 1;
    border: 1px solid var(--ink-wash-med);
    padding: 8px;
    display: flex;
    gap: 5px;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
    background: var(--rice);
  }

  .week-cell {
    flex: 1;
    max-width: 42px;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    color: var(--text-dim);
    background: var(--rice);
    border: 1.5px solid var(--ink-wash-med);
    border-radius: 50%;
    transition: all 0.3s;
    font-family: Georgia, serif;
  }

  .week-cell.done {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--rice);
    font-weight: 700;
  }

  .week-cell.today {
    border-color: var(--vermillion);
    color: var(--vermillion);
    font-weight: 700;
  }

  .week-cell.done.today {
    border-color: var(--ink);
    color: var(--rice);
    background: var(--ink);
  }

  /* === DONE BANNER === */
  .done-banner {
    border: 1px solid var(--ink-wash-med);
    padding: 32px 20px;
    text-align: center;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
    background: var(--rice);
    border-radius: 2px;
  }

  .done-banner::before {
    content: '完';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 8rem;
    color: var(--vermillion);
    opacity: 0.06;
    font-weight: 700;
    pointer-events: none;
  }

  .done-status {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 5px;
    color: var(--moss);
    margin-bottom: 8px;
    font-style: italic;
  }

  .done-title {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .done-xp {
    font-size: 0.85rem;
    color: var(--gold);
    font-weight: 700;
  }

  .done-next {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 10px;
    letter-spacing: 2px;
    font-style: italic;
  }

  /* === XP POPUP === */
  .xp-popup {
    position: fixed;
    top: 40%;
    left: 50%;
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 2px 8px rgba(184,134,11,0.4);
    pointer-events: none;
    animation: xp-float 1.2s ease forwards;
    z-index: 100;
    letter-spacing: 2px;
    font-family: Georgia, serif;
  }

  /* === LEVEL UP OVERLAY === */
  .levelup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(200,50,40,0.08);
    z-index: 200;
    animation: levelup-flash 1.5s ease forwards;
    pointer-events: none;
  }

  .levelup-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: var(--ink);
    text-shadow: 0 2px 12px rgba(26,26,24,0.3);
    z-index: 201;
    animation: levelup-text 1.5s ease forwards;
    pointer-events: none;
    font-family: Georgia, serif;
  }

  /* === SYNC BADGE === */
  .sync-badge {
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 2px 8px;
    border: 1px solid var(--ink-wash-med);
    background: var(--rice);
    color: var(--text-dim);
    display: inline-block;
    border-radius: 1px;
    font-family: Georgia, serif;
  }
  .sync-badge.synced { border-color: var(--moss); color: var(--moss); }
  .sync-badge.syncing { border-color: var(--indigo); color: var(--indigo); animation: pulse-soft 1s ease infinite; }
  .sync-badge.error { border-color: var(--vermillion); color: var(--vermillion); }
  .sync-badge.local { color: var(--text-dim); }

  /* === INK DIVIDER === */
  .ink-divider {
    height: 2px;
    background: var(--ink);
    margin: 0 0 18px;
    position: relative;
    opacity: 0.15;
    border-radius: 1px;
  }

  /* === FOOTER MARK === */
  .footer-mark {
    text-align: center;
    padding: 20px 0 10px;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 3px;
    opacity: 0.4;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="stamp-tl">鍛</div>
<div class="app" id="app"></div>
<script>
const SYNC_URL = 'https://anime-bod-sync.winslowcj5.workers.dev/api/sync';
const params = new URLSearchParams(window.location.search);
const USER_KEY = params.get('key');
let syncState = USER_KEY ? 'local' : null;
let syncDebounceTimer = null;

const VID = 'https://www.youtube.com/watch?v=3Zgrh5009_k';
const SPLITS = {
  push: { label: 'Push Day', tag: 'STRENGTH', stat: 'str', exercises: [
    { id: 'pike-pushups', name: 'Pike Push-ups', defaultSets: 3, defaultReps: 10, video: `${VID}&t=188s` },
    { id: 'decline-deficit-pushups', name: 'Decline Deficit Push-ups', defaultSets: 3, defaultReps: 12, video: `${VID}&t=265s` },
    { id: 'dips', name: 'Dips', defaultSets: 3, defaultReps: 10, video: `${VID}&t=308s` }
  ]},
  pull: { label: 'Pull Day', tag: 'AGILITY', stat: 'agi', exercises: [
    { id: 'pullups', name: 'Pull-ups', defaultSets: 3, defaultReps: 8, video: `${VID}&t=55s` },
    { id: 'inverted-rows', name: 'Inverted Rows', defaultSets: 3, defaultReps: 12, video: `${VID}&t=125s` }
  ]},
  legs: { label: 'Legs Day', tag: 'ENDURANCE', stat: 'end', exercises: [
    { id: 'pistol-squats', name: 'Pistol Squats', defaultSets: 3, defaultReps: 6, video: `${VID}&t=373s` },
    { id: 'hip-hinges', name: 'Hip Hinges', defaultSets: 3, defaultReps: 12, video: `${VID}&t=411s` },
    { id: 'dragonflies', name: 'Dragonflies', defaultSets: 3, defaultReps: 8, video: `${VID}&t=479s` }
  ]}
};
const SPLIT_ORDER = ['push', 'pull', 'legs'];
const XP_SET = 5, XP_EXERCISE = 15, XP_WORKOUT = 30;

const store = {
  get() {
    try { return JSON.parse(localStorage.getItem('anime-bod') || 'null') || this.fresh(); }
    catch { return this.fresh(); }
  },
  save(d) { localStorage.setItem('anime-bod', JSON.stringify(d)); },
  fresh() {
    return {
      version: 1,
      player: { name: 'Hero', xp: 0, level: 1, stats: { str: 0, agi: 0, end: 0 }, streak: { current: 0, best: 0, lastDate: null } },
      workouts: {},
      quests: {},
      settings: {}
    };
  },
  async sync() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      await fetch(`${SYNC_URL}?key=${USER_KEY}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: localStorage.getItem('anime-bod')
      });
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  },
  async pull() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      const res = await fetch(`${SYNC_URL}?key=${USER_KEY}`);
      if (res.ok) {
        const remote = await res.json();
        const local = this.get();
        const merged = mergeState(local, remote);
        this.save(merged);
      }
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  }
};

function mergeState(local, remote) {
  if (!remote || !remote.workouts) return local;
  if (!local || !local.workouts) return remote;

  const merged = JSON.parse(JSON.stringify(local));

  Object.keys(remote.workouts).forEach(day => {
    const rw = remote.workouts[day];
    const lw = merged.workouts[day];
    if (!lw) { merged.workouts[day] = rw; return; }
    if (rw.completedAt && !lw.completedAt) { merged.workouts[day] = rw; return; }
  });

  Object.keys(remote.quests || {}).forEach(day => {
    if (!merged.quests[day]) merged.quests[day] = remote.quests[day];
  });

  if (remote.player.xp > merged.player.xp) {
    merged.player.xp = remote.player.xp;
    merged.player.level = remote.player.level;
  }
  if ((remote.player.streak?.best || 0) > (merged.player.streak?.best || 0)) {
    merged.player.streak.best = remote.player.streak.best;
  }

  return merged;
}

function setSyncState(state) {
  syncState = state;
  const el = document.getElementById('sync-badge');
  if (!el) return;
  el.className = 'sync-badge ' + state;
  el.textContent = state === 'syncing' ? 'syncing...' : state === 'synced' ? 'synced' : state === 'error' ? 'offline' : 'local only';
}

function debouncedSync() {
  if (!USER_KEY) return;
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(() => store.sync(), 2000);
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function xpForLevel(n) { return 50 * n + 10 * n * n; }

function getCompletedCount(d) {
  return Object.values(d.workouts).filter(w => w.completedAt).length;
}

function getTodayType(d) {
  return SPLIT_ORDER[getCompletedCount(d) % 3];
}

function ensureTodayWorkout(d) {
  const key = todayStr();
  if (d.workouts[key] && d.workouts[key].completedAt) return d;
  const type = getTodayType(d);
  if (!d.workouts[key] || d.workouts[key].type !== type) {
    d.workouts[key] = {
      type,
      exercises: SPLITS[type].exercises.map(ex => ({
        id: ex.id, sets: Array.from({ length: ex.defaultSets }, () => ({ done: false }))
      })),
      completedAt: null,
      xpEarned: 0
    };
  }
  return d;
}

function ensureTodayQuests(d) {
  const key = todayStr();
  if (d.quests[key]) return d;
  const type = getTodayType(d);
  const split = SPLITS[type];
  const quests = [
    { id: 'complete-workout', label: `Complete ${split.label}`, done: false },
    { id: 'all-sets', label: 'Finish every set', done: false }
  ];
  if (type === 'push') quests.push({ id: 'pike-master', label: 'Complete all Pike Push-ups', done: false });
  if (type === 'pull') quests.push({ id: 'pull-master', label: 'Complete all Pull-ups', done: false });
  if (type === 'legs') quests.push({ id: 'pistol-master', label: 'Complete all Pistol Squats', done: false });
  d.quests[key] = quests;
  return d;
}

function updateQuests(d) {
  const key = todayStr();
  const w = d.workouts[key];
  const q = d.quests[key];
  if (!w || !q) return;
  const allSetsDone = w.exercises.every(ex => ex.sets.every(s => s.done));
  q.forEach(quest => {
    if (quest.id === 'complete-workout') quest.done = !!w.completedAt;
    if (quest.id === 'all-sets') quest.done = allSetsDone;
    if (quest.id === 'pike-master') quest.done = w.exercises.find(e => e.id === 'pike-pushups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pull-master') quest.done = w.exercises.find(e => e.id === 'pullups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pistol-master') quest.done = w.exercises.find(e => e.id === 'pistol-squats')?.sets.every(s => s.done) || false;
  });
}

function calcStreak(d) {
  let streak = 0;
  const t = new Date();
  if (d.workouts[todayStr()]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
  else { t.setDate(t.getDate() - 1); }
  for (let i = 0; i < 365; i++) {
    const key = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const dow = t.getDay();
    if (dow === 0) { t.setDate(t.getDate() - 1); continue; }
    if (d.workouts[key]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
    else break;
  }
  return streak;
}

function calcStats(d) {
  const stats = { str: 0, agi: 0, end: 0 };
  Object.values(d.workouts).forEach(w => {
    if (!w.completedAt) return;
    const split = SPLITS[w.type];
    if (!split) return;
    const vol = w.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => s.done).length, 0);
    stats[split.stat] += vol;
  });
  return stats;
}

function awardXP(d, amount) {
  const oldLevel = d.player.level;
  d.player.xp += amount;
  while (d.player.xp >= xpForLevel(d.player.level)) {
    d.player.level++;
  }
  return d.player.level > oldLevel;
}

let pendingXpPopup = 0;
function showXpPopup(amount) {
  pendingXpPopup += amount;
  const el = document.createElement('div');
  el.className = 'xp-popup';
  el.textContent = `+${pendingXpPopup} XP`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
  setTimeout(() => { pendingXpPopup = 0; }, 100);
}

function showLevelUp() {
  const flash = document.createElement('div');
  flash.className = 'levelup-overlay';
  document.body.appendChild(flash);
  const txt = document.createElement('div');
  txt.className = 'levelup-text';
  txt.textContent = 'LEVEL UP';
  document.body.appendChild(txt);
  setTimeout(() => { flash.remove(); txt.remove(); }, 1500);
}

function render() {
  const d = store.get();
  ensureTodayWorkout(d);
  ensureTodayQuests(d);
  d.player.stats = calcStats(d);
  d.player.streak.current = calcStreak(d);
  if (d.player.streak.current > d.player.streak.best) d.player.streak.best = d.player.streak.current;
  store.save(d);

  const key = todayStr();
  const w = d.workouts[key];
  const type = w.type;
  const split = SPLITS[type];
  const streak = d.player.streak.current;
  const level = d.player.level;
  const prevLevelXp = level > 1 ? xpForLevel(level - 1) : 0;
  const xpCur = d.player.xp - prevLevelXp;
  const xpNeed = xpForLevel(level) - prevLevelXp;
  const xpPct = Math.min(100, (xpCur / xpNeed) * 100);
  const totalCompleted = getCompletedCount(d);
  const maxStat = Math.max(d.player.stats.str, d.player.stats.agi, d.player.stats.end, 1);

  let h = '';

  h += `<div class="hud">`;
  h += `<div class="hud-avatar">${level}</div>`;
  h += `<div class="hud-info">`;
  h += `<div class="hud-title">修行者</div>`;
  h += `<div class="hud-name">Anime Physique</div>`;
  h += `<div class="hud-class">${split.tag} — ${split.label}</div>`;
  h += `</div>`;
  h += `<div class="hud-level"><div class="hud-level-num">${level}</div><div class="hud-level-label">Level</div></div>`;
  h += `</div>`;
  if (USER_KEY) {
    const badgeLabel = syncState === 'syncing' ? 'syncing...' : syncState === 'synced' ? 'synced' : syncState === 'error' ? 'offline' : 'local only';
    h += `<div style="text-align:right;margin-bottom:4px"><span id="sync-badge" class="sync-badge ${syncState || 'local'}">${badgeLabel}</span></div>`;
  }

  h += `<div class="xp-wrap">`;
  h += `<div class="xp-track"><div class="xp-fill" style="width:${xpPct}%"></div></div>`;
  h += `<div class="xp-text">${xpCur} / ${xpNeed} XP</div>`;
  h += `</div>`;

  h += `<div class="stats-panel">`;
  const statTips = { str: 'Levels up from Push days (Pike Push-ups, Dips, Decline Push-ups)', agi: 'Levels up from Pull days (Pull-ups, Inverted Rows)', end: 'Levels up from Legs days (Pistol Squats, Hip Hinges, Dragonflies)' };
  ['str', 'agi', 'end'].forEach(s => {
    const label = s.toUpperCase();
    const val = d.player.stats[s];
    const pct = Math.min(100, (val / maxStat) * 100);
    h += `<div class="stat-block ${s}" title="${statTips[s]}">`;
    h += `<div class="stat-name">${label}</div>`;
    h += `<div class="stat-value">${val}</div>`;
    h += `<div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%"></div></div>`;
    h += `</div>`;
  });
  h += `</div>`;

  if (w.completedAt) {
    const nextType = SPLIT_ORDER[totalCompleted % 3];
    const nextSplit = SPLITS[nextType];
    h += `<div class="done-banner">`;
    h += `<div class="done-status">Mission Complete</div>`;
    h += `<div class="done-title">${split.label}</div>`;
    h += `<div class="done-xp">+${w.xpEarned} XP EARNED</div>`;
    h += `<div class="done-next">Next — ${nextSplit.label}</div>`;
    h += `</div>`;
  } else {
    let totalSets = 0, doneSets = 0;
    w.exercises.forEach(ex => {
      ex.sets.forEach(s => { totalSets++; if (s.done) doneSets++; });
    });

    h += `<div class="mission">`;
    h += `<div class="mission-header"><span class="mission-tag">Today's Mission</span></div>`;
    h += `<div class="mission-type">${split.label}</div>`;
    h += `<div class="mission-progress"><span>${doneSets}</span> / ${totalSets} sets cleared</div>`;
    h += `</div>`;

    h += `<div class="skill-list">`;
    w.exercises.forEach((ex, ei) => {
      const cfg = split.exercises[ei];
      const allDone = ex.sets.every(s => s.done);
      h += `<div class="skill-card ${allDone ? 'all-done' : ''}">`;
      const vidIcon = `<svg viewBox="0 0 24 20" width="28" height="22" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="22" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><polygon points="9,5.5 9,14.5 17,10" fill="currentColor"/></svg>`;
      h += `<div class="skill-name">${cfg.name} ${cfg.video ? `<a href="${cfg.video}" target="_blank" class="skill-video">${vidIcon}</a>` : ''}</div>`;
      h += `<div class="skill-detail">${cfg.defaultSets} sets · ${cfg.defaultReps} reps</div>`;
      h += `<div class="skill-sets">`;
      ex.sets.forEach((s, si) => {
        h += `<button class="set-btn ${s.done ? 'done' : ''}" onclick="toggleSet(${ei},${si})"><span>${si + 1}</span></button>`;
      });
      h += `</div></div>`;
    });
    h += `</div>`;

    const canComplete = doneSets === totalSets && totalSets > 0;
    h += `<button class="complete-btn ${canComplete ? 'ready' : ''}" ${canComplete ? 'onclick="completeWorkout()"' : ''}>`;
    h += canComplete ? '完了 — Complete' : `${doneSets} / ${totalSets} Sets`;
    h += `</button>`;
  }

  updateQuests(d);
  store.save(d);
  const quests = d.quests[key] || [];
  h += `<div class="quest-log">`;
  h += `<div class="quest-header">Quest Log</div>`;
  quests.forEach(q => {
    h += `<div class="quest-item">`;
    h += `<div class="quest-diamond ${q.done ? 'done' : ''}"></div>`;
    h += `<span class="quest-label ${q.done ? 'done' : ''}">${q.label}</span>`;
    h += `</div>`;
  });
  h += `</div>`;

  h += `<div class="timeline-section">`;
  h += `<div class="streak-display"><div class="streak-num">${streak}</div><div class="streak-label">Streak</div></div>`;
  h += `<div class="week-track">`;
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
  const dayLabels = ['M','T','W','T','F','S','S'];
  for (let i = 0; i < 7; i++) {
    const dt = new Date(mon);
    dt.setDate(dt.getDate() + i);
    const dk = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const isToday = dk === todayStr();
    const wk = d.workouts[dk];
    const done = wk?.completedAt;
    h += `<div class="week-cell ${done ? 'done' : ''} ${isToday ? 'today' : ''}">${dayLabels[i]}</div>`;
  }
  h += `</div></div>`;

  h += `<div class="footer-mark">墨 · 鍛錬</div>`;

  document.getElementById('app').innerHTML = h;
}

function toggleSet(ei, si) {
  const d = store.get();
  ensureTodayWorkout(d);
  const w = d.workouts[todayStr()];
  if (w.completedAt) return;

  const set = w.exercises[ei].sets[si];
  const wasDone = set.done;
  set.done = !set.done;

  if (!wasDone) {
    awardXP(d, XP_SET);
    showXpPopup(XP_SET);
    const allExSets = w.exercises[ei].sets.every(s => s.done);
    if (allExSets) {
      awardXP(d, XP_EXERCISE);
      showXpPopup(XP_EXERCISE);
    }
  } else {
    const wasAllDone = w.exercises[ei].sets.filter((s, idx) => idx !== si).every(s => s.done);
    if (wasAllDone) d.player.xp = Math.max(0, d.player.xp - XP_EXERCISE);
    d.player.xp = Math.max(0, d.player.xp - XP_SET);
    while (d.player.level > 1 && d.player.xp < xpForLevel(d.player.level - 1)) d.player.level--;
  }

  store.save(d);
  render();
  debouncedSync();
}

function completeWorkout() {
  const d = store.get();
  const key = todayStr();
  const w = d.workouts[key];
  if (w.completedAt) return;
  if (!w.exercises.every(ex => ex.sets.every(s => s.done))) return;

  let earned = XP_WORKOUT;
  const streak = calcStreak(d) + 1;
  earned += streak * 2;
  w.xpEarned = (w.xpEarned || 0) + earned;
  w.completedAt = new Date().toISOString();

  const leveled = awardXP(d, earned);
  showXpPopup(earned);

  d.player.streak.current = streak;
  if (streak > d.player.streak.best) d.player.streak.best = streak;
  d.player.streak.lastDate = key;

  store.save(d);
  render();

  if (leveled) {
    setTimeout(showLevelUp, 200);
  }

  store.sync();
}

render();
store.pull().then(() => render());
</script>
</body>
</html>
