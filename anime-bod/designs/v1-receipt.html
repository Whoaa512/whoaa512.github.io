<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ANIME PHYSIQUE // RPG</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f5f0e8">
<style>
  @keyframes xp-float {
    0% { opacity: 1; transform: translate(-50%, 0) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -10px) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(1); }
  }
  @keyframes levelup-flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes levelup-text {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    60% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }

  :root {
    --bg: #f5f0e8;
    --ink: #1a1a1a;
    --dim: #888;
    --red: #c41e3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Courier New', Courier, monospace;
    background: #e8e3db;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px 8px 60px;
    text-transform: uppercase;
    font-size: 13px;
    line-height: 1.4;
    -webkit-font-smoothing: none;
  }

  .app {
    max-width: 380px;
    width: 100%;
    background: var(--bg);
    background-image:
      repeating-conic-gradient(rgba(0,0,0,0.015) 0% 25%, transparent 0% 50%) 0 0 / 4px 4px;
    padding: 24px 16px 32px;
    transform: rotate(0.3deg);
    position: relative;
    box-shadow: 2px 3px 12px rgba(0,0,0,0.08);
  }

  .app::before, .app::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    height: 8px;
    background: var(--bg);
    background-image:
      repeating-conic-gradient(rgba(0,0,0,0.015) 0% 25%, transparent 0% 50%) 0 0 / 4px 4px;
  }
  .app::before {
    top: -6px;
    mask-image: url("data:image/svg+xml,%3Csvg width='12' height='8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,8 L6,0 L12,8' fill='white'/%3E%3C/svg%3E");
    mask-size: 12px 8px;
    mask-repeat: repeat-x;
    -webkit-mask-image: url("data:image/svg+xml,%3Csvg width='12' height='8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,8 L6,0 L12,8' fill='white'/%3E%3C/svg%3E");
    -webkit-mask-size: 12px 8px;
    -webkit-mask-repeat: repeat-x;
  }
  .app::after {
    bottom: -6px;
    mask-image: url("data:image/svg+xml,%3Csvg width='12' height='8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,0 L6,8 L12,0' fill='white'/%3E%3C/svg%3E");
    mask-size: 12px 8px;
    mask-repeat: repeat-x;
    -webkit-mask-image: url("data:image/svg+xml,%3Csvg width='12' height='8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,0 L6,8 L12,0' fill='white'/%3E%3C/svg%3E");
    -webkit-mask-size: 12px 8px;
    -webkit-mask-repeat: repeat-x;
  }

  .divider { text-align: center; color: var(--dim); margin: 8px 0; letter-spacing: 0; font-size: 13px; overflow: hidden; white-space: nowrap; }
  .divider-double { letter-spacing: -1px; }

  .receipt-header { text-align: center; margin-bottom: 4px; }
  .store-name { font-size: 20px; font-weight: bold; letter-spacing: 4px; }
  .store-sub { font-size: 11px; color: var(--dim); letter-spacing: 2px; }
  .store-level { font-size: 11px; margin-top: 2px; }
  .store-level b { color: var(--red); }

  .sync-badge {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--dim);
    text-align: right;
    display: block;
    margin-bottom: 4px;
  }
  .sync-badge.synced { color: #2a7a2a; }
  .sync-badge.syncing { color: var(--ink); }
  .sync-badge.error { color: var(--red); }

  .xp-section { text-align: center; margin: 4px 0; }
  .xp-bar { letter-spacing: 0; font-size: 14px; }
  .xp-label { font-size: 10px; color: var(--dim); margin-top: 1px; }

  .stat-line {
    display: flex;
    justify-content: space-between;
    padding: 1px 0;
  }
  .stat-line .dots { flex: 1; overflow: hidden; margin: 0 4px; color: var(--dim); }
  .stat-line .stat-val { font-weight: bold; min-width: 30px; text-align: right; }

  .mission-header { text-align: center; margin: 4px 0; }
  .mission-title { font-size: 16px; font-weight: bold; letter-spacing: 2px; }
  .mission-progress { font-size: 11px; color: var(--dim); }
  .mission-progress b { color: var(--ink); }

  .exercise-block { margin: 6px 0; }
  .exercise-name { font-weight: bold; display: flex; align-items: center; gap: 6px; }
  .exercise-detail { font-size: 11px; color: var(--dim); }
  .exercise-video {
    color: var(--dim);
    text-decoration: none;
    font-size: 11px;
    font-weight: normal;
  }
  .exercise-video:active { color: var(--ink); }

  .set-row { display: flex; gap: 8px; margin: 4px 0 2px; }
  .set-btn {
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    background: none;
    border: none;
    color: var(--ink);
    cursor: pointer;
    padding: 2px 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    text-transform: uppercase;
  }
  .set-btn:active { color: var(--dim); }
  .set-btn.done { color: var(--red); font-weight: bold; }

  .exercise-clear { font-size: 11px; color: var(--red); font-weight: bold; text-align: right; }

  .complete-btn {
    display: block;
    width: 100%;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    background: none;
    border: none;
    color: var(--dim);
    cursor: default;
    padding: 8px 0;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .complete-btn.ready {
    color: var(--red);
    cursor: pointer;
  }
  .complete-btn.ready:active { color: var(--ink); }

  .done-section { text-align: center; padding: 8px 0; }
  .done-title { font-size: 16px; font-weight: bold; }
  .done-xp { color: var(--red); font-weight: bold; margin: 4px 0; }
  .done-next { font-size: 11px; color: var(--dim); }

  .quest-header-text { font-weight: bold; margin-bottom: 4px; }
  .quest-item { padding: 1px 0; font-size: 12px; }
  .quest-item.done { color: var(--dim); text-decoration: line-through; }

  .footer-section { margin-top: 4px; }
  .streak-line { text-align: center; font-weight: bold; font-size: 16px; margin-bottom: 6px; }
  .streak-label { font-size: 10px; color: var(--dim); font-weight: normal; }
  .week-row { display: flex; justify-content: space-around; text-align: center; }
  .week-day { flex: 1; }
  .week-day .day-label { font-size: 11px; color: var(--dim); }
  .week-day .day-dot { font-size: 16px; line-height: 1.2; }
  .week-day.today .day-label { color: var(--ink); font-weight: bold; }
  .week-day.done .day-dot { color: var(--red); }

  .receipt-footer { text-align: center; margin-top: 8px; font-size: 10px; color: var(--dim); letter-spacing: 1px; }
  .barcode {
    margin: 8px auto 0;
    display: flex;
    justify-content: center;
    gap: 1px;
    height: 28px;
  }
  .barcode span {
    display: block;
    background: var(--ink);
    height: 100%;
  }

  .xp-popup {
    position: fixed;
    top: 40%;
    left: 50%;
    font-family: 'Courier New', Courier, monospace;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--red);
    pointer-events: none;
    animation: xp-float 1.2s ease forwards;
    z-index: 100;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .levelup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(196, 30, 58, 0.12);
    z-index: 200;
    animation: levelup-flash 1.5s ease forwards;
    pointer-events: none;
  }

  .levelup-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Courier New', Courier, monospace;
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--red);
    z-index: 201;
    animation: levelup-text 1.5s ease forwards;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const SYNC_URL = 'https://anime-bod-sync.winslowcj5.workers.dev/api/sync';
const params = new URLSearchParams(window.location.search);
const USER_KEY = params.get('key');
let syncState = USER_KEY ? 'local' : null;
let syncDebounceTimer = null;

const VID = 'https://www.youtube.com/watch?v=3Zgrh5009_k';
const SPLITS = {
  push: { label: 'Push Day', tag: 'STRENGTH', stat: 'str', exercises: [
    { id: 'pike-pushups', name: 'Pike Push-ups', defaultSets: 3, defaultReps: 10, video: `${VID}&t=188s` },
    { id: 'decline-deficit-pushups', name: 'Decline Deficit Push-ups', defaultSets: 3, defaultReps: 12, video: `${VID}&t=265s` },
    { id: 'dips', name: 'Dips', defaultSets: 3, defaultReps: 10, video: `${VID}&t=308s` }
  ]},
  pull: { label: 'Pull Day', tag: 'AGILITY', stat: 'agi', exercises: [
    { id: 'pullups', name: 'Pull-ups', defaultSets: 3, defaultReps: 8, video: `${VID}&t=55s` },
    { id: 'inverted-rows', name: 'Inverted Rows', defaultSets: 3, defaultReps: 12, video: `${VID}&t=125s` }
  ]},
  legs: { label: 'Legs Day', tag: 'ENDURANCE', stat: 'end', exercises: [
    { id: 'pistol-squats', name: 'Pistol Squats', defaultSets: 3, defaultReps: 6, video: `${VID}&t=373s` },
    { id: 'hip-hinges', name: 'Hip Hinges', defaultSets: 3, defaultReps: 12, video: `${VID}&t=411s` },
    { id: 'dragonflies', name: 'Dragonflies', defaultSets: 3, defaultReps: 8, video: `${VID}&t=479s` }
  ]}
};
const SPLIT_ORDER = ['push', 'pull', 'legs'];
const XP_SET = 5, XP_EXERCISE = 15, XP_WORKOUT = 30;

const store = {
  get() {
    try { return JSON.parse(localStorage.getItem('anime-bod') || 'null') || this.fresh(); }
    catch { return this.fresh(); }
  },
  save(d) { localStorage.setItem('anime-bod', JSON.stringify(d)); },
  fresh() {
    return {
      version: 1,
      player: { name: 'Hero', xp: 0, level: 1, stats: { str: 0, agi: 0, end: 0 }, streak: { current: 0, best: 0, lastDate: null } },
      workouts: {},
      quests: {},
      settings: {}
    };
  },
  async sync() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      await fetch(`${SYNC_URL}?key=${USER_KEY}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: localStorage.getItem('anime-bod')
      });
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  },
  async pull() {
    if (!USER_KEY) return;
    try {
      setSyncState('syncing');
      const res = await fetch(`${SYNC_URL}?key=${USER_KEY}`);
      if (res.ok) {
        const remote = await res.json();
        const local = this.get();
        const merged = mergeState(local, remote);
        this.save(merged);
      }
      setSyncState('synced');
    } catch(e) { setSyncState('error'); }
  }
};

function mergeState(local, remote) {
  if (!remote || !remote.workouts) return local;
  if (!local || !local.workouts) return remote;

  const merged = JSON.parse(JSON.stringify(local));

  Object.keys(remote.workouts).forEach(day => {
    const rw = remote.workouts[day];
    const lw = merged.workouts[day];
    if (!lw) { merged.workouts[day] = rw; return; }
    if (rw.completedAt && !lw.completedAt) { merged.workouts[day] = rw; return; }
  });

  Object.keys(remote.quests || {}).forEach(day => {
    if (!merged.quests[day]) merged.quests[day] = remote.quests[day];
  });

  if (remote.player.xp > merged.player.xp) {
    merged.player.xp = remote.player.xp;
    merged.player.level = remote.player.level;
  }
  if ((remote.player.streak?.best || 0) > (merged.player.streak?.best || 0)) {
    merged.player.streak.best = remote.player.streak.best;
  }

  return merged;
}

function setSyncState(state) {
  syncState = state;
  const el = document.getElementById('sync-badge');
  if (!el) return;
  el.className = 'sync-badge ' + state;
  el.textContent = state === 'syncing' ? 'syncing...' : state === 'synced' ? 'synced' : state === 'error' ? 'offline' : 'local only';
}

function debouncedSync() {
  if (!USER_KEY) return;
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(() => store.sync(), 2000);
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function xpForLevel(n) { return 50 * n + 10 * n * n; }

function getCompletedCount(d) {
  return Object.values(d.workouts).filter(w => w.completedAt).length;
}

function getTodayType(d) {
  return SPLIT_ORDER[getCompletedCount(d) % 3];
}

function ensureTodayWorkout(d) {
  const key = todayStr();
  if (d.workouts[key] && d.workouts[key].completedAt) return d;
  const type = getTodayType(d);
  if (!d.workouts[key] || d.workouts[key].type !== type) {
    d.workouts[key] = {
      type,
      exercises: SPLITS[type].exercises.map(ex => ({
        id: ex.id, sets: Array.from({ length: ex.defaultSets }, () => ({ done: false }))
      })),
      completedAt: null,
      xpEarned: 0
    };
  }
  return d;
}

function ensureTodayQuests(d) {
  const key = todayStr();
  if (d.quests[key]) return d;
  const type = getTodayType(d);
  const split = SPLITS[type];
  const quests = [
    { id: 'complete-workout', label: `Complete ${split.label}`, done: false },
    { id: 'all-sets', label: 'Finish every set', done: false }
  ];
  if (type === 'push') quests.push({ id: 'pike-master', label: 'Complete all Pike Push-ups', done: false });
  if (type === 'pull') quests.push({ id: 'pull-master', label: 'Complete all Pull-ups', done: false });
  if (type === 'legs') quests.push({ id: 'pistol-master', label: 'Complete all Pistol Squats', done: false });
  d.quests[key] = quests;
  return d;
}

function updateQuests(d) {
  const key = todayStr();
  const w = d.workouts[key];
  const q = d.quests[key];
  if (!w || !q) return;
  const allSetsDone = w.exercises.every(ex => ex.sets.every(s => s.done));
  q.forEach(quest => {
    if (quest.id === 'complete-workout') quest.done = !!w.completedAt;
    if (quest.id === 'all-sets') quest.done = allSetsDone;
    if (quest.id === 'pike-master') quest.done = w.exercises.find(e => e.id === 'pike-pushups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pull-master') quest.done = w.exercises.find(e => e.id === 'pullups')?.sets.every(s => s.done) || false;
    if (quest.id === 'pistol-master') quest.done = w.exercises.find(e => e.id === 'pistol-squats')?.sets.every(s => s.done) || false;
  });
}

function calcStreak(d) {
  let streak = 0;
  const t = new Date();
  if (d.workouts[todayStr()]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
  else { t.setDate(t.getDate() - 1); }
  for (let i = 0; i < 365; i++) {
    const key = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const dow = t.getDay();
    if (dow === 0) { t.setDate(t.getDate() - 1); continue; }
    if (d.workouts[key]?.completedAt) { streak++; t.setDate(t.getDate() - 1); }
    else break;
  }
  return streak;
}

function calcStats(d) {
  const stats = { str: 0, agi: 0, end: 0 };
  Object.values(d.workouts).forEach(w => {
    if (!w.completedAt) return;
    const split = SPLITS[w.type];
    if (!split) return;
    const vol = w.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => s.done).length, 0);
    stats[split.stat] += vol;
  });
  return stats;
}

function awardXP(d, amount) {
  const oldLevel = d.player.level;
  d.player.xp += amount;
  while (d.player.xp >= xpForLevel(d.player.level)) {
    d.player.level++;
  }
  return d.player.level > oldLevel;
}

let pendingXpPopup = 0;
function showXpPopup(amount) {
  pendingXpPopup += amount;
  const el = document.createElement('div');
  el.className = 'xp-popup';
  el.textContent = `+${pendingXpPopup} XP`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
  setTimeout(() => { pendingXpPopup = 0; }, 100);
}

function showLevelUp() {
  const flash = document.createElement('div');
  flash.className = 'levelup-overlay';
  document.body.appendChild(flash);
  const txt = document.createElement('div');
  txt.className = 'levelup-text';
  txt.textContent = 'LEVEL UP';
  document.body.appendChild(txt);
  setTimeout(() => { flash.remove(); txt.remove(); }, 1500);
}

function render() {
  const d = store.get();
  ensureTodayWorkout(d);
  ensureTodayQuests(d);
  d.player.stats = calcStats(d);
  d.player.streak.current = calcStreak(d);
  if (d.player.streak.current > d.player.streak.best) d.player.streak.best = d.player.streak.current;
  store.save(d);

  const key = todayStr();
  const w = d.workouts[key];
  const type = w.type;
  const split = SPLITS[type];
  const streak = d.player.streak.current;
  const level = d.player.level;
  const prevLevelXp = level > 1 ? xpForLevel(level - 1) : 0;
  const xpCur = d.player.xp - prevLevelXp;
  const xpNeed = xpForLevel(level) - prevLevelXp;
  const xpPct = Math.min(100, (xpCur / xpNeed) * 100);
  const totalCompleted = getCompletedCount(d);
  const maxStat = Math.max(d.player.stats.str, d.player.stats.agi, d.player.stats.end, 1);

  const DIV = '<div class="divider">--------------------------------</div>';
  const DDIV = '<div class="divider divider-double">\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550</div>';

  let h = '';

  // Receipt header
  h += `<div class="receipt-header">`;
  h += `<div class="store-name">ANIME BOD</div>`;
  h += `<div class="store-sub">fitness quest receipt</div>`;
  h += `<div class="store-level">LVL <b>${level}</b> // ${split.tag} // ${split.label}</div>`;
  h += `</div>`;
  if (USER_KEY) {
    const badgeLabel = syncState === 'syncing' ? 'syncing...' : syncState === 'synced' ? 'synced' : syncState === 'error' ? 'offline' : 'local only';
    h += `<span id="sync-badge" class="sync-badge ${syncState || 'local'}">${badgeLabel}</span>`;
  }

  h += DDIV;

  // XP Bar (text-based)
  const filled = Math.round(xpPct / 100 * 20);
  const empty = 20 - filled;
  const bar = '\u2588'.repeat(filled) + '\u2591'.repeat(empty);
  h += `<div class="xp-section">`;
  h += `<div class="xp-bar">[${bar}]</div>`;
  h += `<div class="xp-label">${xpCur} / ${xpNeed} XP TO NEXT LEVEL</div>`;
  h += `</div>`;

  h += DIV;

  // Stats
  function dots(len) { return '.'.repeat(Math.max(2, len)); }
  ['str', 'agi', 'end'].forEach(s => {
    const val = d.player.stats[s];
    h += `<div class="stat-line"><span>${s.toUpperCase()}</span><span class="dots">${dots(30)}</span><span class="stat-val">${val}</span></div>`;
  });

  h += DDIV;

  if (w.completedAt) {
    const nextType = SPLIT_ORDER[totalCompleted % 3];
    const nextSplit = SPLITS[nextType];
    h += `<div class="done-section">`;
    h += `<div>*** MISSION COMPLETE ***</div>`;
    h += `<div class="done-title">${split.label}</div>`;
    h += `<div class="done-xp">+${w.xpEarned} XP EARNED</div>`;
    h += `<div class="done-next">NEXT: ${nextSplit.label}</div>`;
    h += `</div>`;
  } else {
    let totalSets = 0, doneSets = 0;
    w.exercises.forEach(ex => {
      ex.sets.forEach(s => { totalSets++; if (s.done) doneSets++; });
    });

    h += `<div class="mission-header">`;
    h += `<div class="mission-title">${split.label}</div>`;
    h += `<div class="mission-progress"><b>${doneSets}</b> / ${totalSets} SETS CLEARED</div>`;
    h += `</div>`;

    h += DIV;

    // Exercise blocks
    w.exercises.forEach((ex, ei) => {
      const cfg = split.exercises[ei];
      const allDone = ex.sets.every(s => s.done);
      h += `<div class="exercise-block">`;
      h += `<div class="exercise-name">${cfg.name}`;
      if (cfg.video) h += ` <a href="${cfg.video}" target="_blank" class="exercise-video">[VIDEO]</a>`;
      h += `</div>`;
      h += `<div class="exercise-detail">${cfg.defaultSets} SETS x ${cfg.defaultReps} REPS</div>`;
      h += `<div class="set-row">`;
      ex.sets.forEach((s, si) => {
        const icon = s.done ? `[\u25A0]` : `[ ]`;
        h += `<button class="set-btn ${s.done ? 'done' : ''}" onclick="toggleSet(${ei},${si})">${icon} SET ${si + 1}</button>`;
      });
      h += `</div>`;
      if (allDone) h += `<div class="exercise-clear">** CLEAR **</div>`;
      if (ei < w.exercises.length - 1) h += DIV;
      h += `</div>`;
    });

    h += DDIV;

    const canComplete = doneSets === totalSets && totalSets > 0;
    h += `<button class="complete-btn ${canComplete ? 'ready' : ''}" ${canComplete ? 'onclick="completeWorkout()"' : ''}>`;
    h += canComplete ? '>>> EXECUTE MISSION <<<' : `[ ${doneSets} / ${totalSets} SETS ]`;
    h += `</button>`;
  }

  h += DDIV;

  // Quest log
  updateQuests(d);
  store.save(d);
  const quests = d.quests[key] || [];
  h += `<div class="quest-header-text">QUEST LOG:</div>`;
  quests.forEach(q => {
    const check = q.done ? '[X]' : '[ ]';
    h += `<div class="quest-item ${q.done ? 'done' : ''}">${check} ${q.label}</div>`;
  });

  h += DIV;

  // Streak + week
  h += `<div class="footer-section">`;
  h += `<div class="streak-line">STREAK: ${streak} <span class="streak-label">DAYS</span></div>`;
  h += `<div class="week-row">`;
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
  const dayLabels = ['M','T','W','T','F','S','S'];
  for (let i = 0; i < 7; i++) {
    const dt = new Date(mon);
    dt.setDate(dt.getDate() + i);
    const dk = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const isToday = dk === todayStr();
    const wk = d.workouts[dk];
    const done = wk?.completedAt;
    h += `<div class="week-day ${done ? 'done' : ''} ${isToday ? 'today' : ''}">`;
    h += `<div class="day-label">${dayLabels[i]}</div>`;
    h += `<div class="day-dot">${done ? '\u25CF' : '\u25CB'}</div>`;
    h += `</div>`;
  }
  h += `</div></div>`;

  h += DIV;

  // Receipt footer
  const now2 = new Date();
  h += `<div class="receipt-footer">`;
  h += `${now2.toLocaleDateString()} ${now2.toLocaleTimeString()}<br>`;
  h += `WORKOUT #${String(totalCompleted + 1).padStart(4, '0')}<br>`;
  h += `THANK YOU FOR TRAINING`;
  h += `</div>`;

  // Barcode
  const barWidths = [2,1,3,1,2,1,1,3,2,1,1,2,3,1,2,1,1,3,1,2,1,3,1,1,2,1,3,2,1,1];
  h += `<div class="barcode">`;
  barWidths.forEach((w, i) => {
    if (i % 2 === 0) h += `<span style="width:${w}px"></span>`;
    else h += `<span style="width:${w}px;background:transparent"></span>`;
  });
  h += `</div>`;

  document.getElementById('app').innerHTML = h;
}

function toggleSet(ei, si) {
  const d = store.get();
  ensureTodayWorkout(d);
  const w = d.workouts[todayStr()];
  if (w.completedAt) return;

  const set = w.exercises[ei].sets[si];
  const wasDone = set.done;
  set.done = !set.done;

  if (!wasDone) {
    awardXP(d, XP_SET);
    showXpPopup(XP_SET);
    const allExSets = w.exercises[ei].sets.every(s => s.done);
    if (allExSets) {
      awardXP(d, XP_EXERCISE);
      showXpPopup(XP_EXERCISE);
    }
  } else {
    const wasAllDone = w.exercises[ei].sets.filter((s, idx) => idx !== si).every(s => s.done);
    if (wasAllDone) d.player.xp = Math.max(0, d.player.xp - XP_EXERCISE);
    d.player.xp = Math.max(0, d.player.xp - XP_SET);
    while (d.player.level > 1 && d.player.xp < xpForLevel(d.player.level - 1)) d.player.level--;
  }

  store.save(d);
  render();
  debouncedSync();
}

function completeWorkout() {
  const d = store.get();
  const key = todayStr();
  const w = d.workouts[key];
  if (w.completedAt) return;
  if (!w.exercises.every(ex => ex.sets.every(s => s.done))) return;

  let earned = XP_WORKOUT;
  const streak = calcStreak(d) + 1;
  earned += streak * 2;
  w.xpEarned = (w.xpEarned || 0) + earned;
  w.completedAt = new Date().toISOString();

  const leveled = awardXP(d, earned);
  showXpPopup(earned);

  d.player.streak.current = streak;
  if (streak > d.player.streak.best) d.player.streak.best = streak;
  d.player.streak.lastDate = key;

  store.save(d);
  render();

  if (leveled) {
    setTimeout(showLevelUp, 200);
  }

  store.sync();
}

render();
store.pull().then(() => render());
</script>
</body>
</html>
