<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arms Daily</title>
<style>
  :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #eee; --dim: #888; --green: #4ade80; --yellow: #fbbf24; --red: #f87171; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
  .container { max-width: 420px; margin: 0 auto; }
  h1 { font-size: 1.6rem; text-align: center; margin-bottom: 4px; }
  .subtitle { text-align: center; color: var(--dim); font-size: 0.85rem; margin-bottom: 24px; }
  .streak-bar { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 24px; padding: 12px; background: var(--card); border-radius: 12px; }
  .streak-num { font-size: 2rem; font-weight: 700; color: var(--accent); }
  .streak-label { font-size: 0.8rem; color: var(--dim); }
  .day-card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .day-letter { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .day-label { color: var(--dim); font-size: 0.85rem; }
  .exercise { margin-bottom: 14px; }
  .exercise:last-child { margin-bottom: 0; }
  .ex-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 6px; }
  .ex-name a { color: var(--text); text-decoration: underline; text-decoration-color: #444; text-underline-offset: 3px; }
  .ex-name a:hover { text-decoration-color: var(--accent); }
  .ex-detail { color: var(--dim); font-size: 0.8rem; margin-bottom: 8px; }
  .sets { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .set-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid #333; background: transparent; color: var(--text); font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.1; position: relative; }
  .set-btn.done { background: var(--green); border-color: var(--green); color: #1a1a2e; }
  .set-btn.partial { background: var(--yellow); border-color: var(--yellow); color: #1a1a2e; }
  .set-btn:active { transform: scale(0.9); }
  .set-reps { font-size: 0.6rem; opacity: 0.8; }
  .complete-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--accent); color: white; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
  .complete-btn:disabled { opacity: 0.3; cursor: default; }
  .complete-btn:not(:disabled):active { transform: scale(0.98); }
  .history { margin-top: 24px; }
  .history h2 { font-size: 1rem; margin-bottom: 12px; color: var(--dim); }
  .week-grid { display: flex; gap: 4px; margin-bottom: 8px; }
  .week-dot { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: var(--dim); }
  .week-dot.done { background: var(--green); color: #1a1a2e; font-weight: 600; }
  .week-dot.missed { background: #333; }
  .week-dot.today { border: 2px solid var(--accent); }
  .weight-setting { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 24px; padding: 12px; background: var(--card); border-radius: 12px; }
  .weight-setting label { color: var(--dim); font-size: 0.85rem; }
  .weight-input { width: 60px; background: var(--bg); border: 1px solid #333; border-radius: 8px; color: var(--text); padding: 6px 10px; font-size: 1rem; text-align: center; }
  .tip { color: var(--dim); font-size: 0.75rem; text-align: center; margin-top: 16px; line-height: 1.4; }
  .data-actions { display: flex; gap: 8px; justify-content: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #333; }
  .data-btn { padding: 8px 16px; border: 1px solid #333; border-radius: 8px; background: transparent; color: var(--dim); font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
  .data-btn:active { transform: scale(0.95); }
  .data-btn:hover { border-color: var(--accent); color: var(--accent); }
  .import-input { display: none; }
  .import-msg { text-align: center; font-size: 0.8rem; margin-top: 8px; }
  .data-text { width: 100%; min-height: 80px; max-height: 200px; background: var(--bg); border: 1px solid #333; border-radius: 8px; color: var(--dim); font-size: 0.7rem; font-family: monospace; padding: 10px; margin-top: 8px; resize: vertical; }
  .data-text-actions { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
  .data-text-btn { padding: 6px 12px; border: 1px solid #333; border-radius: 6px; background: transparent; color: var(--dim); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
  .data-text-btn:hover { border-color: var(--accent); color: var(--accent); }
  .data-text-btn:active { transform: scale(0.95); }
  .done-banner { text-align: center; padding: 32px 20px; }
  .done-banner .check { font-size: 3rem; margin-bottom: 8px; }
  .done-banner .msg { font-size: 1.1rem; font-weight: 600; }
  .done-banner .sub { color: var(--dim); font-size: 0.85rem; margin-top: 4px; }

  /* Timer */
  .timer-card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 16px; text-align: center; }
  .timer-display { font-size: 3rem; font-weight: 700; font-variant-numeric: tabular-nums; margin: 8px 0; }
  .timer-display.warning { color: var(--yellow); }
  .timer-display.ready { color: var(--green); animation: pulse 1s infinite; }
  .timer-label { color: var(--dim); font-size: 0.8rem; margin-bottom: 8px; }
  .timer-buttons { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
  .timer-btn { padding: 8px 16px; border: 1px solid #333; border-radius: 8px; background: transparent; color: var(--text); font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
  .timer-btn:active { transform: scale(0.95); }
  .timer-btn.active { border-color: var(--accent); color: var(--accent); }
  .timer-btn.start { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
  .timer-btn.stop { background: #333; border-color: #333; }
  .timer-adj { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 8px; }
  .adj-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #333; background: transparent; color: var(--dim); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .adj-btn:active { transform: scale(0.9); background: #333; }

  .ex-tips-toggle { background: none; border: 1px solid #333; border-radius: 6px; color: var(--dim); font-size: 0.7rem; padding: 2px 8px; cursor: pointer; margin-left: 8px; transition: all 0.15s; }
  .ex-tips-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .ex-tips { display: none; margin: 8px 0; padding: 8px 12px; background: var(--bg); border-radius: 8px; border-left: 3px solid var(--accent); }
  .ex-tips.open { display: block; }
  .ex-tips li { color: var(--dim); font-size: 0.78rem; margin-bottom: 4px; list-style: none; padding-left: 12px; position: relative; line-height: 1.4; }
  .ex-tips li::before { content: '→'; position: absolute; left: 0; color: var(--accent); }
  .ex-tips li:last-child { margin-bottom: 0; }
  .ex-tips .exrx-link { display: inline-block; margin-top: 6px; font-size: 0.7rem; color: var(--accent); text-decoration: none; }
  .ex-tips .exrx-link:hover { text-decoration: underline; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Rep input modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--card); border-radius: 16px; padding: 24px; width: 300px; text-align: center; }
  .modal h3 { font-size: 1.1rem; margin-bottom: 4px; }
  .modal .modal-sub { color: var(--dim); font-size: 0.8rem; margin-bottom: 16px; }
  .rep-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 16px; }
  .rep-btn { width: 48px; height: 48px; border-radius: 12px; border: 2px solid #333; background: transparent; color: var(--text); font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .rep-btn:active { transform: scale(0.9); }
  .rep-btn.target { border-color: var(--green); color: var(--green); }
  .modal-cancel { background: none; border: none; color: var(--dim); font-size: 0.85rem; cursor: pointer; padding: 8px; }
  .modal-cancel:hover { color: var(--text); }

  /* Weight suggestion */
</style>
</head>
<body>
<div class="container" id="app"></div>
<div id="modal-root"></div>
<script>
const DAYS = [
  { letter: 'A', label: 'Push', exercises: [
    { name: 'Overhead Press', sets: 3, reps: 10, url: 'https://exrx.net/WeightExercises/DeltoidAnterior/DBShoulderPress',
      tips: ['Sit or stand, dumbbells at shoulder height', 'Press straight up, full extension', 'Lower slowly (3s) to shoulders'] },
    { name: 'Tricep Kickbacks', sets: 3, reps: 12, url: 'https://exrx.net/WeightExercises/Triceps/DBKickback',
      tips: ['Hinge forward ~45°, upper arm parallel to floor', 'Extend forearm back, squeeze at top', 'Keep elbow pinned, lower slowly (3s)'] }
  ]},
  { letter: 'B', label: 'Pull', exercises: [
    { name: 'Curls', sets: 3, reps: 10, url: 'https://exrx.net/WeightExercises/Biceps/DBCurl',
      tips: ['Stand tall, palms forward', 'Curl up without swinging', 'Lower slowly (3s), full extension at bottom'] },
    { name: 'Hammer Curls', sets: 3, reps: 12, url: 'https://exrx.net/WeightExercises/Brachioradialis/DBHammerCurl',
      tips: ['Palms face each other (neutral grip)', 'Curl up keeping wrists neutral', 'Targets brachialis & forearms'] }
  ]},
  { letter: 'C', label: 'Shoulders & Arms', exercises: [
    { name: 'Lateral Raises', sets: 3, reps: 12, note: 'Drop to 10 lbs if needed', url: 'https://exrx.net/WeightExercises/DeltoidLateral/DBLateralRaise',
      tips: ['Slight bend in elbows, palms down', 'Raise to shoulder height, no higher', 'Control the descent — don\'t drop'] },
    { name: 'Overhead Tricep Extension', sets: 3, reps: 10, url: 'https://exrx.net/WeightExercises/Triceps/DBOneArmTriExt',
      tips: ['One dumbbell overhead, both hands or single arm', 'Lower behind head, elbows point up', 'Extend back up, squeeze tricep at top'] }
  ]}
];

const TIMER_PRESETS = [60, 90, 120];

const store = {
  get() {
    try { return JSON.parse(localStorage.getItem('arms-daily') || '{}'); } catch { return {}; }
  },
  save(d) { localStorage.setItem('arms-daily', JSON.stringify(d)); }
};

function today() { return new Date().toISOString().slice(0, 10); }

let timerInterval = null;
let timerSeconds = 0;
let timerTarget = 90;
let timerRunning = false;
let pendingSetKey = null;
let pendingSetReps = null;

function getState() {
  const d = store.get();
  if (!d.weights) {
    d.weights = {};
    const fallback = d.weight || 15;
    DAYS.forEach(day => day.exercises.forEach(ex => { d.weights[ex.name] = fallback; }));
    delete d.weight;
  }
  if (!d.log) d.log = {};
  if (!d.nextDay) d.nextDay = 0;
  if (!d.todaySets) d.todaySets = {};
  if (!d.setReps) d.setReps = {};
  if (!d.history) d.history = {};
  if (d.todayDate !== today()) {
    if (d.todayCompleted) {
      d.nextDay = (d.nextDay + 1) % 3;
    }
    d.todaySets = {};
    d.setReps = {};
    d.todayCompleted = false;
    d.todayDate = today();
  }
  store.save(d);
  return d;
}

function getStreak(d) {
  let streak = 0;
  const t = new Date();
  if (d.log[today()]) { streak++; t.setDate(t.getDate() - 1); }
  else { t.setDate(t.getDate() - 1); }
  for (let i = 0; i < 365; i++) {
    const key = t.toISOString().slice(0, 10);
    const dow = t.getDay();
    if (dow === 0 || dow === 6) { t.setDate(t.getDate() - 1); continue; }
    if (d.log[key]) { streak++; t.setDate(t.getDate() - 1); }
    else break;
  }
  return streak;
}

function getWeightHints(d) {
  const hints = {};
  const entries = Object.entries(d.history || {}).sort((a, b) => b[0].localeCompare(a[0])).slice(0, 5);
  if (entries.length < 2) return hints;

  const byExercise = {};
  for (const [, session] of entries) {
    if (!session.sets) continue;
    for (const s of session.sets) {
      if (!byExercise[s.exercise]) byExercise[s.exercise] = [];
      byExercise[s.exercise].push(s);
    }
  }

  for (const [name, sets] of Object.entries(byExercise)) {
    if (sets.length < 3) continue;
    const recent = sets.slice(0, 9);
    const missed = recent.filter(s => s.actual < s.target).length;
    const missRate = missed / recent.length;
    if (missRate > 0.4) hints[name] = { dir: 'down', msg: 'Missed reps often — consider dropping 2.5 lbs' };
    else if (missed === 0 && recent.length >= 6) hints[name] = { dir: 'up', msg: 'All reps hit — consider bumping up 2.5 lbs' };
  }
  return hints;
}

function startTimer(secs) {
  stopTimer();
  timerTarget = secs;
  timerSeconds = secs;
  timerRunning = true;
  render();
  timerInterval = setInterval(() => {
    timerSeconds--;
    if (timerSeconds <= 0) {
      timerSeconds = 0;
      timerRunning = false;
      clearInterval(timerInterval);
      timerInterval = null;
      if ('vibrate' in navigator) navigator.vibrate([200, 100, 200]);
    }
    renderTimer();
  }, 1000);
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  timerRunning = false;
  timerSeconds = 0;
}

function adjustTimer(delta) {
  timerSeconds = Math.max(0, timerSeconds + delta);
  if (!timerRunning && timerSeconds > 0) {
    startTimer(timerSeconds);
    return;
  }
  if (timerSeconds === 0 && timerRunning) {
    stopTimer();
    if ('vibrate' in navigator) navigator.vibrate([200, 100, 200]);
  }
  renderTimer();
}

function renderTimer() {
  const el = document.getElementById('timer-display');
  if (!el) return;
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
  el.className = 'timer-display' + (timerSeconds === 0 && !timerRunning ? ' ready' : timerSeconds <= 10 && timerRunning ? ' warning' : '');

  const label = document.getElementById('timer-label');
  if (label) {
    if (timerSeconds === 0 && !timerRunning && timerTarget > 0) label.textContent = 'Rest complete — go!';
    else if (timerRunning) label.textContent = 'Resting...';
    else label.textContent = 'Rest timer';
  }
}

function showRepModal(key, targetReps) {
  pendingSetKey = key;
  pendingSetReps = targetReps;
  const root = document.getElementById('modal-root');
  let html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>How many reps?</h3>
      <div class="modal-sub">Set ${parseInt(key.split('-')[1]) + 1} — target: ${targetReps}</div>
      <div class="rep-grid">`;
  for (let r = 1; r <= targetReps + 2; r++) {
    html += `<button class="rep-btn ${r === targetReps ? 'target' : ''}" onclick="confirmReps(${r})">${r}</button>`;
  }
  html += `</div><button class="modal-cancel" onclick="closeModal()">Cancel</button></div></div>`;
  root.innerHTML = html;
}

function closeModal() {
  pendingSetKey = null;
  pendingSetReps = null;
  document.getElementById('modal-root').innerHTML = '';
}

function confirmReps(reps) {
  const d = getState();
  const key = pendingSetKey;
  const target = pendingSetReps;
  d.todaySets[key] = true;
  d.setReps[key] = { actual: reps, target };
  store.save(d);
  closeModal();
  startTimer(timerTarget || 90);
  render();
}

function toggleSet(key, targetReps) {
  const d = getState();
  if (d.todaySets[key]) {
    d.todaySets[key] = false;
    delete d.setReps[key];
    store.save(d);
    render();
    return;
  }
  showRepModal(key, targetReps);
}

function completeDay() {
  const d = getState();
  d.todayCompleted = true;
  d.log[today()] = DAYS[d.nextDay].letter;

  const day = DAYS[d.nextDay];
  const sets = [];
  day.exercises.forEach((ex, ei) => {
    for (let s = 0; s < ex.sets; s++) {
      const key = `${ei}-${s}`;
      const rep = d.setReps[key];
      sets.push({
        exercise: ex.name,
        set: s + 1,
        actual: rep ? rep.actual : ex.reps,
        target: ex.reps,
        weight: d.weights[ex.name] || 15
      });
    }
  });
  d.history[today()] = { day: DAYS[d.nextDay].letter, sets };

  store.save(d);
  stopTimer();
  render();
}

function setWeight(name, v) {
  const d = getState();
  d.weights[name] = parseFloat(v) || 15;
  store.save(d);
}

function render() {
  const d = getState();
  const day = DAYS[d.nextDay];
  const streak = getStreak(d);
  const allDone = d.todayCompleted;
  const hints = getWeightHints(d);

  let html = `<h1>💪 Arms Daily</h1><p class="subtitle">Desk dumbbell protocol</p>`;

  html += `<div class="streak-bar">
    <div><span class="streak-num">${streak}</span><div class="streak-label">day streak</div></div>
    <div style="width:1px;height:32px;background:#333"></div>
    <div><span class="streak-num">${Object.keys(d.log).length}</span><div class="streak-label">total sessions</div></div>
  </div>`;

  if (!allDone) {
    // Timer
    html += `<div class="timer-card">
      <div class="timer-label" id="timer-label">${timerRunning ? 'Resting...' : timerSeconds === 0 ? 'Rest timer' : ''}</div>
      <div class="timer-adj">
        <button class="adj-btn" onclick="adjustTimer(-15)">−15</button>
        <div class="timer-display" id="timer-display">${formatTime(timerSeconds)}</div>
        <button class="adj-btn" onclick="adjustTimer(15)">+15</button>
      </div>
      <div class="timer-buttons">`;
    for (const p of TIMER_PRESETS) {
      const label = p >= 60 ? `${p / 60}m` : `${p}s`;
      if (timerRunning) {
        html += `<button class="timer-btn stop" onclick="stopTimer();render()">Stop</button>`;
        break;
      } else {
        html += `<button class="timer-btn ${timerTarget === p && !timerRunning ? 'active' : ''}" onclick="startTimer(${p})">${label}</button>`;
      }
    }
    if (!timerRunning) {
      html += `<button class="timer-btn" onclick="startTimer(timerTarget || 90)">▶</button>`;
    }
    html += `</div></div>`;
  }

  if (allDone) {
    html += `<div class="day-card done-banner">
      <div class="check">✅</div>
      <div class="msg">Day ${day.letter} complete!</div>
      <div class="sub">Next up: Day ${DAYS[(d.nextDay + 1) % 3].letter} (${DAYS[(d.nextDay + 1) % 3].label}) tomorrow</div>
    </div>`;

    const session = d.history[today()];
    if (session && session.sets) {
      html += `<div class="day-card"><div class="day-header"><span class="day-letter">Session Summary</span></div>`;
      session.sets.forEach(s => {
        const hit = s.actual >= s.target;
        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:0.85rem;">
          <span>${s.exercise} #${s.set}</span>
          <span style="color:${hit ? 'var(--green)' : 'var(--yellow)'}">${s.actual}/${s.target} @ ${s.weight}lbs</span>
        </div>`;
      });
      html += `</div>`;
    }
  } else {
    html += `<div class="day-card">
      <div class="day-header">
        <span class="day-letter">Day ${day.letter}</span>
        <span class="day-label">${day.label}</span>
      </div>`;

    let totalSets = 0, doneSets = 0;
    day.exercises.forEach((ex, ei) => {
      const nameHtml = ex.url ? `<a href="${ex.url}" target="_blank">${ex.name}</a>` : ex.name;
      const tipsId = `tips-${ei}`;
      html += `<div class="exercise"><div class="ex-name">${nameHtml}<button class="ex-tips-toggle" onclick="document.getElementById('${tipsId}').classList.toggle('open');this.textContent=this.textContent==='form?'?'hide':'form?'">form?</button></div>`;
      if (ex.tips) {
        html += `<ul class="ex-tips" id="${tipsId}">`;
        ex.tips.forEach(t => { html += `<li>${t}</li>`; });
        html += `<a class="exrx-link" href="${ex.url}" target="_blank">📖 Full guide on ExRx.net ↗</a></ul>`;
      }
      html += `<div class="ex-detail">${ex.sets} × ${ex.reps} reps${ex.note ? ' · ' + ex.note : ''} · 3s negatives</div>`;
      const exWeight = d.weights[ex.name] || 15;
      const exHint = hints[ex.name];
      html += `<div class="weight-setting" style="margin-bottom:8px;padding:8px;justify-content:flex-start;gap:8px;">
        <input type="number" class="weight-input" value="${exWeight}" min="5" max="100" step="2.5" onchange="setWeight('${ex.name.replace(/'/g, "\\'")}',this.value)"> <label>lbs</label>
        ${exHint ? `<span style="font-size:0.75rem;color:var(--${exHint.dir === 'down' ? 'red' : 'green'})">${exHint.dir === 'down' ? '⬇️' : '⬆️'} ${exHint.msg}</span>` : ''}
      </div>`;
      html += `<div class="sets">`;
      for (let s = 0; s < ex.sets; s++) {
        const key = `${ei}-${s}`;
        const done = d.todaySets[key];
        const repInfo = d.setReps[key];
        totalSets++;
        if (done) doneSets++;
        const isPartial = repInfo && repInfo.actual < repInfo.target;
        const cls = done ? (isPartial ? 'partial' : 'done') : '';
        const label = repInfo ? repInfo.actual : (s + 1);
        html += `<button class="set-btn ${cls}" onclick="toggleSet('${key}', ${ex.reps})">
          ${done ? '✓' : s + 1}${repInfo ? `<span class="set-reps">${repInfo.actual}r</span>` : ''}
        </button>`;
      }
      html += `</div></div>`;
    });

    const canComplete = doneSets === totalSets;
    html += `<button class="complete-btn" ${canComplete ? '' : 'disabled'} onclick="completeDay()">
      ${canComplete ? '🎉 Mark Complete' : `${doneSets}/${totalSets} sets done`}
    </button>`;
    html += `</div>`;
  }

  // Week view
  html += `<div class="history"><h2>This week</h2><div class="week-grid">`;
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
  const labels = ['M','T','W','T','F','S','S'];
  for (let i = 0; i < 7; i++) {
    const date = new Date(mon);
    date.setDate(date.getDate() + i);
    const key = date.toISOString().slice(0, 10);
    const isToday = key === today();
    const done = d.log[key];
    html += `<div class="week-dot ${done ? 'done' : 'missed'} ${isToday ? 'today' : ''}">${done ? done : labels[i]}</div>`;
  }
  html += `</div></div>`;

  html += `<p class="tip">Tap a set → enter reps completed. Timer auto-starts after each set. Yellow = missed target reps.</p>`;

  html += `<div class="data-actions">
    <button class="data-btn" onclick="exportData()">📤 Export File</button>
    <button class="data-btn" onclick="document.getElementById('import-file').click()">📥 Import File</button>
    <input type="file" id="import-file" class="import-input" accept=".json" onchange="importData(event)">
  </div>
  <textarea class="data-text" id="data-text" spellcheck="false" placeholder="Your data appears here — copy it, or paste data from another device and hit Load">${JSON.stringify(store.get())}</textarea>
  <div class="data-text-actions">
    <button class="data-text-btn" onclick="copyText()">📋 Copy</button>
    <button class="data-text-btn" onclick="loadFromText()">📲 Load Pasted Data</button>
  </div>
  <div id="import-msg" class="import-msg"></div>`;

  document.getElementById('app').innerHTML = html;
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function exportData() {
  const d = store.get();
  const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `arms-daily-${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function copyText() {
  const el = document.getElementById('data-text');
  el.select();
  navigator.clipboard.writeText(el.value).then(() => {
    showMsg('✅ Copied to clipboard', 'var(--green)');
  }).catch(() => {
    showMsg('⚠️ Copy failed — select and copy manually', 'var(--yellow)');
  });
}

function loadFromText() {
  const el = document.getElementById('data-text');
  const raw = el.value.trim();
  if (!raw) return showMsg('⚠️ Paste data first', 'var(--yellow)');
  try {
    const data = JSON.parse(raw);
    if (!data.log && !data.history && !data.weights) {
      return showMsg('⚠️ Invalid data — no Arms Daily fields found', 'var(--red)');
    }
    mergeData(data);
    showMsg(`✅ Loaded! ${Object.keys(data.log || {}).length} sessions merged.`, 'var(--green)');
    render();
  } catch {
    showMsg('⚠️ Could not parse — check the JSON', 'var(--red)');
  }
}

function showMsg(text, color) {
  const msg = document.getElementById('import-msg');
  if (!msg) return;
  msg.style.color = color;
  msg.textContent = text;
}

function mergeData(data) {
  const existing = store.get();
  const merged = { ...existing };
  merged.log = { ...existing.log, ...data.log };
  merged.history = { ...existing.history, ...data.history };
  merged.weights = { ...existing.weights, ...data.weights };
  if (data.setReps) merged.setReps = { ...existing.setReps, ...data.setReps };
  if (data.nextDay !== undefined) merged.nextDay = data.nextDay;
  store.save(merged);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.log && !data.history && !data.weights) {
        return showMsg('⚠️ Invalid file — no Arms Daily data found', 'var(--red)');
      }
      mergeData(data);
      showMsg(`✅ Imported! ${Object.keys(data.log || {}).length} sessions merged.`, 'var(--green)');
      render();
    } catch {
      showMsg('⚠️ Could not parse file', 'var(--red)');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

render();
</script>
</body>
</html>
